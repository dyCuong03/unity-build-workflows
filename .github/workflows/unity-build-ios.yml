name: Unity Build iOS

# macOS-native workflow. Generates an Xcode project from Unity source.
# Development/ad-hoc signing only. Does NOT upload to TestFlight.
# Runner: ios-runner-label input (default: macos-unity-xcode — self-hosted macOS runner
# with Xcode and Unity iOS Build Support). GitHub-hosted macos-latest is NOT supported.

on:
  workflow_call:
    inputs:
      project-path:
        description: Path to the Unity project root relative to the consumer repo root
        type: string
        required: false
        default: '.'
      unity-version:
        type: string
        required: true
      environment:
        type: string
        required: false
        default: development
      build-config-path:
        type: string
        required: false
        default: BuildConfig
      cache-mode:
        description: Library cache strategy (off, safe, aggressive)
        type: string
        required: false
        default: safe
      build-addressables:
        type: boolean
        required: false
        default: false
      upload-artifact:
        type: boolean
        required: false
        default: true
      artifact-retention-days:
        type: number
        required: false
        default: 14
      clean-build:
        type: boolean
        required: false
        default: false
      build-version:
        type: string
        required: true
      ios-runner-label:
        description: >
          Self-hosted runner label for the macOS Unity+Xcode runner.
          Must be a macOS runner with Unity iOS Build Support installed.
          GitHub-hosted macos-latest is NOT supported.
        type: string
        required: false
        default: macos-unity-xcode
      workflow-repository:
        description: >
          Repository that owns this workflow (owner/repo). Must be the
          owner/repo of the unity-build-workflows toolkit. REQUIRED — the
          reusable workflow cannot auto-detect its own source repo cross-repo.
          NOTE: Do NOT use github.action_repository — that is for composite actions
          only and is empty in a workflow_call context.
        type: string
        required: false
        default: ''
      workflow-ref:
        description: >
          Git ref or SHA of the unity-build-workflows toolkit to checkout.
          REQUIRED — must match the @<REF> used in the 'uses:' directive of
          your caller workflow. Pin to a released tag/SHA in production.
        type: string
        required: false
        default: ''
      integration-mode:
        description: >
          How the toolkit is supplied: 'remote' (default) checks out from
          workflow-repository@workflow-ref; 'submodule' symlinks from the
          consumer repo's checked-out submodule at toolkit-path.
        type: string
        required: false
        default: remote
      toolkit-path:
        description: >
          Relative path within the consumer repo where the toolkit submodule
          lives (submodule mode only). Must not start with '/' or contain '..'.
          Ignored in remote mode.
        type: string
        required: false
        default: tools/unity-build-workflows

    secrets:
      UNITY_LICENSE:
        required: false
      UNITY_EMAIL:
        required: false
      UNITY_PASSWORD:
        required: false
      DISCORD_WEBHOOK_URL:
        required: false

    outputs:
      artifact-name:
        description: Name of the uploaded Xcode project artifact
        value: ${{ jobs.build.outputs.artifact-name }}

jobs:
  build:
    name: Build iOS Xcode Project (${{ inputs.environment }})
    runs-on: ${{ inputs.ios-runner-label }}
    environment: ${{ inputs.environment }}
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
    outputs:
      artifact-name: ${{ steps.set-artifact-name.outputs.artifact-name }}

    steps:
      # ── Guard: enforce macOS runner ───────────────────────────────────────────
      - name: Verify macOS runner
        shell: bash
        run: |
          if [[ "${{ runner.os }}" != "macOS" ]]; then
            echo "::error::Target \`iOS\` requires an approved macOS runner with Xcode and Unity iOS Build Support. Linux Docker execution is not supported."
            exit 1
          fi
          echo "[ios-guard] Runner OS: ${{ runner.os }} — OK"

      # ── 1. Consumer repo checkout ─────────────────────────────────────────────
      - name: Checkout consumer repo
        uses: actions/checkout@v4
        with:
          path: project
          lfs: true

      # ── 2. Toolkit setup ─────────────────────────────────────────────────────
      - name: Setup toolkit
        id: toolkit
        shell: bash
        env:
          INTEGRATION_MODE: ${{ inputs.integration-mode }}
          TOOLKIT_PATH_INPUT: ${{ inputs.toolkit-path }}
          WORKFLOW_REPO: ${{ inputs.workflow-repository }}
          WORKFLOW_REF: ${{ inputs.workflow-ref }}
        run: |
          MODE="${INTEGRATION_MODE:-remote}"

          if [ "$MODE" = "submodule" ]; then
            TP="${TOOLKIT_PATH_INPUT:-tools/unity-build-workflows}"
            # Reject path traversal and absolute paths
            if [[ "$TP" == /* ]] || [[ "$TP" == *..* ]]; then
              echo "::error::toolkit-path must be a relative path with no '..' components. Got: '$TP'"
              exit 1
            fi
            SUBMODULE_SRC="project/${TP}"
            if [ ! -d "$SUBMODULE_SRC" ]; then
              echo "::error::toolkit-path submodule not found at '${SUBMODULE_SRC}'."
              echo "::error::Ensure '${TP}' is initialized: git submodule update --init '${TP}'"
              exit 1
            fi
            mkdir -p .ci
            ln -sf "$(realpath "${SUBMODULE_SRC}")" .ci/unity-build-workflows
            echo "[toolkit] Linked submodule: ${SUBMODULE_SRC} → .ci/unity-build-workflows"
          else
            # remote mode — require explicit repo + ref
            if [ -z "$WORKFLOW_REPO" ]; then
              echo "::error::workflow-repository input is required (integration-mode: remote)."
              echo "::error::Add to your caller workflow's 'with:' block:"
              echo "::error::  workflow-repository: <OWNER>/unity-build-workflows"
              exit 1
            fi
            if [ -z "$WORKFLOW_REF" ]; then
              echo "::error::workflow-ref input is required (integration-mode: remote)."
              echo "::error::Add to your caller workflow's 'with:' block:"
              echo "::error::  workflow-ref: <REF>"
              exit 1
            fi
            echo "repo=${WORKFLOW_REPO}" >> "$GITHUB_OUTPUT"
            echo "ref=${WORKFLOW_REF}"   >> "$GITHUB_OUTPUT"
          fi
          echo "mode=${MODE}" >> "$GITHUB_OUTPUT"
          echo "TOOLKIT_PATH=.ci/unity-build-workflows" >> "$GITHUB_ENV"

      - name: Checkout toolkit (remote mode)
        if: steps.toolkit.outputs.mode == 'remote'
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.toolkit.outputs.repo }}
          ref: ${{ steps.toolkit.outputs.ref }}
          path: .ci/unity-build-workflows
          persist-credentials: false

      - name: Report toolkit version
        shell: bash
        run: |
          git -C .ci/unity-build-workflows log -1 --format="Toolkit: %H (%s)" 2>/dev/null \
            || echo "Toolkit version: unknown" 

      # ── 3. Compute effective project path ─────────────────────────────────────
      - name: Compute effective project path
        id: paths
        shell: bash
        run: |
          PP="${{ inputs.project-path }}"
          if [ "$PP" = "." ] || [ -z "$PP" ]; then
            echo "project-root=project" >> "$GITHUB_OUTPUT"
          else
            echo "project-root=project/${PP}" >> "$GITHUB_OUTPUT"
          fi

      # ── Platform executor validation ────────────────────────────────────────
      - name: Validate platform executor
        shell: bash
        env:
          TARGET_PLATFORM: iOS
          RUNNER_OS_VAL: ${{ runner.os }}
        run: |
          if [[ -f "${TOOLKIT_PATH}/scripts/common/resolve_platform_executor.py" ]]; then
            python3 "${TOOLKIT_PATH}/scripts/common/resolve_platform_executor.py" \
              --target-platform iOS \
              --runner-os "${RUNNER_OS_VAL}"
          else
            echo "::notice::resolve_platform_executor.py not yet present — skipping resolver check"
            echo "executor=macos-unity-xcode"
          fi

      # ── Verify Unity installation ────────────────────────────────────────────
      - name: Resolve Unity installation
        id: unity-install
        shell: bash
        env:
          UNITY_VERSION: ${{ inputs.unity-version }}
        run: |
          UNITY_EDITOR="/Applications/Unity/Hub/Editor/${UNITY_VERSION}/Unity.app/Contents/MacOS/Unity"
          IOS_SUPPORT="/Applications/Unity/Hub/Editor/${UNITY_VERSION}/PlaybackEngines/iOSSupport"

          if [[ ! -f "${UNITY_EDITOR}" ]]; then
            echo "::error::Unity editor not found at: ${UNITY_EDITOR}"
            echo "::error::Install Unity ${UNITY_VERSION} with iOS Build Support on this runner."
            exit 1
          fi

          if [[ ! -d "${IOS_SUPPORT}" ]]; then
            echo "::error::Unity iOS Build Support not found at: ${IOS_SUPPORT}"
            echo "::error::Install the iOS Build Support module for Unity ${UNITY_VERSION}."
            exit 1
          fi

          echo "unity-editor=${UNITY_EDITOR}" >> "$GITHUB_OUTPUT"
          echo "[ios-install] Unity: ${UNITY_EDITOR}"
          echo "[ios-install] iOS Support: ${IOS_SUPPORT} — OK"

      # ── Validate BuildConfig ─────────────────────────────────────────────────
      - name: Validate BuildConfig
        shell: bash
        env:
          PROJECT_ROOT: ${{ steps.paths.outputs.project-root }}
          BUILD_CONFIG_PATH: ${{ inputs.build-config-path }}
          TARGET_PLATFORM: iOS
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          python3 "${TOOLKIT_PATH}/scripts/common/validate_build_config.py" \
            --config-path "${PROJECT_ROOT}/${BUILD_CONFIG_PATH}" \
            --platform    iOS \
            --environment "${ENVIRONMENT}"

      # ── Library cache ────────────────────────────────────────────────────────
      - name: Restore Library cache
        id: restore-cache
        if: inputs.cache-mode != 'off'
        uses: actions/cache@v4
        with:
          path: ${{ steps.paths.outputs.project-root }}/Library
          key: macOS-unity-${{ inputs.unity-version }}-iOS-${{ hashFiles(format('{0}/Packages/manifest.json', steps.paths.outputs.project-root), format('{0}/Packages/packages-lock.json', steps.paths.outputs.project-root)) }}-cache-schema-v2
          restore-keys: |
            macOS-unity-${{ inputs.unity-version }}-iOS-

      - name: Clean Library cache
        if: inputs.clean-build == true
        shell: bash
        run: |
          rm -rf "${{ steps.paths.outputs.project-root }}/Library"
          echo "[clean-build] Library/ removed"

      # ── Generate build metadata ──────────────────────────────────────────────
      - name: Generate build metadata
        shell: bash
        env:
          PROJECT_ROOT: ${{ steps.paths.outputs.project-root }}
          BUILD_VERSION: ${{ inputs.build-version }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          python3 "${TOOLKIT_PATH}/scripts/common/generate_build_metadata.py" \
            --project-path "${PROJECT_ROOT}" \
            --platform     iOS \
            --version      "${BUILD_VERSION}" \
            --environment  "${ENVIRONMENT}" \
            --build-number "${{ github.run_number }}" \
            --commit       "${{ github.sha }}"

      # ── Unity license activation ─────────────────────────────────────────────
      - name: Activate Unity license
        shell: bash
        env:
          UNITY_EDITOR: ${{ steps.unity-install.outputs.unity-editor }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          LOG_PATH: Logs/iOS
        run: bash "${TOOLKIT_PATH}/scripts/ios/run_unity_ios.sh" activate

      # ── Unity iOS build (Xcode project generation) ──────────────────────────
      - name: Build Unity iOS (generate Xcode project)
        id: unity-build
        shell: bash
        env:
          UNITY_EDITOR: ${{ steps.unity-install.outputs.unity-editor }}
          PROJECT_PATH: ${{ steps.paths.outputs.project-root }}
          ENVIRONMENT: ${{ inputs.environment }}
          BUILD_CONFIG_PATH: ${{ inputs.build-config-path }}
          OUTPUT_PATH: Builds/iOS/Xcode
          LOG_PATH: Logs/iOS
        run: bash "${TOOLKIT_PATH}/scripts/ios/run_unity_ios.sh" build

      # ── Build Addressables (optional) ────────────────────────────────────────
      - name: Build Addressables
        if: inputs.build-addressables == true
        shell: bash
        env:
          UNITY_EDITOR: ${{ steps.unity-install.outputs.unity-editor }}
          PROJECT_PATH: ${{ steps.paths.outputs.project-root }}
          ENVIRONMENT: ${{ inputs.environment }}
          BUILD_CONFIG_PATH: ${{ inputs.build-config-path }}
          LOG_PATH: Logs/iOS
        run: bash "${TOOLKIT_PATH}/scripts/ios/run_unity_ios.sh" build-addressables

      # ── Set artifact name ────────────────────────────────────────────────────
      - name: Set artifact name
        id: set-artifact-name
        shell: bash
        run: |
          NAME="ios-xcode-${{ inputs.environment }}-${{ inputs.build-version }}-${{ github.run_number }}"
          printf 'artifact-name=%s\n' "${NAME}" >> "$GITHUB_OUTPUT"

      # ── Upload Xcode project artifact ────────────────────────────────────────
      - name: Upload Xcode project artifact
        id: upload
        if: always() && inputs.upload-artifact == true
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.set-artifact-name.outputs.artifact-name }}
          path: Builds/iOS/Xcode/
          retention-days: ${{ inputs.artifact-retention-days }}
          if-no-files-found: warn

      # ── Upload logs and reports (always) ────────────────────────────────────
      - name: Upload iOS logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-logs-${{ inputs.environment }}-${{ inputs.build-version }}-${{ github.run_number }}
          path: |
            Logs/iOS/
            BuildReports/iOS/
          retention-days: 7
          if-no-files-found: ignore

      # ── Return Unity license ─────────────────────────────────────────────────
      - name: Return Unity license
        if: always()
        shell: bash
        env:
          UNITY_EDITOR: ${{ steps.unity-install.outputs.unity-editor }}
          LOG_PATH: Logs/iOS
        run: bash "${TOOLKIT_PATH}/scripts/ios/run_unity_ios.sh" return-license

      # ── Discord notification (if: always — notifies on success AND failure) ──
      - name: Discord notification
        if: always()
        uses: ./.ci/unity-build-workflows/.github/actions/discord-notify
        with:
          status: ${{ job.status }}
          platform: iOS
          environment: ${{ inputs.environment }}
          build-version: ${{ inputs.build-version }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          artifact-name: ${{ steps.set-artifact-name.outputs.artifact-name }}
