name: Unity Build iOS (Reusable)

on:
  workflow_call:
    inputs:
      project-path:
        type: string
        default: "."
      unity-version:
        type: string
        required: true
      environment:
        type: string
        default: "development"
      build-config-path:
        type: string
        default: "BuildConfig"
      cache-mode:
        type: string
        default: "safe"
      build-addressables:
        type: boolean
        default: false
      upload-artifact:
        type: boolean
        default: true
      deploy-target:
        type: string
        default: "none"
      clean-build:
        type: boolean
        default: false
      artifact-retention-days:
        type: number
        default: 14
      release-mode:
        type: boolean
        default: false
      build-version:
        type: string
        required: true
    secrets:
      UNITY_LICENSE:
        required: true
      UNITY_EMAIL:
        required: false
      UNITY_PASSWORD:
        required: false
      APPLE_CERT_BASE64:
        required: false
      APPLE_CERT_PASSWORD:
        required: false
      APPLE_PROV_PROFILE_BASE64:
        required: false
      APPLE_TEAM_ID:
        required: false
      APPLE_APP_ID:
        required: false
      TESTFLIGHT_APP_SPECIFIC_PASSWORD:
        required: false
    outputs:
      artifact-name:
        description: "Name of the uploaded IPA artifact"
        value: ${{ jobs.build.outputs.artifact-name }}

jobs:
  build:
    name: Build iOS (${{ inputs.environment }})
    runs-on: macos-latest
    environment: ${{ inputs.environment }}
    outputs:
      artifact-name: ${{ steps.upload.outputs.artifact-name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Restore Library Cache
        uses: ./.github/actions/restore-library-cache
        with:
          project-path: ${{ inputs.project-path }}
          unity-version: ${{ inputs.unity-version }}
          target-platform: "iOS"
          cache-mode: ${{ inputs.cache-mode }}

      - name: Clean build (if requested)
        if: inputs.clean-build == true
        run: rm -rf "${{ inputs.project-path }}/Library"

      - name: Setup Unity
        uses: ./.github/actions/setup-unity
        with:
          unity-version: ${{ inputs.unity-version }}
          project-path: ${{ inputs.project-path }}
          target-platform: iOS
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      - name: Prepare iOS build environment
        id: ios-prepare
        run: |
          python3 scripts/ios/prepare_ios_build.py \
            --environment "${{ inputs.environment }}" \
            --version "${{ inputs.build-version }}" \
            --config-path "${{ inputs.project-path }}/${{ inputs.build-config-path }}"
        env:
          APPLE_CERT_BASE64: ${{ secrets.APPLE_CERT_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_PROV_PROFILE_BASE64: ${{ secrets.APPLE_PROV_PROFILE_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Generate build metadata
        run: |
          python3 scripts/common/generate_build_metadata.py \
            --project-path "${{ inputs.project-path }}" \
            --platform iOS \
            --version "${{ inputs.build-version }}" \
            --environment "${{ inputs.environment }}" \
            --build-number "${{ github.run_number }}" \
            --commit "${{ github.sha }}"

      - name: Build Addressables
        if: inputs.build-addressables == true
        run: |
          /Applications/Unity/Hub/Editor/${{ inputs.unity-version }}/Unity.app/Contents/MacOS/Unity \
            -batchmode \
            -nographics \
            -projectPath "${{ inputs.project-path }}" \
            -executeMethod AddressableAssets.Settings.AddressableAssetSettings.BuildPlayerContent \
            -logFile "${{ runner.temp }}/addressables-build.log" \
            -quit
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}

      - name: Build Unity iOS (Xcode project)
        run: |
          /Applications/Unity/Hub/Editor/${{ inputs.unity-version }}/Unity.app/Contents/MacOS/Unity \
            -batchmode \
            -nographics \
            -projectPath "${{ inputs.project-path }}" \
            -executeMethod BuildCommand.Execute \
            -buildTarget iOS \
            -buildPath "${{ runner.temp }}/build/ios-xcode" \
            -buildVersion "${{ inputs.build-version }}" \
            -buildEnvironment "${{ inputs.environment }}" \
            -logFile "${{ runner.temp }}/unity-build-ios.log" \
            -quit
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}

      - name: Export Xcode archive (IPA)
        run: |
          bash scripts/ios/export_xcode_archive.sh \
            "${{ runner.temp }}/build/ios-xcode" \
            "${{ runner.temp }}/build/ios-ipa" \
            "${{ inputs.environment }}"
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_ID: ${{ secrets.APPLE_APP_ID }}

      - name: Compare build size
        if: always()
        run: |
          python3 scripts/common/compare_build_size.py \
            --build-path "${{ runner.temp }}/build/ios-ipa" \
            --platform iOS \
            --version "${{ inputs.build-version }}" || true

      - name: Upload build artifact
        id: upload
        if: inputs.upload-artifact == true
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-${{ inputs.environment }}-${{ inputs.build-version }}-${{ github.run_number }}
          path: ${{ runner.temp }}/build/ios-ipa/
          retention-days: ${{ inputs.artifact-retention-days }}
          if-no-files-found: error

      - name: Upload to TestFlight
        if: inputs.deploy-target == 'testflight'
        run: |
          bash scripts/ios/upload_testflight.sh \
            "${{ runner.temp }}/build/ios-ipa" \
            "${{ secrets.APPLE_APP_ID }}"
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TESTFLIGHT_APP_SPECIFIC_PASSWORD: ${{ secrets.TESTFLIGHT_APP_SPECIFIC_PASSWORD }}

      - name: Collect build logs
        if: always()
        uses: ./.github/actions/collect-build-output
        with:
          target-platform: iOS
          build-version: ${{ inputs.build-version }}
          environment: ${{ inputs.environment }}
          log-path: ${{ runner.temp }}

      - name: Cleanup signing artifacts
        if: always()
        run: |
          security delete-keychain build.keychain || true
          rm -f /tmp/*.mobileprovision
          rm -f /tmp/*.p12
          rm -f /tmp/ExportOptions.plist
