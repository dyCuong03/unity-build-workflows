name: Build Unity Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'docker/**'
      - '.github/workflows/build-unity-image.yml'
  workflow_dispatch:
    inputs:
      unity-version:
        description: Unity editor version to bake into the image (e.g., 6000.0.23f1)
        required: true
        type: string
      image-variant:
        description: Image variant to build
        required: true
        type: choice
        options: [android, webgl, linux]
        default: android
      push-image:
        description: Push the built image to the registry
        required: false
        type: boolean
        default: true
      run-vulnerability-scan:
        description: Run Trivy vulnerability scan after build
        required: false
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  IMAGE_REPO: ${{ github.repository_owner }}/unity-editor

jobs:
  build-image:
    name: Build ${{ inputs.image-variant || 'all' }} image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write  # for SARIF upload

    strategy:
      fail-fast: false
      matrix:
        variant: ${{ inputs.image-variant && fromJson(format('["{0}"]', inputs.image-variant)) || fromJson('["android","webgl","linux"]') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve Unity version
        id: unity-version
        shell: bash
        run: |
          VERSION="${{ inputs.unity-version }}"
          if [ -z "$VERSION" ]; then
            # Read from project BuildConfig if available
            VERSION=$(python3 scripts/common/resolve_project_version.py --format plain 2>/dev/null || echo "")
          fi
          if [ -z "$VERSION" ]; then
            echo "::error::No unity-version specified and could not resolve from project."
            exit 1
          fi
          echo "unity-version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved Unity version: ${VERSION}"

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}
          tags: |
            type=raw,value=${{ steps.unity-version.outputs.unity-version }}-${{ matrix.variant }}
            type=raw,value=${{ steps.unity-version.outputs.unity-version }}-${{ matrix.variant }}-${{ github.run_number }}
          labels: |
            org.opencontainers.image.title=Unity Editor (${{ matrix.variant }})
            org.opencontainers.image.description=Unity ${{ steps.unity-version.outputs.unity-version }} with ${{ matrix.variant }} build support
            unity.version=${{ steps.unity-version.outputs.unity-version }}
            unity.variant=${{ matrix.variant }}

      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: docker/unity
          file: docker/unity/Dockerfile.${{ matrix.variant }}
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            UNITY_VERSION=${{ steps.unity-version.outputs.unity-version }}
            VARIANT=${{ matrix.variant }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}

      - name: Run validation tests
        id: validate
        shell: bash
        env:
          IMAGE_TAG: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:${{ steps.unity-version.outputs.unity-version }}-${{ matrix.variant }}
          UNITY_VERSION: ${{ steps.unity-version.outputs.unity-version }}
          VARIANT: ${{ matrix.variant }}
        run: |
          echo "Running container smoke test for ${IMAGE_TAG}..."
          docker run --rm \
            --entrypoint /bin/bash \
            "$IMAGE_TAG" \
            -c "unity-editor -version && echo 'Unity smoke test passed.'"

          echo "Validating entrypoint script..."
          docker run --rm \
            --entrypoint /bin/bash \
            "$IMAGE_TAG" \
            -c "test -x /entrypoint.sh && echo 'Entrypoint OK.'"

          echo "Validating variant: ${VARIANT}"
          case "$VARIANT" in
            android)
              docker run --rm --entrypoint /bin/bash "$IMAGE_TAG" \
                -c "ls /opt/android-sdk/platforms/ && echo 'Android SDK OK.'"
              ;;
            webgl)
              docker run --rm --entrypoint /bin/bash "$IMAGE_TAG" \
                -c "which emcc && echo 'Emscripten OK.'"
              ;;
            linux)
              docker run --rm --entrypoint /bin/bash "$IMAGE_TAG" \
                -c "unity-editor -buildTarget Linux64 -version && echo 'Linux target OK.'"
              ;;
          esac

      - name: Scan for vulnerabilities
        if: inputs.run-vulnerability-scan != false
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:${{ steps.unity-version.outputs.unity-version }}-${{ matrix.variant }}
          format: sarif
          output: trivy-results-${{ matrix.variant }}.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy SARIF results
        if: inputs.run-vulnerability-scan != false && always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results-${{ matrix.variant }}.sarif
          category: trivy-${{ matrix.variant }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:${{ steps.unity-version.outputs.unity-version }}-${{ matrix.variant }}
          artifact-name: sbom-${{ matrix.variant }}-${{ steps.unity-version.outputs.unity-version }}.spdx.json
          output-file: sbom-${{ matrix.variant }}.spdx.json

      - name: Push image to registry
        if: inputs.push-image != false
        uses: docker/build-push-action@v5
        with:
          context: docker/unity
          file: docker/unity/Dockerfile.${{ matrix.variant }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            UNITY_VERSION=${{ steps.unity-version.outputs.unity-version }}
            VARIANT=${{ matrix.variant }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}

      - name: Publish image manifest
        if: inputs.push-image != false
        shell: bash
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_REPO: ${{ env.IMAGE_REPO }}
          UNITY_VERSION: ${{ steps.unity-version.outputs.unity-version }}
          VARIANT: ${{ matrix.variant }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          MANIFEST_FILE="image-manifest-${VARIANT}.json"
          cat > "$MANIFEST_FILE" << EOF
          {
            "unity_version": "${UNITY_VERSION}",
            "variant": "${VARIANT}",
            "registry": "${REGISTRY}",
            "repository": "${IMAGE_REPO}",
            "tag": "${UNITY_VERSION}-${VARIANT}",
            "digest": "${IMAGE_DIGEST}",
            "pinned_reference": "${REGISTRY}/${IMAGE_REPO}:${UNITY_VERSION}-${VARIANT}@${IMAGE_DIGEST}",
            "built_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "run_id": "${{ github.run_id }}",
            "run_number": ${{ github.run_number }},
            "commit": "${{ github.sha }}"
          }
          EOF
          echo "Image manifest:"
          cat "$MANIFEST_FILE"

      - name: Upload image manifest artifact
        if: inputs.push-image != false
        uses: actions/upload-artifact@v4
        with:
          name: image-manifest-${{ matrix.variant }}-${{ steps.unity-version.outputs.unity-version }}
          path: image-manifest-${{ matrix.variant }}.json
          retention-days: 90
