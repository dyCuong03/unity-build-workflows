name: Unity Build Linux

on:
  workflow_call:
    inputs:
      project-path:
        type: string
        required: false
        default: '.'
      unity-version:
        type: string
        required: true
      target-platform:
        description: Linux build target (Linux64 or LinuxServer)
        type: string
        required: false
        default: Linux64
      environment:
        type: string
        required: false
        default: development
      build-config-path:
        type: string
        required: false
        default: BuildConfig
      cache-mode:
        type: string
        required: false
        default: safe
      build-addressables:
        type: boolean
        required: false
        default: false
      upload-artifact:
        type: boolean
        required: false
        default: true
      clean-build:
        type: boolean
        required: false
        default: false
      artifact-retention-days:
        type: number
        required: false
        default: 14
      release-mode:
        type: boolean
        required: false
        default: false
      build-version:
        type: string
        required: true
      image-registry:
        type: string
        required: false
        default: ghcr.io
      image-digest:
        description: Pinned image digest (required when release-mode=true)
        type: string
        required: false
        default: ''

    secrets:
      UNITY_LICENSE:
        required: false
      UNITY_EMAIL:
        required: false
      UNITY_PASSWORD:
        required: false

    outputs:
      artifact-name:
        description: Name of the uploaded Linux build artifact
        value: ${{ jobs.build.outputs.artifact-name }}

jobs:
  build:
    name: Build ${{ inputs.target-platform }} (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      artifact-name: ${{ steps.upload.outputs.artifact-name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Restore Docker cache
        uses: ./.github/actions/restore-docker-cache
        with:
          project-path: ${{ inputs.project-path }}
          unity-version: ${{ inputs.unity-version }}
          target-platform: ${{ inputs.target-platform }}
          cache-mode: ${{ inputs.cache-mode }}

      - name: Resolve Unity image
        id: resolve-image
        uses: ./.github/actions/resolve-unity-image
        with:
          unity-version: ${{ inputs.unity-version }}
          target-platform: ${{ inputs.target-platform }}
          image-registry: ${{ inputs.image-registry }}
          image-variant: linux
          image-digest: ${{ inputs.image-digest }}
          release-mode: ${{ inputs.release-mode }}

      - name: Generate build metadata
        shell: bash
        env:
          PROJECT_PATH: ${{ inputs.project-path }}
          TARGET_PLATFORM: ${{ inputs.target-platform }}
          BUILD_VERSION: ${{ inputs.build-version }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          python3 scripts/common/generate_build_metadata.py \
            --project-path "$PROJECT_PATH" \
            --platform     "$TARGET_PLATFORM" \
            --version      "$BUILD_VERSION" \
            --environment  "$ENVIRONMENT" \
            --build-number "${{ github.run_number }}" \
            --commit       "${{ github.sha }}"

      - name: Build Addressables
        id: build-addressables
        if: inputs.build-addressables == true
        uses: ./.github/actions/run-unity-container
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          project-path: ${{ inputs.project-path }}
          unity-version: ${{ inputs.unity-version }}
          target-platform: ${{ inputs.target-platform }}
          environment: ${{ inputs.environment }}
          build-config-path: ${{ inputs.build-config-path }}
          image-reference: ${{ steps.resolve-image.outputs.image-reference }}
          image-digest: ${{ steps.resolve-image.outputs.image-digest }}
          command: build-addressables
          cache-mode: ${{ inputs.cache-mode }}

      - name: Build Unity Linux
        id: build
        uses: ./.github/actions/run-unity-container
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          project-path: ${{ inputs.project-path }}
          unity-version: ${{ inputs.unity-version }}
          target-platform: ${{ inputs.target-platform }}
          environment: ${{ inputs.environment }}
          build-config-path: ${{ inputs.build-config-path }}
          image-reference: ${{ steps.resolve-image.outputs.image-reference }}
          image-digest: ${{ steps.resolve-image.outputs.image-digest }}
          command: build
          cache-mode: ${{ inputs.cache-mode }}
          clean-build: ${{ inputs.clean-build }}
          output-path: Builds/${{ inputs.target-platform }}
          release-mode: ${{ inputs.release-mode }}

      - name: Compare build size
        if: always()
        shell: bash
        env:
          TARGET_PLATFORM: ${{ inputs.target-platform }}
          BUILD_VERSION: ${{ inputs.build-version }}
        run: |
          python3 scripts/common/compare_build_size.py \
            --build-path "Builds/${TARGET_PLATFORM}" \
            --platform   "$TARGET_PLATFORM" \
            --version    "$BUILD_VERSION" || true

      - name: Upload build artifact
        id: upload
        if: inputs.upload-artifact == true
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ inputs.target-platform }}-build-${{ inputs.environment }}-${{ inputs.build-version }}-${{ github.run_number }}
          path: Builds/${{ inputs.target-platform }}/
          retention-days: ${{ inputs.artifact-retention-days }}
          if-no-files-found: error

      - name: Collect container output
        if: always()
        uses: ./.github/actions/collect-container-output
        with:
          target-platform: ${{ inputs.target-platform }}
          build-version: ${{ inputs.build-version }}
          environment: ${{ inputs.environment }}
          command: build
          container-exit-code: ${{ steps.build.outputs.exit-code }}
          log-path: ${{ steps.build.outputs.log-path }}
          report-path: ${{ steps.build.outputs.report-path }}
