name: Unity Build Android

on:
  workflow_call:
    inputs:
      project-path:
        type: string
        required: false
        default: '.'
      unity-version:
        type: string
        required: true
      environment:
        type: string
        required: false
        default: development
      build-config-path:
        type: string
        required: false
        default: BuildConfig
      cache-mode:
        type: string
        required: false
        default: safe
      build-addressables:
        type: boolean
        required: false
        default: false
      upload-artifact:
        type: boolean
        required: false
        default: true
      deploy-target:
        description: Deployment target (none, google-play)
        type: string
        required: false
        default: none
      clean-build:
        type: boolean
        required: false
        default: false
      artifact-retention-days:
        type: number
        required: false
        default: 14
      release-mode:
        type: boolean
        required: false
        default: false
      build-version:
        type: string
        required: true
      image-registry:
        type: string
        required: false
        default: ghcr.io
      image-digest:
        description: Pinned image digest (required when release-mode=true)
        type: string
        required: false
        default: ''

    secrets:
      UNITY_LICENSE:
        required: false
      UNITY_EMAIL:
        required: false
      UNITY_PASSWORD:
        required: false
      ANDROID_KEYSTORE_BASE64:
        required: false
      ANDROID_KEYSTORE_PASS:
        required: false
      ANDROID_KEY_ALIAS:
        required: false
      ANDROID_KEY_PASS:
        required: false
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON:
        required: false

    outputs:
      artifact-name:
        description: Name of the uploaded APK/AAB artifact
        value: ${{ jobs.build.outputs.artifact-name }}

jobs:
  build:
    name: Build Android (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      artifact-name: ${{ steps.upload.outputs.artifact-name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Restore Docker cache
        uses: ./.github/actions/restore-docker-cache
        with:
          project-path: ${{ inputs.project-path }}
          unity-version: ${{ inputs.unity-version }}
          target-platform: Android
          cache-mode: ${{ inputs.cache-mode }}

      - name: Resolve Unity image
        id: resolve-image
        uses: ./.github/actions/resolve-unity-image
        with:
          unity-version: ${{ inputs.unity-version }}
          target-platform: Android
          image-registry: ${{ inputs.image-registry }}
          image-variant: android
          image-digest: ${{ inputs.image-digest }}
          release-mode: ${{ inputs.release-mode }}

      - name: Setup Android signing (pre-container)
        id: android-signing
        if: inputs.release-mode == true || inputs.environment != 'development'
        shell: bash
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          BUILD_VERSION: ${{ inputs.build-version }}
          PROJECT_PATH: ${{ inputs.project-path }}
          BUILD_CONFIG_PATH: ${{ inputs.build-config-path }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASS: ${{ secrets.ANDROID_KEY_PASS }}
        run: |
          python3 scripts/android/prepare_android_build.py \
            --environment "$ENVIRONMENT" \
            --version     "$BUILD_VERSION" \
            --config-path "$PROJECT_PATH/$BUILD_CONFIG_PATH"

      - name: Generate build metadata
        shell: bash
        env:
          PROJECT_PATH: ${{ inputs.project-path }}
          BUILD_VERSION: ${{ inputs.build-version }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          python3 scripts/common/generate_build_metadata.py \
            --project-path "$PROJECT_PATH" \
            --platform     Android \
            --version      "$BUILD_VERSION" \
            --environment  "$ENVIRONMENT" \
            --build-number "${{ github.run_number }}" \
            --commit       "${{ github.sha }}"

      - name: Build Addressables
        id: build-addressables
        if: inputs.build-addressables == true
        uses: ./.github/actions/run-unity-container
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          project-path: ${{ inputs.project-path }}
          unity-version: ${{ inputs.unity-version }}
          target-platform: Android
          environment: ${{ inputs.environment }}
          build-config-path: ${{ inputs.build-config-path }}
          image-reference: ${{ steps.resolve-image.outputs.image-reference }}
          image-digest: ${{ steps.resolve-image.outputs.image-digest }}
          command: build-addressables
          cache-mode: ${{ inputs.cache-mode }}

      - name: Build Unity Android
        id: build
        uses: ./.github/actions/run-unity-container
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          project-path: ${{ inputs.project-path }}
          unity-version: ${{ inputs.unity-version }}
          target-platform: Android
          environment: ${{ inputs.environment }}
          build-config-path: ${{ inputs.build-config-path }}
          image-reference: ${{ steps.resolve-image.outputs.image-reference }}
          image-digest: ${{ steps.resolve-image.outputs.image-digest }}
          command: build
          cache-mode: ${{ inputs.cache-mode }}
          clean-build: ${{ inputs.clean-build }}
          output-path: Builds/Android
          release-mode: ${{ inputs.release-mode }}

      - name: Sign Android build (post-container)
        if: inputs.release-mode == true || inputs.environment != 'development'
        shell: bash
        env:
          BUILD_PATH: Builds/Android
          ENVIRONMENT: ${{ inputs.environment }}
          ANDROID_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASS: ${{ secrets.ANDROID_KEY_PASS }}
        run: |
          bash scripts/android/sign_android_build.sh "$BUILD_PATH" "$ENVIRONMENT"

      - name: Compare build size
        if: always()
        shell: bash
        run: |
          python3 scripts/common/compare_build_size.py \
            --build-path Builds/Android \
            --platform   Android \
            --version    "${{ inputs.build-version }}" || true

      - name: Upload build artifact
        id: upload
        if: always() && inputs.upload-artifact == true
        uses: actions/upload-artifact@v4
        with:
          name: android-build-${{ inputs.environment }}-${{ inputs.build-version }}-${{ github.run_number }}
          path: Builds/Android/
          retention-days: ${{ inputs.artifact-retention-days }}
          if-no-files-found: error

      - name: Deploy to Google Play
        if: inputs.deploy-target == 'google-play'
        shell: bash
        env:
          BUILD_PATH: Builds/Android
          ENVIRONMENT: ${{ inputs.environment }}
          BUILD_VERSION: ${{ inputs.build-version }}
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          python3 scripts/android/upload_google_play.py \
            --build-path  "$BUILD_PATH" \
            --environment "$ENVIRONMENT" \
            --version     "$BUILD_VERSION"

      - name: Collect container output
        if: always()
        uses: ./.github/actions/collect-container-output
        with:
          target-platform: Android
          build-version: ${{ inputs.build-version }}
          environment: ${{ inputs.environment }}
          command: build
          container-exit-code: ${{ steps.build.outputs.exit-code }}
          log-path: ${{ steps.build.outputs.log-path }}
          report-path: ${{ steps.build.outputs.report-path }}

      - name: Cleanup signing artifacts
        if: always()
        shell: bash
        run: |
          rm -f /tmp/android-keystore.jks /tmp/signing-config.json
