name: Unity Build Android

on:
  workflow_call:
    inputs:
      project-path:
        description: Path to the Unity project root relative to the consumer repo root
        type: string
        required: false
        default: '.'
      unity-version:
        type: string
        required: true
      environment:
        type: string
        required: false
        default: development
      build-config-path:
        type: string
        required: false
        default: BuildConfig
      cache-mode:
        type: string
        required: false
        default: safe
      build-addressables:
        type: boolean
        required: false
        default: false
      upload-artifact:
        type: boolean
        required: false
        default: true
      deploy-target:
        description: Deployment target (none, google-play)
        type: string
        required: false
        default: none
      clean-build:
        type: boolean
        required: false
        default: false
      artifact-retention-days:
        type: number
        required: false
        default: 14
      release-mode:
        type: boolean
        required: false
        default: false
      build-version:
        type: string
        required: true
      image-registry:
        description: Docker image registry (e.g. ghcr.io)
        type: string
        required: false
        default: ghcr.io
      image-namespace:
        description: Image repository namespace override (e.g. myorg/unity-images)
        type: string
        required: false
        default: ''
      image-name:
        description: Image name override (e.g. unity-editor)
        type: string
        required: false
        default: ''
      image-digest:
        description: Pinned image digest (required when release-mode=true)
        type: string
        required: false
        default: ''
      workflow-repository:
        description: >
          Repository that owns this workflow (owner/repo). Must be the
          owner/repo of the unity-build-workflows toolkit. REQUIRED — the
          reusable workflow cannot auto-detect its own source repo cross-repo.
          NOTE: Do NOT use github.action_repository — that is for composite actions
          only and is empty in a workflow_call context.
        type: string
        required: false
        default: ''
      workflow-ref:
        description: >
          Git ref or SHA of the unity-build-workflows toolkit to checkout.
          REQUIRED — must match the @<REF> used in the 'uses:' directive of
          your caller workflow. Pin to a released tag/SHA in production.
        type: string
        required: false
        default: ''
      integration-mode:
        description: >
          How the toolkit is supplied: 'remote' (default) checks out from
          workflow-repository@workflow-ref; 'submodule' symlinks from the
          consumer repo's checked-out submodule at toolkit-path.
        type: string
        required: false
        default: remote
      toolkit-path:
        description: >
          Relative path within the consumer repo where the toolkit submodule
          lives (submodule mode only). Must not start with '/' or contain '..'.
          Ignored in remote mode.
        type: string
        required: false
        default: tools/unity-build-workflows

    secrets:
      UNITY_LICENSE:
        required: false
      UNITY_EMAIL:
        required: false
      UNITY_PASSWORD:
        required: false
      ANDROID_KEYSTORE_BASE64:
        required: false
      ANDROID_KEYSTORE_PASS:
        required: false
      ANDROID_KEY_ALIAS:
        required: false
      ANDROID_KEY_PASS:
        required: false
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON:
        required: false

    outputs:
      artifact-name:
        description: Name of the uploaded APK/AAB artifact
        value: ${{ jobs.build.outputs.artifact-name }}

jobs:
  build:
    name: Build Android (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      artifact-name: ${{ steps.upload.outputs.artifact-name }}

    steps:
      # ── 1. Consumer repo checkout ─────────────────────────────────────────────
      # Consumer repo lands at project/ so toolkit files (.ci/) never collide with
      # consumer assets.
      - name: Checkout consumer repo
        uses: actions/checkout@v4
        with:
          path: project
          lfs: true

      # ── 2. Toolkit setup ─────────────────────────────────────────────────────
      - name: Setup toolkit
        id: toolkit
        shell: bash
        env:
          INTEGRATION_MODE: ${{ inputs.integration-mode }}
          TOOLKIT_PATH_INPUT: ${{ inputs.toolkit-path }}
          WORKFLOW_REPO: ${{ inputs.workflow-repository }}
          WORKFLOW_REF: ${{ inputs.workflow-ref }}
        run: |
          MODE="${INTEGRATION_MODE:-remote}"

          if [ "$MODE" = "submodule" ]; then
            TP="${TOOLKIT_PATH_INPUT:-tools/unity-build-workflows}"
            # Reject path traversal and absolute paths
            if [[ "$TP" == /* ]] || [[ "$TP" == *..* ]]; then
              echo "::error::toolkit-path must be a relative path with no '..' components. Got: '$TP'"
              exit 1
            fi
            SUBMODULE_SRC="project/${TP}"
            if [ ! -d "$SUBMODULE_SRC" ]; then
              echo "::error::toolkit-path submodule not found at '${SUBMODULE_SRC}'."
              echo "::error::Ensure '${TP}' is initialized: git submodule update --init '${TP}'"
              exit 1
            fi
            mkdir -p .ci
            ln -sf "$(realpath "${SUBMODULE_SRC}")" .ci/unity-build-workflows
            echo "[toolkit] Linked submodule: ${SUBMODULE_SRC} → .ci/unity-build-workflows"
          else
            # remote mode — require explicit repo + ref
            if [ -z "$WORKFLOW_REPO" ]; then
              echo "::error::workflow-repository input is required (integration-mode: remote)."
              echo "::error::Add to your caller workflow's 'with:' block:"
              echo "::error::  workflow-repository: <OWNER>/unity-build-workflows"
              exit 1
            fi
            if [ -z "$WORKFLOW_REF" ]; then
              echo "::error::workflow-ref input is required (integration-mode: remote)."
              echo "::error::Add to your caller workflow's 'with:' block:"
              echo "::error::  workflow-ref: <REF>"
              exit 1
            fi
            echo "repo=${WORKFLOW_REPO}" >> "$GITHUB_OUTPUT"
            echo "ref=${WORKFLOW_REF}"   >> "$GITHUB_OUTPUT"
          fi
          echo "mode=${MODE}" >> "$GITHUB_OUTPUT"
          echo "TOOLKIT_PATH=.ci/unity-build-workflows" >> "$GITHUB_ENV"

      - name: Checkout toolkit (remote mode)
        if: steps.toolkit.outputs.mode == 'remote'
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.toolkit.outputs.repo }}
          ref: ${{ steps.toolkit.outputs.ref }}
          path: .ci/unity-build-workflows
          persist-credentials: false

      - name: Report toolkit version
        shell: bash
        run: |
          git -C .ci/unity-build-workflows log -1 --format="Toolkit: %H (%s)" 2>/dev/null \
            || echo "Toolkit version: unknown" 

      # ── 3. Compute effective project path ─────────────────────────────────────
      # Consumer repo is at project/; Unity root = project/<project-path>.
      - name: Compute effective project path
        id: paths
        shell: bash
        run: |
          PP="${{ inputs.project-path }}"
          if [ "$PP" = "." ] || [ -z "$PP" ]; then
            echo "project-root=project" >> "$GITHUB_OUTPUT"
          else
            echo "project-root=project/${PP}" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore Docker cache
        uses: ./.ci/unity-build-workflows/.github/actions/restore-docker-cache
        with:
          project-path: ${{ steps.paths.outputs.project-root }}
          unity-version: ${{ inputs.unity-version }}
          target-platform: Android
          cache-mode: ${{ inputs.cache-mode }}

      - name: Resolve Unity image
        id: resolve-image
        uses: ./.ci/unity-build-workflows/.github/actions/resolve-unity-image
        with:
          unity-version: ${{ inputs.unity-version }}
          target-platform: Android
          image-registry: ${{ inputs.image-registry }}
          image-namespace: ${{ inputs.image-namespace }}
          image-name: ${{ inputs.image-name }}
          image-variant: android
          image-digest: ${{ inputs.image-digest }}
          release-mode: ${{ inputs.release-mode }}

      - name: Setup Android signing (pre-container)
        id: android-signing
        if: inputs.release-mode == true || inputs.environment != 'development'
        shell: bash
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          BUILD_VERSION: ${{ inputs.build-version }}
          PROJECT_ROOT: ${{ steps.paths.outputs.project-root }}
          BUILD_CONFIG_PATH: ${{ inputs.build-config-path }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASS: ${{ secrets.ANDROID_KEY_PASS }}
        run: |
          python3 "${TOOLKIT_PATH}/scripts/android/prepare_android_build.py" \
            --environment "$ENVIRONMENT" \
            --version     "$BUILD_VERSION" \
            --config-path "$PROJECT_ROOT/$BUILD_CONFIG_PATH"

      - name: Generate build metadata
        shell: bash
        env:
          PROJECT_ROOT: ${{ steps.paths.outputs.project-root }}
          BUILD_VERSION: ${{ inputs.build-version }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          python3 "${TOOLKIT_PATH}/scripts/common/generate_build_metadata.py" \
            --project-path "$PROJECT_ROOT" \
            --platform     Android \
            --version      "$BUILD_VERSION" \
            --environment  "$ENVIRONMENT" \
            --build-number "${{ github.run_number }}" \
            --commit       "${{ github.sha }}"

      - name: Build Addressables
        id: build-addressables
        if: inputs.build-addressables == true
        uses: ./.ci/unity-build-workflows/.github/actions/run-unity-container
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          project-path: ${{ steps.paths.outputs.project-root }}
          unity-version: ${{ inputs.unity-version }}
          target-platform: Android
          environment: ${{ inputs.environment }}
          build-config-path: ${{ inputs.build-config-path }}
          image-reference: ${{ steps.resolve-image.outputs.image-reference }}
          image-digest: ${{ steps.resolve-image.outputs.image-digest }}
          command: build-addressables
          cache-mode: ${{ inputs.cache-mode }}

      - name: Build Unity Android
        id: build
        uses: ./.ci/unity-build-workflows/.github/actions/run-unity-container
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          project-path: ${{ steps.paths.outputs.project-root }}
          unity-version: ${{ inputs.unity-version }}
          target-platform: Android
          environment: ${{ inputs.environment }}
          build-config-path: ${{ inputs.build-config-path }}
          image-reference: ${{ steps.resolve-image.outputs.image-reference }}
          image-digest: ${{ steps.resolve-image.outputs.image-digest }}
          command: build
          cache-mode: ${{ inputs.cache-mode }}
          clean-build: ${{ inputs.clean-build }}
          output-path: Builds/Android
          release-mode: ${{ inputs.release-mode }}

      - name: Sign Android build (post-container)
        if: inputs.release-mode == true || inputs.environment != 'development'
        shell: bash
        env:
          BUILD_PATH: Builds/Android
          ENVIRONMENT: ${{ inputs.environment }}
          ANDROID_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASS: ${{ secrets.ANDROID_KEY_PASS }}
        run: |
          bash "${TOOLKIT_PATH}/scripts/android/sign_android_build.sh" "$BUILD_PATH" "$ENVIRONMENT"

      - name: Compare build size
        if: always()
        shell: bash
        run: |
          python3 "${TOOLKIT_PATH}/scripts/common/compare_build_size.py" \
            --build-path Builds/Android \
            --platform   Android \
            --version    "${{ inputs.build-version }}" || true

      - name: Upload build artifact
        id: upload
        if: always() && inputs.upload-artifact == true
        uses: actions/upload-artifact@v4
        with:
          name: android-build-${{ inputs.environment }}-${{ inputs.build-version }}-${{ github.run_number }}
          path: Builds/Android/
          retention-days: ${{ inputs.artifact-retention-days }}
          if-no-files-found: error

      - name: Deploy to Google Play
        if: inputs.deploy-target == 'google-play'
        shell: bash
        env:
          BUILD_PATH: Builds/Android
          ENVIRONMENT: ${{ inputs.environment }}
          BUILD_VERSION: ${{ inputs.build-version }}
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          python3 "${TOOLKIT_PATH}/scripts/android/upload_google_play.py" \
            --build-path  "$BUILD_PATH" \
            --environment "$ENVIRONMENT" \
            --version     "$BUILD_VERSION"

      - name: Collect container output
        if: always()
        uses: ./.ci/unity-build-workflows/.github/actions/collect-container-output
        with:
          target-platform: Android
          build-version: ${{ inputs.build-version }}
          environment: ${{ inputs.environment }}
          command: build
          container-exit-code: ${{ steps.build.outputs.exit-code }}
          log-path: ${{ steps.build.outputs.log-path }}
          report-path: ${{ steps.build.outputs.report-path }}

      - name: Cleanup signing artifacts
        if: always()
        shell: bash
        run: |
          rm -f /tmp/android-keystore.jks /tmp/signing-config.json
