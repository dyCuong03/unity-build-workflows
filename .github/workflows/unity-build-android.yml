name: Unity Build Android (Reusable)

on:
  workflow_call:
    inputs:
      project-path:
        type: string
        default: "."
      unity-version:
        type: string
        required: true
      environment:
        type: string
        default: "development"
      build-config-path:
        type: string
        default: "BuildConfig"
      cache-mode:
        type: string
        default: "safe"
      build-addressables:
        type: boolean
        default: false
      upload-artifact:
        type: boolean
        default: true
      deploy-target:
        type: string
        default: "none"
      clean-build:
        type: boolean
        default: false
      artifact-retention-days:
        type: number
        default: 14
      release-mode:
        type: boolean
        default: false
      build-version:
        type: string
        required: true
    secrets:
      UNITY_LICENSE:
        required: true
      UNITY_EMAIL:
        required: false
      UNITY_PASSWORD:
        required: false
      ANDROID_KEYSTORE_BASE64:
        required: false
      ANDROID_KEYSTORE_PASS:
        required: false
      ANDROID_KEY_ALIAS:
        required: false
      ANDROID_KEY_PASS:
        required: false
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON:
        required: false
    outputs:
      artifact-name:
        description: "Name of the uploaded APK/AAB artifact"
        value: ${{ jobs.build.outputs.artifact-name }}

jobs:
  build:
    name: Build Android (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      artifact-name: ${{ steps.upload.outputs.artifact-name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Restore Library Cache
        uses: ./.github/actions/restore-library-cache
        with:
          project-path: ${{ inputs.project-path }}
          unity-version: ${{ inputs.unity-version }}
          target-platform: "Android"
          cache-mode: ${{ inputs.cache-mode }}

      - name: Clean build (if requested)
        if: inputs.clean-build == true
        run: rm -rf "${{ inputs.project-path }}/Library"

      - name: Setup Unity
        uses: ./.github/actions/setup-unity
        with:
          unity-version: ${{ inputs.unity-version }}
          project-path: ${{ inputs.project-path }}
          target-platform: Android
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      - name: Setup Android signing
        id: android-signing
        if: inputs.release-mode == true || inputs.environment != 'development'
        run: |
          python3 scripts/android/prepare_android_build.py \
            --environment "${{ inputs.environment }}" \
            --version "${{ inputs.build-version }}" \
            --config-path "${{ inputs.project-path }}/${{ inputs.build-config-path }}"
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASS: ${{ secrets.ANDROID_KEY_PASS }}

      - name: Generate build metadata
        run: |
          python3 scripts/common/generate_build_metadata.py \
            --project-path "${{ inputs.project-path }}" \
            --platform Android \
            --version "${{ inputs.build-version }}" \
            --environment "${{ inputs.environment }}" \
            --build-number "${{ github.run_number }}" \
            --commit "${{ github.sha }}"

      - name: Build Addressables
        if: inputs.build-addressables == true
        run: |
          unity-editor \
            -batchmode \
            -nographics \
            -projectPath "${{ inputs.project-path }}" \
            -executeMethod AddressableAssets.Settings.AddressableAssetSettings.BuildPlayerContent \
            -logFile "${{ runner.temp }}/addressables-build.log" \
            -quit
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}

      - name: Build Unity Android
        run: |
          unity-editor \
            -batchmode \
            -nographics \
            -projectPath "${{ inputs.project-path }}" \
            -executeMethod BuildCommand.Execute \
            -buildTarget Android \
            -buildPath "${{ runner.temp }}/build/android" \
            -buildVersion "${{ inputs.build-version }}" \
            -buildEnvironment "${{ inputs.environment }}" \
            -logFile "${{ runner.temp }}/unity-build-android.log" \
            -quit
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}

      - name: Sign Android build
        if: inputs.release-mode == true || inputs.environment != 'development'
        run: |
          bash scripts/android/sign_android_build.sh \
            "${{ runner.temp }}/build/android" \
            "${{ inputs.environment }}"
        env:
          ANDROID_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASS: ${{ secrets.ANDROID_KEY_PASS }}

      - name: Compare build size
        if: always()
        run: |
          python3 scripts/common/compare_build_size.py \
            --build-path "${{ runner.temp }}/build/android" \
            --platform Android \
            --version "${{ inputs.build-version }}" || true

      - name: Upload build artifact
        id: upload
        if: inputs.upload-artifact == true
        uses: actions/upload-artifact@v4
        with:
          name: android-build-${{ inputs.environment }}-${{ inputs.build-version }}-${{ github.run_number }}
          path: ${{ runner.temp }}/build/android/
          retention-days: ${{ inputs.artifact-retention-days }}
          if-no-files-found: error

      - name: Deploy to Google Play
        if: inputs.deploy-target == 'google-play'
        run: |
          python3 scripts/android/upload_google_play.py \
            --build-path "${{ runner.temp }}/build/android" \
            --environment "${{ inputs.environment }}" \
            --version "${{ inputs.build-version }}"
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}

      - name: Collect build logs
        if: always()
        uses: ./.github/actions/collect-build-output
        with:
          target-platform: Android
          build-version: ${{ inputs.build-version }}
          environment: ${{ inputs.environment }}
          log-path: ${{ runner.temp }}

      - name: Cleanup signing artifacts
        if: always()
        run: |
          rm -f /tmp/android-keystore.jks
          rm -f /tmp/signing-config.json
