name: Unity Release iOS

# Distribution signing, archive, IPA export, and optional TestFlight upload.
# Runs on macos-unity-xcode. Never executes in Docker.
# Requires ios-production GitHub Environment (protected) for deployment secrets.
# Third-party actions are pinned to commit SHAs for supply-chain security.

on:
  workflow_dispatch:
    inputs:
      unity-version:
        description: Unity editor version (e.g., 6000.0.23f1)
        required: true
        type: string
      export-method:
        description: IPA export method
        required: true
        type: choice
        options: [app-store, ad-hoc, enterprise, development]
        default: app-store
      upload-to-testflight:
        description: Upload IPA to TestFlight after export (requires ios-production environment)
        required: false
        type: boolean
        default: false
      dry-run:
        description: Build and sign without uploading to TestFlight
        required: false
        type: boolean
        default: false
      project-path:
        description: Path to Unity project root
        required: false
        type: string
        default: '.'
      build-config-path:
        description: Path to BuildConfig directory (relative to project-path)
        required: false
        type: string
        default: BuildConfig

  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+-ios*'
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  # ─── PRE-RELEASE GATES ─────────────────────────────────────────────────────────
  pre-release-checks:
    name: Pre-release Gates
    runs-on: ubuntu-latest
    outputs:
      build-version: ${{ steps.version.outputs.version }}
      unity-version: ${{ steps.resolve-unity.outputs.unity-version }}
      export-method: ${{ steps.resolve-export.outputs.export-method }}
      bundle-identifier: ${{ steps.read-config.outputs.bundle-identifier }}
      development-team: ${{ steps.read-config.outputs.development-team }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Refuse fork / unowned-repo context
        shell: bash
        run: |
          # Block fork execution
          if [[ "${{ github.event.pull_request.head.repo.fork }}" == "true" ]]; then
            echo "::error::iOS release workflow cannot run from a forked repository."
            exit 1
          fi
          # Block if triggered from a PR (extra guard)
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "::error::iOS release workflow cannot run from a pull_request event."
            exit 1
          fi
          echo "[pre-release] Context validated — not a fork, not a PR"

      - name: Resolve Unity version
        id: resolve-unity
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "unity-version=${{ inputs.unity-version }}" >> "$GITHUB_OUTPUT"
          else
            UNITY_VERSION=$(grep -r "m_EditorVersion:" "${{ inputs.project-path || '.' }}/ProjectSettings/ProjectVersion.txt" \
              2>/dev/null | awk '{print $2}' || echo "")
            if [[ -z "${UNITY_VERSION}" ]]; then
              echo "::error::Cannot resolve Unity version from ProjectVersion.txt — use workflow_dispatch and specify unity-version."
              exit 1
            fi
            echo "unity-version=${UNITY_VERSION}" >> "$GITHUB_OUTPUT"
          fi
          echo "Unity version: $(cat $GITHUB_OUTPUT | grep unity-version | cut -d= -f2)"

      - name: Resolve export method
        id: resolve-export
        shell: bash
        run: |
          METHOD="${{ inputs.export-method || 'app-store' }}"
          if [[ "${{ inputs.dry-run }}" == "true" ]]; then
            METHOD="development"
            echo "::notice::dry-run=true — overriding export-method to 'development'"
          fi
          echo "export-method=${METHOD}" >> "$GITHUB_OUTPUT"

      - name: Resolve build version
        id: version
        shell: bash
        run: |
          VERSION=$(python3 scripts/common/resolve_project_version.py \
            --project-path "${{ inputs.project-path || '.' }}" \
            --config-path  "${{ inputs.project-path || '.' }}/${{ inputs.build-config-path || 'BuildConfig' }}" \
            --environment  production \
            --ref          "${{ github.ref }}")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      - name: Validate version matches tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          TAG="${TAG%%-ios*}"
          VERSION="${{ steps.version.outputs.version }}"
          if [[ "$TAG" != "$VERSION" ]]; then
            echo "::error::Git tag does not match BuildConfig version '${VERSION}'"
            exit 1
          fi
          echo "Version matches tag: ${VERSION}"

      - name: Read iOS BuildConfig
        id: read-config
        shell: bash
        env:
          PROJECT_PATH: ${{ inputs.project-path || '.' }}
          BUILD_CONFIG_PATH: ${{ inputs.build-config-path || 'BuildConfig' }}
        run: |
          python3 scripts/common/validate_build_config.py \
            --config-path "${PROJECT_PATH}/${BUILD_CONFIG_PATH}" \
            --platform    iOS \
            --environment production \
            --check-release-flags \
            --strict

          # Extract iOS fields for downstream jobs
          BUNDLE_ID=$(python3 -c \
            "import json,pathlib,glob; configs=sorted(glob.glob('${PROJECT_PATH}/${BUILD_CONFIG_PATH}/*.json')); merged={}; [merged.update(json.loads(pathlib.Path(c).read_text())) for c in configs]; print(merged.get('ios',{}).get('bundleIdentifier',''))" \
            2>/dev/null || echo "")

          DEV_TEAM=$(python3 -c \
            "import json,pathlib,glob; configs=sorted(glob.glob('${PROJECT_PATH}/${BUILD_CONFIG_PATH}/*.json')); merged={}; [merged.update(json.loads(pathlib.Path(c).read_text())) for c in configs]; print(merged.get('ios',{}).get('developmentTeam',''))" \
            2>/dev/null || echo "")

          if [[ -z "${BUNDLE_ID}" ]]; then
            echo "::error::ios.bundleIdentifier not found in BuildConfig"
            exit 1
          fi
          if [[ -z "${DEV_TEAM}" ]]; then
            echo "::error::ios.developmentTeam not found in BuildConfig"
            exit 1
          fi

          echo "bundle-identifier=${BUNDLE_ID}" >> "$GITHUB_OUTPUT"
          echo "development-team=${DEV_TEAM}"   >> "$GITHUB_OUTPUT"
          echo "Bundle ID: ${BUNDLE_ID} | Team: ${DEV_TEAM}"

      - name: Verify signing secrets present
        shell: bash
        env:
          IOS_DIST_CERT:    ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_DIST_PASS:    ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          IOS_PROFILE:      ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          MISSING=""
          [[ -z "${IOS_DIST_CERT}" ]]  && MISSING="${MISSING} IOS_DISTRIBUTION_CERTIFICATE_BASE64"
          [[ -z "${IOS_DIST_PASS}" ]]  && MISSING="${MISSING} IOS_DISTRIBUTION_CERTIFICATE_PASSWORD"
          [[ -z "${IOS_PROFILE}" ]]    && MISSING="${MISSING} IOS_PROVISIONING_PROFILE_BASE64"
          if [[ -n "${MISSING}" ]]; then
            echo "::error::Missing required iOS signing secrets:${MISSING}"
            exit 1
          fi
          echo "[pre-release] All required iOS signing secrets are present"

  # ─── iOS DISTRIBUTION BUILD ────────────────────────────────────────────────────
  release-build:
    name: iOS Distribution Build
    needs: pre-release-checks
    runs-on: macos-unity-xcode
    environment: ios-production
    env:
      UNITY_VERSION: ${{ needs.pre-release-checks.outputs.unity-version }}
      BUILD_VERSION: ${{ needs.pre-release-checks.outputs.build-version }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          lfs: true
          fetch-depth: 0

      # ── Guard ────────────────────────────────────────────────────────────────
      - name: Verify macOS runner
        shell: bash
        run: |
          if [[ "${{ runner.os }}" != "macOS" ]]; then
            echo "::error::Target \`iOS\` requires an approved macOS runner with Xcode and Unity iOS Build Support. Linux Docker execution is not supported."
            exit 1
          fi

      # ── Platform executor validation ─────────────────────────────────────────
      - name: Validate platform executor
        shell: bash
        run: |
          if [[ -f "scripts/common/resolve_platform_executor.py" ]]; then
            python3 scripts/common/resolve_platform_executor.py \
              --target-platform iOS \
              --runner-os "${{ runner.os }}"
          else
            echo "::notice::resolve_platform_executor.py not yet present — skipping"
          fi

      # ── Verify Unity + iOS Support ───────────────────────────────────────────
      - name: Resolve Unity installation
        id: unity-install
        shell: bash
        run: |
          UNITY_EDITOR="/Applications/Unity/Hub/Editor/${UNITY_VERSION}/Unity.app/Contents/MacOS/Unity"
          IOS_SUPPORT="/Applications/Unity/Hub/Editor/${UNITY_VERSION}/PlaybackEngines/iOSSupport"
          if [[ ! -f "${UNITY_EDITOR}" ]]; then
            echo "::error::Unity editor not found: ${UNITY_EDITOR}"
            exit 1
          fi
          if [[ ! -d "${IOS_SUPPORT}" ]]; then
            echo "::error::Unity iOS Build Support not found: ${IOS_SUPPORT}"
            exit 1
          fi
          echo "unity-editor=${UNITY_EDITOR}" >> "$GITHUB_OUTPUT"
          echo "[unity-install] Unity and iOS Build Support verified"

      # ── Cleanup trap (registered early so it runs even on cancellation) ───────
      # Actual cleanup step runs last with if: always()

      # ── Validate BuildConfig ─────────────────────────────────────────────────
      - name: Validate BuildConfig
        shell: bash
        env:
          PROJECT_PATH: ${{ inputs.project-path || '.' }}
          BUILD_CONFIG_PATH: ${{ inputs.build-config-path || 'BuildConfig' }}
        run: |
          python3 scripts/common/validate_build_config.py \
            --config-path "${PROJECT_PATH}/${BUILD_CONFIG_PATH}" \
            --platform    iOS \
            --environment production \
            --check-release-flags \
            --strict

      # ── Library cache (safe mode, no secrets) ────────────────────────────────
      - name: Restore Library cache
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c6158d  # v4.2.2
        with:
          path: ${{ inputs.project-path || '.' }}/Library
          key: macOS-unity-${{ needs.pre-release-checks.outputs.unity-version }}-iOS-${{ hashFiles(format('{0}/Packages/manifest.json', inputs.project-path || '.'), format('{0}/Packages/packages-lock.json', inputs.project-path || '.')) }}-cache-schema-v2
          restore-keys: |
            macOS-unity-${{ needs.pre-release-checks.outputs.unity-version }}-iOS-

      # ── Generate build metadata ──────────────────────────────────────────────
      - name: Generate build metadata
        shell: bash
        env:
          PROJECT_PATH: ${{ inputs.project-path || '.' }}
          BUILD_VERSION: ${{ needs.pre-release-checks.outputs.build-version }}
        run: |
          python3 scripts/common/generate_build_metadata.py \
            --project-path "${PROJECT_PATH}" \
            --platform     iOS \
            --version      "${BUILD_VERSION}" \
            --environment  production \
            --build-number "${{ github.run_number }}" \
            --commit       "${{ github.sha }}"

      # ── Activate Unity license ───────────────────────────────────────────────
      - name: Activate Unity license
        shell: bash
        env:
          UNITY_EDITOR: ${{ steps.unity-install.outputs.unity-editor }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          LOG_PATH: Logs/iOS
        run: bash scripts/ios/run_unity_ios.sh activate

      # ── Unity build: generate Xcode project ─────────────────────────────────
      - name: Build Unity iOS (generate Xcode project)
        id: unity-build
        shell: bash
        env:
          UNITY_EDITOR: ${{ steps.unity-install.outputs.unity-editor }}
          PROJECT_PATH: ${{ inputs.project-path || '.' }}
          ENVIRONMENT: production
          BUILD_CONFIG_PATH: ${{ inputs.build-config-path || 'BuildConfig' }}
          OUTPUT_PATH: Builds/iOS/Xcode
          LOG_PATH: Logs/iOS
        run: bash scripts/ios/run_unity_ios.sh build

      # ── iOS code signing ─────────────────────────────────────────────────────
      - name: Setup iOS signing
        id: signing
        uses: ./.github/actions/ios-setup-signing
        with:
          ios-distribution-certificate-base64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          ios-distribution-certificate-password: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          ios-provisioning-profile-base64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          export-method: ${{ needs.pre-release-checks.outputs.export-method }}
          bundle-identifier: ${{ needs.pre-release-checks.outputs.bundle-identifier }}
          development-team: ${{ needs.pre-release-checks.outputs.development-team }}

      # ── Archive + Export ─────────────────────────────────────────────────────
      - name: Archive and export IPA
        id: archive-export
        uses: ./.github/actions/ios-archive-export
        with:
          xcode-project-path: ${{ steps.unity-build.outputs.xcode-project-path }}
          export-options-path: ${{ steps.signing.outputs.export-options-path }}
          development-team: ${{ needs.pre-release-checks.outputs.development-team }}
          archive-path: Builds/iOS/Archive/Game.xcarchive
          export-path: Builds/iOS/Export
          archive-log-path: Logs/iOS/xcode-archive.log
          export-log-path: Logs/iOS/xcode-export.log

      # ── Release metadata + checksums ─────────────────────────────────────────
      - name: Generate release metadata and checksums
        shell: bash
        env:
          IPA_PATH: ${{ steps.archive-export.outputs.ipa-path }}
          ARCHIVE_PATH: Builds/iOS/Archive/Game.xcarchive
          BUILD_VERSION: ${{ needs.pre-release-checks.outputs.build-version }}
          ENVIRONMENT: production
          REPORT_PATH: BuildReports/iOS
        run: bash scripts/ios/release_metadata.sh

      # ── Optional: TestFlight upload ──────────────────────────────────────────
      - name: Upload to TestFlight
        id: testflight
        if: inputs.upload-to-testflight == true && inputs.dry-run != true
        uses: ./.github/actions/ios-testflight
        with:
          ipa-path: ${{ steps.archive-export.outputs.ipa-path }}
          app-store-connect-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          app-store-connect-issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          app-store-connect-private-key: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          report-path: BuildReports/iOS

      # ── Upload IPA artifact ──────────────────────────────────────────────────
      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        with:
          name: ios-release-ipa-${{ needs.pre-release-checks.outputs.build-version }}-${{ github.run_number }}
          path: |
            Builds/iOS/Export/Game.ipa
            BuildReports/iOS/Game.ipa.sha256
          retention-days: 90
          if-no-files-found: error

      # ── Upload symbols ───────────────────────────────────────────────────────
      - name: Upload dSYM symbols
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        with:
          name: ios-release-symbols-${{ needs.pre-release-checks.outputs.build-version }}-${{ github.run_number }}
          path: Builds/iOS/Archive/Game.xcarchive/dSYMs/
          retention-days: 90
          if-no-files-found: ignore

      # ── Upload logs + reports (always) ───────────────────────────────────────
      - name: Upload iOS logs
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        with:
          name: ios-release-logs-${{ needs.pre-release-checks.outputs.build-version }}-${{ github.run_number }}
          path: |
            Logs/iOS/Editor.log
            Logs/iOS/xcode-archive.log
            Logs/iOS/xcode-export.log
            Logs/iOS/Editor-activation.log
            BuildReports/iOS/
          retention-days: 30
          if-no-files-found: ignore

      # ── Return Unity license ─────────────────────────────────────────────────
      - name: Return Unity license
        if: always()
        shell: bash
        env:
          UNITY_EDITOR: ${{ steps.unity-install.outputs.unity-editor }}
          LOG_PATH: Logs/iOS
        run: bash scripts/ios/run_unity_ios.sh return-license

      # ── Signing cleanup (ALWAYS — scrubs secrets from runner) ────────────────
      - name: Cleanup signing artifacts
        if: always()
        shell: bash
        env:
          KEYCHAIN_PATH: ${{ steps.signing.outputs.keychain-path }}
          KEYCHAIN_NAME: ${{ steps.signing.outputs.keychain-name }}
          PROFILE_PATH: ${{ steps.signing.outputs.profile-path }}
        run: bash scripts/ios/cleanup_signing.sh

      # ── Discord notification (if: always — notifies on success AND failure) ──
      - name: Discord notification
        if: always()
        uses: ./.github/actions/discord-notify
        with:
          status: ${{ job.status }}
          platform: iOS
          environment: production
          build-version: ${{ needs.pre-release-checks.outputs.build-version }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  # ─── GITHUB RELEASE ────────────────────────────────────────────────────────────
  create-github-release:
    name: Create GitHub Release
    needs: [pre-release-checks, release-build]
    if: always() && needs.release-build.result == 'success' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Download IPA artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444306234ed73cf57f4e8a1b  # v4.1.8
        with:
          pattern: ios-release-ipa-*
          path: release-artifacts/
          merge-multiple: true

      - name: Download reports artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444306234ed73cf57f4e8a1b  # v4.1.8
        with:
          pattern: ios-release-logs-*
          path: release-reports/
          merge-multiple: true

      - name: Generate release notes
        id: release-notes
        shell: bash
        env:
          VERSION: ${{ needs.pre-release-checks.outputs.build-version }}
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [[ -n "${PREV_TAG}" ]]; then
            CHANGES=$(git log --oneline "${PREV_TAG}..HEAD" 2>/dev/null || echo "See commit history")
          else
            CHANGES=$(git log --oneline -20 2>/dev/null || echo "See commit history")
          fi

          cat > release-notes.md << EOF
          ## Unity iOS Release v${VERSION}

          **Platform:** iOS
          **Build Number:** ${{ github.run_number }}
          **Commit:** \`${{ github.sha }}\`

          ### Changes
          ${CHANGES}

          ### Build Info
          - Environment: production
          - Runner: macos-unity-xcode
          - Distribution signing: enabled
          - Clean build: yes
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@e7a8f85e1c67a31e6ed99a94b41bd0b71bbee6b8  # v2.3.2
        with:
          tag_name: ${{ github.ref_name }}
          name: iOS Release v${{ needs.pre-release-checks.outputs.build-version }}
          body_path: release-notes.md
          files: |
            release-artifacts/**/*
            release-reports/**/build-metadata.json
            release-reports/**/Game.ipa.sha256
          draft: false
          prerelease: ${{ contains(needs.pre-release-checks.outputs.build-version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
