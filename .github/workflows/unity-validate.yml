name: Unity Validate

on:
  workflow_call:
    inputs:
      project-path:
        description: Path to the Unity project root relative to the consumer repo root
        type: string
        required: false
        default: '.'
      unity-version:
        description: Unity editor version
        type: string
        required: true
      target-platform:
        description: Target build platform (Android, WebGL, Linux64, LinuxServer)
        type: string
        required: true
      environment:
        description: Build environment (development, staging, production)
        type: string
        required: false
        default: development
      build-config-path:
        description: Path to BuildConfig directory (relative to project-path)
        type: string
        required: false
        default: BuildConfig
      image-registry:
        description: Docker image registry
        type: string
        required: false
        default: ghcr.io
      image-namespace:
        description: Image repository namespace override (e.g. myorg/unity-images)
        type: string
        required: false
        default: ''
      image-name:
        description: Image name override (e.g. unity-editor)
        type: string
        required: false
        default: ''
      image-digest:
        description: Pinned image digest for the validation container
        type: string
        required: false
        default: ''
      release-mode:
        description: Enable strict validation gates
        type: boolean
        required: false
        default: false
      workflow-repository:
        description: >
          Repository that owns this workflow (owner/repo). Must be the
          owner/repo of the unity-build-workflows toolkit. REQUIRED — the
          reusable workflow cannot auto-detect its own source repo cross-repo.
        type: string
        required: false
        default: ''
      workflow-ref:
        description: >
          Git ref or SHA of the workflow repository to checkout as the toolkit.
          Required. Must match the @<ref> used in the caller's `uses:` reference.
        type: string
        required: false
        default: ''
      integration-mode:
        description: >
          How the toolkit is supplied: 'remote' (default) checks out from
          workflow-repository@workflow-ref; 'submodule' symlinks from the
          consumer repo's checked-out submodule at toolkit-path.
        type: string
        required: false
        default: remote
      toolkit-path:
        description: >
          Relative path within the consumer repo where the toolkit submodule
          lives (submodule mode only). Must not start with '/' or contain '..'.
          Ignored in remote mode.
        type: string
        required: false
        default: tools/unity-build-workflows

    secrets:
      UNITY_LICENSE:
        required: false
      UNITY_EMAIL:
        required: false
      UNITY_PASSWORD:
        required: false

    outputs:
      validation-passed:
        description: Whether validation passed
        value: ${{ jobs.validate.outputs.validation-passed }}
      build-config-valid:
        description: Whether the BuildConfig is valid
        value: ${{ jobs.validate.outputs.build-config-valid }}

jobs:
  validate:
    name: Validate (${{ inputs.target-platform }})
    runs-on: ubuntu-latest
    outputs:
      validation-passed: ${{ steps.set-result.outputs.validation-passed }}
      build-config-valid: ${{ steps.set-result.outputs.build-config-valid }}

    steps:
      # ── 0. Free disk space for large Unity Docker images ─────────────────────
      - name: Free disk space
        shell: bash
        run: |
          echo "Before cleanup:"
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost /opt/hostedtoolcache/CodeQL 2>/dev/null || true
          sudo docker image prune --all --force 2>/dev/null || true
          echo "After cleanup:"
          df -h /

      # ── 1. Consumer repo checkout ─────────────────────────────────────────────
      - name: Checkout consumer repo
        uses: actions/checkout@v4
        with:
          path: project
          lfs: true

      # ── 2. Toolkit setup ─────────────────────────────────────────────────────
      - name: Setup toolkit
        id: toolkit
        shell: bash
        env:
          INTEGRATION_MODE: ${{ inputs.integration-mode }}
          TOOLKIT_PATH_INPUT: ${{ inputs.toolkit-path }}
          WORKFLOW_REPO: ${{ inputs.workflow-repository }}
          WORKFLOW_REF: ${{ inputs.workflow-ref }}
        run: |
          MODE="${INTEGRATION_MODE:-remote}"

          if [ "$MODE" = "submodule" ]; then
            TP="${TOOLKIT_PATH_INPUT:-tools/unity-build-workflows}"
            # Reject path traversal and absolute paths
            if [[ "$TP" == /* ]] || [[ "$TP" == *..* ]]; then
              echo "::error::toolkit-path must be a relative path with no '..' components. Got: '$TP'"
              exit 1
            fi
            SUBMODULE_SRC="project/${TP}"
            if [ ! -d "$SUBMODULE_SRC" ]; then
              echo "::error::toolkit-path submodule not found at '${SUBMODULE_SRC}'."
              echo "::error::Ensure '${TP}' is initialized: git submodule update --init '${TP}'"
              exit 1
            fi
            mkdir -p .ci
            ln -sf "$(realpath "${SUBMODULE_SRC}")" .ci/unity-build-workflows
            echo "[toolkit] Linked submodule: ${SUBMODULE_SRC} → .ci/unity-build-workflows"
            SHA=$(git -C "${SUBMODULE_SRC}" rev-parse HEAD 2>/dev/null || echo "unknown")
            echo "[toolkit] Submodule commit: ${SHA}"
          else
            # remote mode — require explicit repo + ref
            if [ -z "$WORKFLOW_REPO" ]; then
              echo "::error::workflow-repository input is required (integration-mode: remote)."
              echo "::error::Add to your caller workflow's 'with:' block:"
              echo "::error::  workflow-repository: <OWNER>/unity-build-workflows"
              exit 1
            fi
            if [ -z "$WORKFLOW_REF" ]; then
              echo "::error::workflow-ref input is required (integration-mode: remote)."
              echo "::error::Add to your caller workflow's 'with:' block:"
              echo "::error::  workflow-ref: <REF>"
              exit 1
            fi
            echo "repo=${WORKFLOW_REPO}" >> "$GITHUB_OUTPUT"
            echo "ref=${WORKFLOW_REF}"   >> "$GITHUB_OUTPUT"
          fi
          echo "mode=${MODE}" >> "$GITHUB_OUTPUT"
          echo "TOOLKIT_PATH=.ci/unity-build-workflows" >> "$GITHUB_ENV"

      - name: Checkout toolkit (remote mode)
        if: steps.toolkit.outputs.mode == 'remote'
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.toolkit.outputs.repo }}
          ref: ${{ steps.toolkit.outputs.ref }}
          path: .ci/unity-build-workflows
          persist-credentials: false

      - name: Report toolkit version
        shell: bash
        run: |
          git -C .ci/unity-build-workflows log -1 --format="Toolkit: %H (%s)" 2>/dev/null \
            || echo "Toolkit version: unknown" 

      # ── 3. Compute effective project path ─────────────────────────────────────
      - name: Compute effective project path
        id: paths
        shell: bash
        run: |
          PP="${{ inputs.project-path }}"
          if [ "$PP" = "." ] || [ -z "$PP" ]; then
            echo "project-root=project" >> "$GITHUB_OUTPUT"
          else
            echo "project-root=project/${PP}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve Unity image
        id: resolve-image
        uses: ./.ci/unity-build-workflows/.github/actions/resolve-unity-image
        with:
          unity-version: ${{ inputs.unity-version }}
          target-platform: ${{ inputs.target-platform }}
          image-registry: ${{ inputs.image-registry }}
          image-namespace: ${{ inputs.image-namespace }}
          image-name: ${{ inputs.image-name }}
          image-digest: ${{ inputs.image-digest }}
          release-mode: ${{ inputs.release-mode }}

      - name: Run BuildConfig validation in container
        id: validate-container
        uses: ./.ci/unity-build-workflows/.github/actions/run-unity-container
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          project-path: ${{ steps.paths.outputs.project-root }}
          unity-version: ${{ inputs.unity-version }}
          target-platform: ${{ inputs.target-platform }}
          environment: ${{ inputs.environment }}
          build-config-path: ${{ inputs.build-config-path }}
          image-reference: ${{ steps.resolve-image.outputs.image-reference }}
          image-digest: ${{ steps.resolve-image.outputs.image-digest }}
          command: validate
          release-mode: ${{ inputs.release-mode }}

      - name: Run workflow contract checks (host)
        id: contract-check
        shell: bash
        env:
          PROJECT_ROOT: ${{ steps.paths.outputs.project-root }}
          BUILD_CONFIG_PATH: ${{ inputs.build-config-path }}
          TARGET_PLATFORM: ${{ inputs.target-platform }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          python3 "${TOOLKIT_PATH}/scripts/common/validate_workflow_contract.py" \
            --project-path "$PROJECT_ROOT" \
            --build-config-path "$BUILD_CONFIG_PATH" \
            --target-platform "$TARGET_PLATFORM" \
            --environment "$ENVIRONMENT"

      - name: Set validation result
        id: set-result
        if: always()
        shell: bash
        env:
          CONTAINER_EXIT: ${{ steps.validate-container.outputs.exit-code }}
          CONTRACT_RESULT: ${{ steps.contract-check.outcome }}
        run: |
          PASSED="true"
          BUILD_CONFIG_VALID="true"

          if [ "$CONTAINER_EXIT" != "0" ]; then
            PASSED="false"
            BUILD_CONFIG_VALID="false"
          fi
          if [ "$CONTRACT_RESULT" != "success" ]; then
            PASSED="false"
          fi

          echo "validation-passed=${PASSED}"            >> "$GITHUB_OUTPUT"
          echo "build-config-valid=${BUILD_CONFIG_VALID}" >> "$GITHUB_OUTPUT"
          echo "Validation passed: ${PASSED} | BuildConfig valid: ${BUILD_CONFIG_VALID}"

      - name: Collect container output
        if: always()
        uses: ./.ci/unity-build-workflows/.github/actions/collect-container-output
        with:
          target-platform: ${{ inputs.target-platform }}
          environment: ${{ inputs.environment }}
          command: validate
          container-exit-code: ${{ steps.validate-container.outputs.exit-code }}
          log-path: ${{ steps.validate-container.outputs.log-path }}
          report-path: ${{ steps.validate-container.outputs.report-path }}

      - name: Fail on validation errors
        if: steps.set-result.outputs.validation-passed != 'true'
        shell: bash
        run: |
          echo "::error::Validation failed. Check container output and workflow contract logs above."
          exit 1
