name: Unity Validate (Reusable)

on:
  workflow_call:
    inputs:
      project-path:
        description: "Path to Unity project root"
        type: string
        default: "."
      unity-version:
        description: "Unity version to use"
        type: string
        required: true
      build-config-path:
        description: "Path to BuildConfig folder"
        type: string
        default: "BuildConfig"
      target-platform:
        description: "Target build platform"
        type: string
        required: true
      fail-on-warnings:
        description: "Fail if validation warnings found"
        type: boolean
        default: false
    secrets:
      UNITY_LICENSE:
        required: true
      UNITY_EMAIL:
        required: false
      UNITY_PASSWORD:
        required: false
    outputs:
      validation-passed:
        description: "Whether validation passed"
        value: ${{ jobs.validate.outputs.validation-passed }}
      build-config-valid:
        description: "Whether BuildConfig is valid"
        value: ${{ jobs.validate.outputs.build-config-valid }}

jobs:
  validate:
    name: Validate Unity Project
    runs-on: ubuntu-latest
    outputs:
      validation-passed: ${{ steps.validate-result.outputs.passed }}
      build-config-valid: ${{ steps.validate-config.outputs.valid }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Unity
        uses: ./.github/actions/setup-unity
        with:
          unity-version: ${{ inputs.unity-version }}
          project-path: ${{ inputs.project-path }}
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      - name: Validate BuildConfig
        id: validate-config
        uses: ./.github/actions/validate-project
        with:
          project-path: ${{ inputs.project-path }}
          build-config-path: ${{ inputs.build-config-path }}
          target-platform: ${{ inputs.target-platform }}
          fail-on-warnings: ${{ inputs.fail-on-warnings }}

      - name: Validate workflow contract
        run: |
          python3 scripts/common/validate_workflow_contract.py \
            --config-path "${{ inputs.project-path }}/${{ inputs.build-config-path }}" \
            --platform "${{ inputs.target-platform }}"

      - name: Set validation result
        id: validate-result
        if: always()
        run: |
          if [[ "${{ steps.validate-config.outputs.valid }}" == "true" ]]; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: |
            validation-report.json
            validation-warnings.txt
          retention-days: 7
          if-no-files-found: ignore
