name: Unity Test

on:
  workflow_call:
    inputs:
      project-path:
        description: Path to the Unity project root relative to the consumer repo root
        type: string
        required: false
        default: '.'
      unity-version:
        description: Unity editor version
        type: string
        required: true
      target-platform:
        description: Target platform (used for image resolution and cache key)
        type: string
        required: false
        default: Linux64
      test-level:
        description: Tests to run (editmode, playmode, full)
        type: string
        required: false
        default: editmode
      cache-mode:
        description: Library cache strategy (off, safe, aggressive)
        type: string
        required: false
        default: safe
      image-registry:
        description: Docker image registry
        type: string
        required: false
        default: ghcr.io
      image-namespace:
        description: Image repository namespace override (e.g. myorg/unity-images)
        type: string
        required: false
        default: ''
      image-name:
        description: Image name override (e.g. unity-editor)
        type: string
        required: false
        default: ''
      image-digest:
        description: Pinned image digest for the test container
        type: string
        required: false
        default: ''
      workflow-repository:
        description: >
          Repository that owns this workflow (owner/repo). Must be the
          owner/repo of the unity-build-workflows toolkit. REQUIRED — the
          reusable workflow cannot auto-detect its own source repo cross-repo.
        type: string
        required: false
        default: ''
      workflow-ref:
        description: >
          Git ref or SHA of the workflow repository to checkout as the toolkit.
          Required. Must match the @<ref> used in the caller's `uses:` reference.
        type: string
        required: false
        default: ''

    secrets:
      UNITY_LICENSE:
        required: false
      UNITY_EMAIL:
        required: false
      UNITY_PASSWORD:
        required: false

    outputs:
      tests-passed:
        description: Whether all tests passed
        value: ${{ jobs.test.outputs.tests-passed }}
      test-report-artifact:
        description: Name of the uploaded test report artifact
        value: ${{ jobs.test.outputs.test-report-artifact }}

jobs:
  test:
    name: Run Tests (${{ inputs.test-level }})
    runs-on: ubuntu-latest
    outputs:
      tests-passed: ${{ steps.check-results.outputs.tests-passed }}
      test-report-artifact: ${{ steps.set-artifact-name.outputs.artifact-name }}

    steps:
      # ── 1. Consumer repo checkout ─────────────────────────────────────────────
      - name: Checkout consumer repo
        uses: actions/checkout@v4
        with:
          path: project
          lfs: true

      # ── 2. Toolkit checkout ───────────────────────────────────────────────────
      - name: Resolve toolkit ref
        id: toolkit
        shell: bash
        run: |
          REPO="${{ inputs.workflow-repository }}"
          REF="${{ inputs.workflow-ref }}"
          # github.workflow_ref/_sha resolve to the TOP-LEVEL caller workflow (the
          # consumer), NOT this reusable workflow's repo — they cannot self-identify
          # the toolkit in cross-repo use. Auto-derive only when the caller IS this
          # repo (same-repo CI); otherwise require explicit inputs and fail fast.
          if [ -z "$REPO" ]; then
            echo "::error::workflow-repository input is required."
            echo "::error::In your caller workflow 'with:' block add:"
            echo "::error::  workflow-repository: <OWNER>/unity-build-workflows"
            echo "::error::Must match the repo in 'uses: <OWNER>/unity-build-workflows/...@<REF>'."
            exit 1
          fi
          if [ -z "$REF" ]; then
            echo "::error::workflow-ref input is required."
            echo "::error::In your caller workflow 'with:' block add:"
            echo "::error::  workflow-ref: <REF>"
            echo "::error::Must match @<REF> in 'uses: .../unity-build-workflows/...@<REF>'."
            exit 1
          fi
          echo "repo=${REPO}" >> "$GITHUB_OUTPUT"
          echo "ref=${REF}"   >> "$GITHUB_OUTPUT"
      - name: Checkout toolkit (unity-build-workflows)
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.toolkit.outputs.repo }}
          ref: ${{ steps.toolkit.outputs.ref }}
          path: .ci/unity-build-workflows
          persist-credentials: false

      # ── 3. Compute effective project path ─────────────────────────────────────
      - name: Compute effective project path
        id: paths
        shell: bash
        run: |
          PP="${{ inputs.project-path }}"
          if [ "$PP" = "." ] || [ -z "$PP" ]; then
            echo "project-root=project" >> "$GITHUB_OUTPUT"
          else
            echo "project-root=project/${PP}" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore Docker cache
        uses: ./.ci/unity-build-workflows/.github/actions/restore-docker-cache
        with:
          project-path: ${{ steps.paths.outputs.project-root }}
          unity-version: ${{ inputs.unity-version }}
          target-platform: ${{ inputs.target-platform }}
          cache-mode: ${{ inputs.cache-mode }}

      - name: Resolve Unity image
        id: resolve-image
        uses: ./.ci/unity-build-workflows/.github/actions/resolve-unity-image
        with:
          unity-version: ${{ inputs.unity-version }}
          target-platform: ${{ inputs.target-platform }}
          image-registry: ${{ inputs.image-registry }}
          image-namespace: ${{ inputs.image-namespace }}
          image-name: ${{ inputs.image-name }}
          image-variant: linux
          image-digest: ${{ inputs.image-digest }}

      - name: Run EditMode tests
        id: test-editmode
        if: inputs.test-level == 'editmode' || inputs.test-level == 'full'
        uses: ./.ci/unity-build-workflows/.github/actions/run-unity-container
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          project-path: ${{ steps.paths.outputs.project-root }}
          unity-version: ${{ inputs.unity-version }}
          target-platform: ${{ inputs.target-platform }}
          image-reference: ${{ steps.resolve-image.outputs.image-reference }}
          image-digest: ${{ steps.resolve-image.outputs.image-digest }}
          command: test-editmode
          cache-mode: ${{ inputs.cache-mode }}
          output-path: TestResults/editmode

      - name: Run PlayMode tests
        id: test-playmode
        if: inputs.test-level == 'playmode' || inputs.test-level == 'full'
        uses: ./.ci/unity-build-workflows/.github/actions/run-unity-container
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          project-path: ${{ steps.paths.outputs.project-root }}
          unity-version: ${{ inputs.unity-version }}
          target-platform: ${{ inputs.target-platform }}
          image-reference: ${{ steps.resolve-image.outputs.image-reference }}
          image-digest: ${{ steps.resolve-image.outputs.image-digest }}
          command: test-playmode
          cache-mode: ${{ inputs.cache-mode }}
          output-path: TestResults/playmode

      - name: Check test results
        id: check-results
        if: always()
        shell: bash
        env:
          EDITMODE_EXIT: ${{ steps.test-editmode.outputs.exit-code || '0' }}
          PLAYMODE_EXIT: ${{ steps.test-playmode.outputs.exit-code || '0' }}
          TEST_LEVEL: ${{ inputs.test-level }}
        run: |
          PASSED="true"
          FAILURES=0

          # Parse XML result files if present
          for xml_file in TestResults/**/*.xml TestResults/*.xml; do
            [ -f "$xml_file" ] || continue
            FILE_FAILS=$(python3 - "$xml_file" << 'PYEOF'
          import sys, xml.etree.ElementTree as ET
          try:
              root = ET.parse(sys.argv[1]).getroot()
              print(int(root.get('failures', 0)) + int(root.get('errors', 0)))
          except Exception:
              print(0)
          PYEOF
            )
            FAILURES=$((FAILURES + FILE_FAILS))
          done

          # Also fail if container itself exited non-zero
          [ "$EDITMODE_EXIT" != "0" ] && [ "$EDITMODE_EXIT" != "" ] && FAILURES=$((FAILURES + 1))
          [ "$PLAYMODE_EXIT"  != "0" ] && [ "$PLAYMODE_EXIT"  != "" ] && FAILURES=$((FAILURES + 1))

          [ "$FAILURES" -gt 0 ] && PASSED="false"

          echo "tests-passed=${PASSED}" >> "$GITHUB_OUTPUT"
          echo "Test failures: ${FAILURES} | Passed: ${PASSED}"

      - name: Set artifact name
        id: set-artifact-name
        shell: bash
        run: |
          echo "artifact-name=test-results-${{ inputs.test-level }}-${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Collect EditMode output
        if: always() && (inputs.test-level == 'editmode' || inputs.test-level == 'full')
        uses: ./.ci/unity-build-workflows/.github/actions/collect-container-output
        with:
          target-platform: ${{ inputs.target-platform }}
          command: test-editmode
          container-exit-code: ${{ steps.test-editmode.outputs.exit-code || '0' }}
          log-path: ${{ steps.test-editmode.outputs.log-path }}
          report-path: ${{ steps.test-editmode.outputs.report-path }}

      - name: Collect PlayMode output
        if: always() && (inputs.test-level == 'playmode' || inputs.test-level == 'full')
        uses: ./.ci/unity-build-workflows/.github/actions/collect-container-output
        with:
          target-platform: ${{ inputs.target-platform }}
          command: test-playmode
          container-exit-code: ${{ steps.test-playmode.outputs.exit-code || '0' }}
          log-path: ${{ steps.test-playmode.outputs.log-path }}
          report-path: ${{ steps.test-playmode.outputs.report-path }}

      - name: Upload test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.set-artifact-name.outputs.artifact-name }}
          path: TestResults/
          retention-days: 14
          if-no-files-found: ignore

      - name: Publish Test Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Unity Tests (${{ inputs.test-level }})
          path: TestResults/**/*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Fail if tests failed
        if: steps.check-results.outputs.tests-passed == 'false'
        shell: bash
        run: |
          echo "::error::One or more Unity tests failed. See test report artifact for details."
          exit 1
