name: Unity Build

# Orchestrator for all supported Unity platforms.
# Docker platforms (Android, WebGL, Linux64, LinuxServer): run inside containers on ubuntu-latest.
# iOS: runs natively on ios-runner-label runner (default: macos-unity-xcode — self-hosted macOS).
# Supported platforms: Android, WebGL, Linux64, LinuxServer, iOS

on:
  workflow_call:
    inputs:
      project-path:
        description: Path to the Unity project root relative to the consumer repo root
        type: string
        required: false
        default: '.'
      unity-version:
        description: Unity editor version (e.g., 6000.0.23f1)
        type: string
        required: true
      target-platform:
        description: Target platform (Android, WebGL, Linux64, LinuxServer, iOS)
        type: string
        required: true
      environment:
        description: Build environment (development, staging, production)
        type: string
        required: false
        default: development
      build-config-path:
        description: Path to BuildConfig directory (relative to project-path)
        type: string
        required: false
        default: BuildConfig
      test-level:
        description: Tests to run (none, editmode, playmode, full)
        type: string
        required: false
        default: editmode
      cache-mode:
        description: Library cache strategy (off, safe, aggressive)
        type: string
        required: false
        default: safe
      build-addressables:
        description: Build Addressables content before player build
        type: boolean
        required: false
        default: false
      clean-build:
        description: Delete Library/ before building (force full reimport)
        type: boolean
        required: false
        default: false
      upload-artifact:
        description: Upload build artifact after successful build
        type: boolean
        required: false
        default: true
      artifact-retention-days:
        description: Days to retain build artifacts
        type: number
        required: false
        default: 14
      release-mode:
        description: Enable release gates (digest-pinned image, no dev flags, fail-on-warnings)
        type: boolean
        required: false
        default: false
      deploy-target:
        description: Deployment target (none, google-play, cloudflare)
        type: string
        required: false
        default: none
      image-registry:
        description: Docker image registry
        type: string
        required: false
        default: ghcr.io
      image-namespace:
        description: Image repository namespace override (e.g. myorg/unity-images)
        type: string
        required: false
        default: ''
      image-name:
        description: Image name override (e.g. unity-editor)
        type: string
        required: false
        default: ''
      image-digest:
        description: Pinned image digest (required when release-mode=true)
        type: string
        required: false
        default: ''
      ios-runner-label:
        description: >
          Self-hosted runner label for macOS Unity+Xcode builds (iOS only).
          Must be a macOS runner with Unity iOS Build Support installed.
          GitHub-hosted macos-latest is NOT supported.
        type: string
        required: false
        default: macos-unity-xcode
      workflow-repository:
        description: >
          Repository that owns this workflow (owner/repo). Must be the
          owner/repo of the unity-build-workflows toolkit. REQUIRED — the
          reusable workflow cannot auto-detect its own source repo cross-repo.
        type: string
        required: false
        default: ''
      workflow-ref:
        description: >
          Git ref or SHA of the workflow repository to checkout as the toolkit.
          Required. Must match the @<ref> used in the caller's `uses:` reference.
        type: string
        required: false
        default: ''

    secrets:
      UNITY_LICENSE:
        required: true
      UNITY_EMAIL:
        required: false
      UNITY_PASSWORD:
        required: false
      ANDROID_KEYSTORE_BASE64:
        required: false
      ANDROID_KEYSTORE_PASS:
        required: false
      ANDROID_KEY_ALIAS:
        required: false
      ANDROID_KEY_PASS:
        required: false
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON:
        required: false
      CLOUDFLARE_API_TOKEN:
        required: false
      CLOUDFLARE_ACCOUNT_ID:
        required: false
      IOS_DISTRIBUTION_CERTIFICATE_BASE64:
        required: false
      IOS_DISTRIBUTION_CERTIFICATE_PASSWORD:
        required: false
      IOS_PROVISIONING_PROFILE_BASE64:
        required: false
      APP_STORE_CONNECT_KEY_ID:
        required: false
      APP_STORE_CONNECT_ISSUER_ID:
        required: false
      APP_STORE_CONNECT_PRIVATE_KEY:
        required: false
      DISCORD_WEBHOOK_URL:
        required: false

    outputs:
      build-artifact-name:
        description: Name of the uploaded build artifact
        value: ${{ jobs.report.outputs.build-artifact-name }}
      build-version:
        description: Resolved build version string
        value: ${{ jobs.detect-changes.outputs.build-version }}
      tests-passed:
        description: Whether tests passed
        value: ${{ jobs.test.outputs.tests-passed }}

jobs:
  # ─── 1. CHANGE DETECTION ───────────────────────────────────────────────────────
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      should-build: ${{ steps.filter.outputs.should-build }}
      should-run-tests: ${{ steps.filter.outputs.should-run-tests }}
      build-version: ${{ steps.resolve-version.outputs.version }}

    steps:
      # ── 1. Consumer repo checkout ───────────────────────────────────────────
      - name: Checkout consumer repo
        uses: actions/checkout@v4
        with:
          path: project
          fetch-depth: 2

      # ── 2. Toolkit checkout ─────────────────────────────────────────────────
      - name: Resolve toolkit ref
        id: toolkit
        shell: bash
        run: |
          REPO="${{ inputs.workflow-repository }}"
          REF="${{ inputs.workflow-ref }}"
          # github.workflow_ref/_sha resolve to the TOP-LEVEL caller workflow (the
          # consumer), NOT this reusable workflow's repo — they cannot self-identify
          # the toolkit in cross-repo use. Auto-derive only when the caller IS this
          # repo (same-repo CI); otherwise require explicit inputs and fail fast.
          if [ -z "$REPO" ]; then
            echo "::error::workflow-repository input is required."
            echo "::error::In your caller workflow 'with:' block add:"
            echo "::error::  workflow-repository: <OWNER>/unity-build-workflows"
            echo "::error::Must match the repo in 'uses: <OWNER>/unity-build-workflows/...@<REF>'."
            exit 1
          fi
          if [ -z "$REF" ]; then
            echo "::error::workflow-ref input is required."
            echo "::error::In your caller workflow 'with:' block add:"
            echo "::error::  workflow-ref: <REF>"
            echo "::error::Must match @<REF> in 'uses: .../unity-build-workflows/...@<REF>'."
            exit 1
          fi
          echo "repo=${REPO}" >> "$GITHUB_OUTPUT"
          echo "ref=${REF}"   >> "$GITHUB_OUTPUT"
      - name: Checkout toolkit (unity-build-workflows)
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.toolkit.outputs.repo }}
          ref: ${{ steps.toolkit.outputs.ref }}
          path: .ci/unity-build-workflows
          persist-credentials: false

      # ── 3. Compute effective project path ───────────────────────────────────
      - name: Compute effective project path
        id: paths
        shell: bash
        run: |
          PP="${{ inputs.project-path }}"
          if [ "$PP" = "." ] || [ -z "$PP" ]; then
            echo "project-root=project" >> "$GITHUB_OUTPUT"
          else
            echo "project-root=project/${PP}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate platform executor
        shell: bash
        env:
          TARGET_PLATFORM: ${{ inputs.target-platform }}
          RUNNER_OS_VAL: ${{ runner.os }}
        run: |
          # Fail fast on bad platform/runner combos before dispatching any build job.
          # iOS requires macOS — this ubuntu runner is only the orchestrator; the iOS
          # build will be dispatched to ios-runner-label by the build-ios job.
          # Docker platforms (Android, WebGL, Linux64, LinuxServer) must not dispatch
          # to the macOS runner.
          if [[ -f ".ci/unity-build-workflows/scripts/common/resolve_platform_executor.py" ]]; then
            if [[ "${TARGET_PLATFORM}" == "iOS" ]]; then
              EXECUTOR=$(python3 .ci/unity-build-workflows/scripts/common/resolve_platform_executor.py \
                --target-platform iOS \
                --runner-os macOS)
              echo "executor=${EXECUTOR}"
              echo "::notice::iOS will be dispatched to ${EXECUTOR} runner"
            else
              EXECUTOR=$(python3 .ci/unity-build-workflows/scripts/common/resolve_platform_executor.py \
                --target-platform "${TARGET_PLATFORM}" \
                --runner-os "${RUNNER_OS_VAL}")
              echo "executor=${EXECUTOR}"
            fi
          else
            echo "::notice::resolve_platform_executor.py not yet available — using inline platform guard"
            case "${TARGET_PLATFORM}" in
              Android|WebGL|Linux64|LinuxServer|StandaloneLinux64)
                echo "executor=docker-unity"
                ;;
              iOS)
                echo "executor=macos-unity-xcode"
                echo "::notice::iOS build will be dispatched to macos-unity-xcode runner"
                ;;
              *)
                echo "::error::Unsupported target platform: '${TARGET_PLATFORM}'"
                echo "::error::Supported: Android, WebGL, Linux64, LinuxServer, iOS"
                exit 1
                ;;
            esac
          fi

      - name: Detect changed paths
        id: filter
        shell: bash
        working-directory: project
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only HEAD 2>/dev/null || echo "")
          NON_DOC=$(echo "$CHANGED" | grep -vE "^(docs/|.*\.md$|README)" || true)

          if [ -z "$NON_DOC" ] && [ -n "$CHANGED" ]; then
            echo "Only documentation changed — skipping build."
            echo "should-build=false"      >> "$GITHUB_OUTPUT"
            echo "should-run-tests=false"  >> "$GITHUB_OUTPUT"
          else
            echo "should-build=true"       >> "$GITHUB_OUTPUT"
            echo "should-run-tests=true"   >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve build version
        id: resolve-version
        shell: bash
        env:
          PROJECT_ROOT: ${{ steps.paths.outputs.project-root }}
          BUILD_CONFIG_PATH: ${{ inputs.build-config-path }}
          ENVIRONMENT: ${{ inputs.environment }}
          GIT_REF: ${{ github.ref }}
        run: |
          VERSION=$(python3 .ci/unity-build-workflows/scripts/common/resolve_project_version.py \
            --project-path  "$PROJECT_ROOT" \
            --config-path   "$PROJECT_ROOT/$BUILD_CONFIG_PATH" \
            --environment   "$ENVIRONMENT" \
            --ref           "$GIT_REF")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved build version: ${VERSION}"

  # ─── 2. VALIDATE ───────────────────────────────────────────────────────────────
  # Skipped for iOS — validate uses Docker (ubuntu) which cannot run Unity iOS.
  # iOS build-ios job performs its own validation on the macOS runner.
  validate:
    name: Validate
    needs: detect-changes
    if: needs.detect-changes.outputs.should-build == 'true' && inputs.target-platform != 'iOS'
    uses: ./.github/workflows/unity-validate.yml
    with:
      project-path: ${{ inputs.project-path }}
      unity-version: ${{ inputs.unity-version }}
      target-platform: ${{ inputs.target-platform }}
      environment: ${{ inputs.environment }}
      build-config-path: ${{ inputs.build-config-path }}
      image-registry: ${{ inputs.image-registry }}
      image-namespace: ${{ inputs.image-namespace }}
      image-name: ${{ inputs.image-name }}
      image-digest: ${{ inputs.image-digest }}
      release-mode: ${{ inputs.release-mode }}
      workflow-repository: ${{ inputs.workflow-repository }}
      workflow-ref: ${{ inputs.workflow-ref }}
    secrets:
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
      UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
      UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

  # ─── 3. TEST ───────────────────────────────────────────────────────────────────
  test:
    name: Test
    needs: [detect-changes, validate]
    if: |
      needs.detect-changes.outputs.should-run-tests == 'true' &&
      inputs.test-level != 'none' &&
      needs.validate.outputs.validation-passed == 'true'
    uses: ./.github/workflows/unity-test.yml
    with:
      project-path: ${{ inputs.project-path }}
      unity-version: ${{ inputs.unity-version }}
      target-platform: ${{ inputs.target-platform }}
      test-level: ${{ inputs.test-level }}
      cache-mode: ${{ inputs.cache-mode }}
      image-registry: ${{ inputs.image-registry }}
      image-namespace: ${{ inputs.image-namespace }}
      image-name: ${{ inputs.image-name }}
      image-digest: ${{ inputs.image-digest }}
      workflow-repository: ${{ inputs.workflow-repository }}
      workflow-ref: ${{ inputs.workflow-ref }}
    secrets:
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
      UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
      UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

  # ─── 4. BUILD ──────────────────────────────────────────────────────────────────
  build-android:
    name: Build Android
    needs: [detect-changes, validate, test]
    if: |
      always() &&
      inputs.target-platform == 'Android' &&
      needs.detect-changes.outputs.should-build == 'true' &&
      needs.validate.outputs.validation-passed == 'true' &&
      (inputs.test-level == 'none' || needs.test.outputs.tests-passed == 'true' || needs.test.result == 'skipped')
    uses: ./.github/workflows/unity-build-android.yml
    with:
      project-path: ${{ inputs.project-path }}
      unity-version: ${{ inputs.unity-version }}
      environment: ${{ inputs.environment }}
      build-config-path: ${{ inputs.build-config-path }}
      cache-mode: ${{ inputs.cache-mode }}
      build-addressables: ${{ inputs.build-addressables }}
      upload-artifact: ${{ inputs.upload-artifact }}
      deploy-target: ${{ inputs.deploy-target }}
      clean-build: ${{ inputs.clean-build }}
      artifact-retention-days: ${{ inputs.artifact-retention-days }}
      release-mode: ${{ inputs.release-mode }}
      build-version: ${{ needs.detect-changes.outputs.build-version }}
      image-registry: ${{ inputs.image-registry }}
      image-namespace: ${{ inputs.image-namespace }}
      image-name: ${{ inputs.image-name }}
      image-digest: ${{ inputs.image-digest }}
      workflow-repository: ${{ inputs.workflow-repository }}
      workflow-ref: ${{ inputs.workflow-ref }}
    secrets: inherit

  build-webgl:
    name: Build WebGL
    needs: [detect-changes, validate, test]
    if: |
      always() &&
      inputs.target-platform == 'WebGL' &&
      needs.detect-changes.outputs.should-build == 'true' &&
      needs.validate.outputs.validation-passed == 'true' &&
      (inputs.test-level == 'none' || needs.test.outputs.tests-passed == 'true' || needs.test.result == 'skipped')
    uses: ./.github/workflows/unity-build-webgl.yml
    with:
      project-path: ${{ inputs.project-path }}
      unity-version: ${{ inputs.unity-version }}
      environment: ${{ inputs.environment }}
      build-config-path: ${{ inputs.build-config-path }}
      cache-mode: ${{ inputs.cache-mode }}
      build-addressables: ${{ inputs.build-addressables }}
      upload-artifact: ${{ inputs.upload-artifact }}
      deploy-target: ${{ inputs.deploy-target }}
      clean-build: ${{ inputs.clean-build }}
      artifact-retention-days: ${{ inputs.artifact-retention-days }}
      release-mode: ${{ inputs.release-mode }}
      build-version: ${{ needs.detect-changes.outputs.build-version }}
      image-registry: ${{ inputs.image-registry }}
      image-namespace: ${{ inputs.image-namespace }}
      image-name: ${{ inputs.image-name }}
      image-digest: ${{ inputs.image-digest }}
      workflow-repository: ${{ inputs.workflow-repository }}
      workflow-ref: ${{ inputs.workflow-ref }}
    secrets: inherit

  build-linux:
    name: Build Linux
    needs: [detect-changes, validate, test]
    if: |
      always() &&
      (inputs.target-platform == 'Linux64' || inputs.target-platform == 'LinuxServer') &&
      needs.detect-changes.outputs.should-build == 'true' &&
      needs.validate.outputs.validation-passed == 'true' &&
      (inputs.test-level == 'none' || needs.test.outputs.tests-passed == 'true' || needs.test.result == 'skipped')
    uses: ./.github/workflows/unity-build-linux.yml
    with:
      project-path: ${{ inputs.project-path }}
      unity-version: ${{ inputs.unity-version }}
      target-platform: ${{ inputs.target-platform }}
      environment: ${{ inputs.environment }}
      build-config-path: ${{ inputs.build-config-path }}
      cache-mode: ${{ inputs.cache-mode }}
      build-addressables: ${{ inputs.build-addressables }}
      upload-artifact: ${{ inputs.upload-artifact }}
      clean-build: ${{ inputs.clean-build }}
      artifact-retention-days: ${{ inputs.artifact-retention-days }}
      release-mode: ${{ inputs.release-mode }}
      build-version: ${{ needs.detect-changes.outputs.build-version }}
      image-registry: ${{ inputs.image-registry }}
      image-namespace: ${{ inputs.image-namespace }}
      image-name: ${{ inputs.image-name }}
      image-digest: ${{ inputs.image-digest }}
      workflow-repository: ${{ inputs.workflow-repository }}
      workflow-ref: ${{ inputs.workflow-ref }}
    secrets: inherit

  build-ios:
    name: Build iOS
    # iOS uses a macOS native runner — bypasses Docker-based validate/test jobs.
    # The build-ios workflow performs its own platform guard, BuildConfig validation,
    # and license activation on the ios-runner-label runner.
    needs: [detect-changes, validate, test]
    if: |
      always() &&
      inputs.target-platform == 'iOS' &&
      needs.detect-changes.outputs.should-build == 'true' &&
      (needs.validate.result == 'skipped' || needs.validate.result == 'success') &&
      (inputs.test-level == 'none' || needs.test.result == 'skipped' || needs.test.outputs.tests-passed == 'true')
    uses: ./.github/workflows/unity-build-ios.yml
    with:
      project-path: ${{ inputs.project-path }}
      unity-version: ${{ inputs.unity-version }}
      environment: ${{ inputs.environment }}
      build-config-path: ${{ inputs.build-config-path }}
      cache-mode: ${{ inputs.cache-mode }}
      build-addressables: ${{ inputs.build-addressables }}
      upload-artifact: ${{ inputs.upload-artifact }}
      clean-build: ${{ inputs.clean-build }}
      artifact-retention-days: ${{ inputs.artifact-retention-days }}
      build-version: ${{ needs.detect-changes.outputs.build-version }}
      ios-runner-label: ${{ inputs.ios-runner-label }}
      workflow-repository: ${{ inputs.workflow-repository }}
      workflow-ref: ${{ inputs.workflow-ref }}
    secrets: inherit

  # ─── 5. REPORT ─────────────────────────────────────────────────────────────────
  report:
    name: Build Report
    needs: [detect-changes, validate, test, build-android, build-webgl, build-linux, build-ios]
    if: always()
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
    outputs:
      build-artifact-name: ${{ steps.upload-report.outputs.artifact-name }}

    steps:
      # ── 1. Consumer repo checkout ─────────────────────────────────────────
      - name: Checkout consumer repo
        uses: actions/checkout@v4
        with:
          path: project

      # ── 2. Toolkit checkout ───────────────────────────────────────────────
      - name: Resolve toolkit ref
        id: toolkit
        shell: bash
        run: |
          REPO="${{ inputs.workflow-repository }}"
          REF="${{ inputs.workflow-ref }}"
          # github.workflow_ref/_sha resolve to the TOP-LEVEL caller workflow (the
          # consumer), NOT this reusable workflow's repo — they cannot self-identify
          # the toolkit in cross-repo use. Auto-derive only when the caller IS this
          # repo (same-repo CI); otherwise require explicit inputs and fail fast.
          if [ -z "$REPO" ]; then
            echo "::error::workflow-repository input is required."
            echo "::error::In your caller workflow 'with:' block add:"
            echo "::error::  workflow-repository: <OWNER>/unity-build-workflows"
            echo "::error::Must match the repo in 'uses: <OWNER>/unity-build-workflows/...@<REF>'."
            exit 1
          fi
          if [ -z "$REF" ]; then
            echo "::error::workflow-ref input is required."
            echo "::error::In your caller workflow 'with:' block add:"
            echo "::error::  workflow-ref: <REF>"
            echo "::error::Must match @<REF> in 'uses: .../unity-build-workflows/...@<REF>'."
            exit 1
          fi
          echo "repo=${REPO}" >> "$GITHUB_OUTPUT"
          echo "ref=${REF}"   >> "$GITHUB_OUTPUT"
      - name: Checkout toolkit (unity-build-workflows)
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.toolkit.outputs.repo }}
          ref: ${{ steps.toolkit.outputs.ref }}
          path: .ci/unity-build-workflows
          persist-credentials: false

      - name: Determine build result
        id: build-result
        shell: bash
        env:
          ANDROID_RESULT: ${{ needs.build-android.result }}
          WEBGL_RESULT: ${{ needs.build-webgl.result }}
          LINUX_RESULT: ${{ needs.build-linux.result }}
          IOS_RESULT: ${{ needs.build-ios.result }}
          PLATFORM: ${{ inputs.target-platform }}
        run: |
          case "$PLATFORM" in
            Android)      RESULT="$ANDROID_RESULT" ;;
            WebGL)        RESULT="$WEBGL_RESULT" ;;
            Linux64|LinuxServer) RESULT="$LINUX_RESULT" ;;
            iOS)          RESULT="$IOS_RESULT" ;;
            *)            RESULT="skipped" ;;
          esac
          echo "result=${RESULT}" >> "$GITHUB_OUTPUT"

      - name: Upload build report
        id: upload-report
        uses: ./.ci/unity-build-workflows/.github/actions/upload-build-report
        with:
          build-version: ${{ needs.detect-changes.outputs.build-version }}
          target-platform: ${{ inputs.target-platform }}
          environment: ${{ inputs.environment }}
          validation-passed: ${{ needs.validate.outputs.validation-passed || 'false' }}
          tests-passed: ${{ needs.test.outputs.tests-passed || 'skipped' }}
          build-result: ${{ steps.build-result.outputs.result }}
          retention-days: ${{ inputs.artifact-retention-days }}

      # ── Discord notification (if: always — notifies on success AND failure) ───
      - name: Discord notification
        if: always()
        uses: ./.ci/unity-build-workflows/.github/actions/discord-notify
        with:
          status: ${{ steps.build-result.outputs.result }}
          platform: ${{ inputs.target-platform }}
          environment: ${{ inputs.environment }}
          build-version: ${{ needs.detect-changes.outputs.build-version }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          artifact-name: ${{ steps.upload-report.outputs.artifact-name }}
