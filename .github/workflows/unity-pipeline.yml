  # ════════════════════════════════════════════════════════════════════════════
  # JOB 10: build-ios
  #   Only triggered when flow resolver sets build-ios=true (manual dispatch only).
  #   runner-mode HARDCODED to self-hosted-macos. Reusable exits 0 with
  #   result=blocked if no macOS runner is registered.
  # ════════════════════════════════════════════════════════════════════════════
  build-ios:
    name: Build iOS
    needs: [resolve-config, validate-project, build-addressables]
    if: >-
      !cancelled() &&
      needs.validate-project.result == 'success' &&
      (needs.build-addressables.result == 'success' || needs.build-addressables.result == 'skipped') &&
      needs.resolve-config.outputs.build-ios == 'true'
    uses: ./.github/workflows/reusable-build-platform.yml
    with:
      platform:            iOS
      unity-version:       ${{ needs.resolve-config.outputs.unity-version }}
      project-path:        ${{ needs.resolve-config.outputs.project-path }}
      environment:         ${{ needs.resolve-config.outputs.environment }}
      runner-mode:         self-hosted-macos
      # iOS is always local macOS — literal labels (iOS never uses github-hosted/docker).
      runner-labels:       '["self-hosted","macOS"]'
      build-engine:        local
      activation-strategy: preactivated
      clean-build:         ${{ fromJSON(needs.resolve-config.outputs.clean-build) }}
      build-addressables:  false
      toolkit-ref:         ${{ needs.resolve-config.outputs.toolkit-ref }}
      define-symbols:      ${{ needs.resolve-config.outputs.define-symbols }}
      build-timeout-minutes:   ${{ fromJSON(needs.resolve-config.outputs.build-timeout-minutes) }}
      cache-library:           ${{ fromJSON(needs.resolve-config.outputs.cache-library) }}
      cache-gradle:            ${{ fromJSON(needs.resolve-config.outputs.cache-gradle) }}
      cache-addressables:      ${{ fromJSON(needs.resolve-config.outputs.cache-addressables) }}
      cache-nuget:             ${{ fromJSON(needs.resolve-config.outputs.cache-nuget) }}
      artifact-retention-days: ${{ fromJSON(needs.resolve-config.outputs.artifact-retention-days) }}
      artifact-compression:    ${{ needs.resolve-config.outputs.artifact-compression }}
      build-method:            ${{ needs.resolve-config.outputs.build-method }}
      runner-windows-label:    ${{ needs.resolve-config.outputs.runner-windows-label }}
      runner-macos-label:      ${{ needs.resolve-config.outputs.runner-macos-label }}
      runner-linux-label:      ${{ needs.resolve-config.outputs.runner-linux-label }}
    secrets: inherit

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 10: final-report
  # ════════════════════════════════════════════════════════════════════════════
  final-report:
    name: Final Report
    needs:
      - resolve-config
      - validate-project
      - unity-tests
      - build-addressables
      - build-android
      - build-webgl
      - build-linux64
      - build-linuxserver
      - build-windows64
      - build-ios
    if: always()
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-config.outputs.gh-environment }}
    steps:
      - name: Write step summary
        shell: bash
        env:
          # ── Run context ────────────────────────────────────────────────────
          RUN_ID:        ${{ github.run_id }}
          COMMIT:        ${{ github.sha }}
          EVENT_NAME:    ${{ github.event_name }}
          REF_NAME:      ${{ github.ref_name }}
          BASE_REF:      ${{ github.base_ref }}
          # ── Resolved config ────────────────────────────────────────────────
          UNITY_VERSION: ${{ needs.resolve-config.outputs.unity-version }}
          FLOW_TYPE:     ${{ needs.resolve-config.outputs.flow-type }}
          ENVIRONMENT:   ${{ needs.resolve-config.outputs.environment }}
          RUNNER_MODE:   ${{ inputs.runner-mode || 'docker' }}
          # ── Resolver platform flags (true/false) ───────────────────────────
          SEL_ANDROID:     ${{ needs.resolve-config.outputs.build-android }}
          SEL_WEBGL:       ${{ needs.resolve-config.outputs.build-webgl }}
          SEL_LINUX64:     ${{ needs.resolve-config.outputs.build-linux64 }}
          SEL_LINUXSERVER: ${{ needs.resolve-config.outputs.build-linuxserver }}
          SEL_WINDOWS64:   ${{ needs.resolve-config.outputs.build-windows64 }}
          SEL_IOS:         ${{ needs.resolve-config.outputs.build-ios }}
          SEL_ADDR:        ${{ needs.resolve-config.outputs.build-addressables }}
          SEL_TESTS:       ${{ needs.resolve-config.outputs.run-tests }}
          TEST_MODE:       ${{ needs.resolve-config.outputs.test-mode }}
          SIGNING:         ${{ needs.resolve-config.outputs.signing }}
          PLATFORM_SOURCE: ${{ needs.resolve-config.outputs.platform-source }}
          # ── Repository Variables (for report display) ─────────────────────
          VAR_DEV_PLAT: ${{ vars.DEVELOP_BUILD_PLATFORMS || '' }}
          VAR_STG_PLAT: ${{ vars.STAGING_BUILD_PLATFORMS || '' }}
          VAR_REL_PLAT: ${{ vars.RELEASE_BUILD_PLATFORMS || '' }}
          # ── Job results ────────────────────────────────────────────────────
          R_VALIDATE:    ${{ needs.validate-project.result }}
          R_TESTS:       ${{ needs.unity-tests.result }}
          R_ADDR:        ${{ needs.build-addressables.result }}
          R_ANDROID:     ${{ needs.build-android.result }}
          R_WEBGL:       ${{ needs.build-webgl.result }}
          R_LINUX64:     ${{ needs.build-linux64.result }}
          R_LINUXSERVER: ${{ needs.build-linuxserver.result }}
          R_WINDOWS64:   ${{ needs.build-windows64.result }}
          R_IOS:         ${{ needs.build-ios.result }}
        run: |
          emoji() {
            case "$1" in
              success)   echo "✅" ;;
              failure)   echo "❌" ;;
              skipped)   echo "⏭️" ;;
              cancelled) echo "🚫" ;;
              blocked)   echo "⛔" ;;
              *)         echo "❓" ;;
            esac
          }

          SELECTED="" SKIPPED="" BLOCKERS=""
          for plat in Android WebGL Linux64 LinuxServer Windows64; do
            case "$plat" in
              Android)     flag="${SEL_ANDROID}" ;;
              WebGL)       flag="${SEL_WEBGL}" ;;
              Linux64)     flag="${SEL_LINUX64}" ;;
              LinuxServer) flag="${SEL_LINUXSERVER}" ;;
              Windows64)   flag="${SEL_WINDOWS64}" ;;
            esac
            if [ "${flag}" = "true" ]; then
              SELECTED="${SELECTED:+$SELECTED, }${plat}"
            else
              SKIPPED="${SKIPPED:+$SKIPPED, }${plat}"
            fi
          done
          if [ "${SEL_IOS}" = "true" ]; then
            SELECTED="${SELECTED:+$SELECTED, }iOS"
            BLOCKERS="iOS requires self-hosted macOS runner (result: ${R_IOS})"
          else
            SKIPPED="${SKIPPED:+$SKIPPED, }iOS (auto-excluded)"
          fi
          [ -z "${SELECTED}" ] && SELECTED="(none)"
          [ -z "${SKIPPED}"  ] && SKIPPED="(none)"
          [ -z "${BLOCKERS}" ] && BLOCKERS="(none)"

          TARGET_BRANCH="${BASE_REF:--}"

          {
            echo "## Unity Build — Final Report"
            echo ""
            echo "### Run Info"
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Run ID | \`${RUN_ID}\` |"
            echo "| Commit | \`${COMMIT:0:8}\` |"
            echo "| Event | \`${EVENT_NAME}\` |"
            echo "| Branch | \`${REF_NAME}\` |"
            echo "| Target branch | \`${TARGET_BRANCH}\` |"
            echo "| Flow type | \`${FLOW_TYPE:-unknown}\` |"
            echo "| Unity version | \`${UNITY_VERSION:-unknown}\` |"
            echo "| Environment | \`${ENVIRONMENT:-unknown}\` |"
            echo "| Runner mode | \`${RUNNER_MODE}\` |"
            echo "| Signing | \`${SIGNING:-none}\` |"
            echo "| Platform source | \`${PLATFORM_SOURCE:-default}\` |"
            echo ""
            echo "### Platform Selection"
            echo "| | Platforms |"
            echo "|---|---|"
            echo "| Selected | ${SELECTED} |"
            echo "| Skipped  | ${SKIPPED} |"
            echo "| Blockers | ${BLOCKERS} |"
            echo ""
            if [ "${PLATFORM_SOURCE}" = "variable" ]; then
              echo "### Repository Variables"
              echo "| Variable | Value |"
              echo "|---|---|"
              [ -n "${VAR_DEV_PLAT}" ] && echo "| \`DEVELOP_BUILD_PLATFORMS\` | \`${VAR_DEV_PLAT}\` |"
              [ -n "${VAR_STG_PLAT}" ] && echo "| \`STAGING_BUILD_PLATFORMS\` | \`${VAR_STG_PLAT}\` |"
              [ -n "${VAR_REL_PLAT}" ] && echo "| \`RELEASE_BUILD_PLATFORMS\` | \`${VAR_REL_PLAT}\` |"
              echo ""
            fi
            echo ""
            echo "### Job Results"
            echo ""
            echo "**Infrastructure**"
            echo "| Job | Result |"
            echo "|---|---|"
            echo "| validate-project | $(emoji "${R_VALIDATE}") \`${R_VALIDATE}\` |"
            echo ""
            echo "**Tests** (test-mode: \`${TEST_MODE:-N/A}\`)"
            echo "| Job | Result | Artifact |"
            echo "|---|---|---|"
            echo "| unity-tests | $(emoji "${R_TESTS}") \`${R_TESTS}\` | \`unity-tests-${TEST_MODE:-All}\` |"
            echo ""
            echo "**Addressables**"
            echo "| Job | Result | Artifact |"
            echo "|---|---|---|"
            echo "| build-addressables | $(emoji "${R_ADDR}") \`${R_ADDR}\` | \`unity-build-Addressables\` |"
            echo ""
            echo "**Platform Builds**"
            echo "| Platform | Result | Artifact |"
            echo "|---|---|---|"
            echo "| Android     | $(emoji "${R_ANDROID}") \`${R_ANDROID}\` | \`unity-build-Android\` |"
            echo "| WebGL       | $(emoji "${R_WEBGL}") \`${R_WEBGL}\` | \`unity-build-WebGL\` |"
            echo "| Linux64     | $(emoji "${R_LINUX64}") \`${R_LINUX64}\` | \`unity-build-Linux64\` |"
            echo "| LinuxServer | $(emoji "${R_LINUXSERVER}") \`${R_LINUXSERVER}\` | \`unity-build-LinuxServer\` |"
            echo "| Windows64   | $(emoji "${R_WINDOWS64}") \`${R_WINDOWS64}\` | \`unity-build-Windows64\` |"
            echo "| iOS         | $(emoji "${R_IOS}") \`${R_IOS}\` | \`unity-build-iOS\` |"
            echo ""
            echo "> Log artifacts: \`unity-build-<Platform>-logs\` (retained 14 days)"
          } >> "$GITHUB_STEP_SUMMARY"

          FAILED=0
          for result in "${R_VALIDATE}" "${R_ANDROID}" "${R_WEBGL}" "${R_LINUX64}" "${R_LINUXSERVER}" "${R_WINDOWS64}"; do
            [ "${result}" = "failure" ] && FAILED=1
          done
          if [ "${FAILED}" -eq 1 ]; then
            echo "::error::One or more build jobs failed. See individual job logs."
            exit 1
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 12: notify-discord
  # ════════════════════════════════════════════════════════════════════════════
  notify-discord:
    name: Notify Discord
    needs:
      - resolve-config
      - validate-project
      - unity-tests
      - build-addressables
      - build-android
      - build-webgl
      - build-linux64
      - build-linuxserver
      - build-windows64
      - build-ios
      - final-report
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: unity-build-*
          path: ./artifacts

      - name: Derive overall status
        id: status
        shell: bash
        env:
          R_VALIDATE:    ${{ needs.validate-project.result }}
          R_ANDROID:     ${{ needs.build-android.result }}
          R_WEBGL:       ${{ needs.build-webgl.result }}
          R_LINUX64:     ${{ needs.build-linux64.result }}
          R_LINUXSERVER: ${{ needs.build-linuxserver.result }}
          R_WINDOWS64:   ${{ needs.build-windows64.result }}
        run: |
          set +e
          overall=success
          for r in "$R_VALIDATE" "$R_ANDROID" "$R_WEBGL" "$R_LINUX64" "$R_LINUXSERVER" "$R_WINDOWS64"; do
            [ "$r" = "cancelled" ] && overall=cancelled
          done
          if [ "$overall" != "cancelled" ]; then
            fail=0; ok=0
            [ "$R_VALIDATE" = "failure" ] && fail=1
            for r in "$R_ANDROID" "$R_WEBGL" "$R_LINUX64" "$R_LINUXSERVER" "$R_WINDOWS64"; do
              [ "$r" = "failure" ] && fail=1
              [ "$r" = "success" ] && ok=1
            done
            if [ "$fail" = 1 ] && [ "$ok" = 1 ]; then overall=partial
            elif [ "$fail" = 1 ]; then overall=failure
            else overall=success; fi
          fi
          echo "overall=$overall" >> "$GITHUB_OUTPUT"
          echo "Overall Discord status: $overall"

      # A local (./) composite action resolves from the runner workspace, which
      # for a reusable workflow is the CALLER's repo — not this toolkit. So we
      # check the toolkit out and reference the action from there.
      - name: Checkout toolkit (for the Discord action)
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: ${{ inputs.toolkit-repo }}
          ref: ${{ inputs.toolkit-ref }}
          path: .toolkit

      - name: Gather run context (commit message, author, duration)
        id: ctx
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          BUILD_DURATION=""

          # ── Commit message (first line) ───────────────────────────────────
          COMMIT_MSG=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}" \
            -q '.commit.message' 2>/dev/null | head -1) || true
          echo "commit-message=${COMMIT_MSG}" >> "$GITHUB_OUTPUT"

          # ── Commit author ─────────────────────────────────────────────────
          COMMIT_AUTHOR=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}" \
            -q '.commit.author.name' 2>/dev/null) || true
          echo "commit-author=${COMMIT_AUTHOR}" >> "$GITHUB_OUTPUT"

          # ── Build duration ────────────────────────────────────────────────
          START=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -q '.run_started_at' 2>/dev/null) || true
          if [ -n "${START}" ]; then
            START_EPOCH=$(date -u -d "${START}" +%s 2>/dev/null) || true
            if [ -n "${START_EPOCH}" ] && [ "${START_EPOCH}" -gt 0 ] 2>/dev/null; then
              NOW=$(date -u +%s)
              ELAPSED=$(( NOW - START_EPOCH ))
              if [ "${ELAPSED}" -ge 60 ]; then
                BUILD_DURATION="$(( ELAPSED / 60 ))m $(( ELAPSED % 60 ))s"
              else
                BUILD_DURATION="${ELAPSED}s"
              fi
            fi
          fi
          echo "build-duration=${BUILD_DURATION}" >> "$GITHUB_OUTPUT"

      - name: Gather per-platform error/warning counts + log artifact ids
        id: diag
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          DIAG=""
          TOTAL_ERRORS=0
          TOTAL_WARNINGS=0

          # ── Build name→id map from artifacts API ──────────────────────────
          ARTIFACT_MAP=$(gh api \
            "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
            -q '.artifacts[]|"\(.name) \(.id)"' 2>/dev/null) || true

          # ── Per-platform scan ─────────────────────────────────────────────
          for P in Android WebGL Linux64 LinuxServer Windows64 iOS; do
            LOG=$(find ./artifacts -path "*unity-build-${P}-logs*Editor.log" \
              -print 2>/dev/null | head -1) || true

            # Skip platforms with no log file — nothing to report
            [ -z "${LOG}" ] && continue

            errors=$(grep -cE '\): error |Aborting batchmode|BuildFailedException' \
              "${LOG}" 2>/dev/null) || errors=0
            warnings=$(grep -cE '\): warning ' \
              "${LOG}" 2>/dev/null) || warnings=0

            # Look up the logs artifact id from the map
            logsid=$(printf '%s\n' "${ARTIFACT_MAP}" \
              | grep "^unity-build-${P}-logs " \
              | awk '{print $2}' | head -1) || logsid=""

            binid=$(printf '%s\n' "${ARTIFACT_MAP}" \
              | grep "^unity-build-${P} " \
              | awk '{print $2}' | head -1) || binid=""

            DIAG="${DIAG}${P}=${errors},${warnings},${logsid},${binid}"$'\n'
            TOTAL_ERRORS=$(( TOTAL_ERRORS + errors ))
            TOTAL_WARNINGS=$(( TOTAL_WARNINGS + warnings ))
          done

          # ── Emit outputs ──────────────────────────────────────────────────
          {
            echo "platform-diagnostics<<EOF"
            printf '%s' "${DIAG}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "total-errors=${TOTAL_ERRORS}"   >> "$GITHUB_OUTPUT"
          echo "total-warnings=${TOTAL_WARNINGS}" >> "$GITHUB_OUTPUT"

      - name: Post build to Discord thread
        uses: ./.toolkit/.github/actions/discord-upload-build
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        with:
          status:              ${{ steps.status.outputs.overall }}
          flow-type:           ${{ needs.resolve-config.outputs.flow-type }}
          environment:         ${{ needs.resolve-config.outputs.environment }}
          run-url:             ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          commit-sha:          ${{ github.sha }}
          branch:              ${{ github.ref_name }}
          unity-version:       ${{ needs.resolve-config.outputs.unity-version }}
          result-android:      ${{ needs.build-android.result }}
          result-webgl:        ${{ needs.build-webgl.result }}
          result-linux64:      ${{ needs.build-linux64.result }}
          result-linuxserver:  ${{ needs.build-linuxserver.result }}
          result-windows64:    ${{ needs.build-windows64.result }}
          result-ios:          ${{ needs.build-ios.result }}
          result-addressables: ${{ needs.build-addressables.result }}
          result-tests:        ${{ needs.unity-tests.result }}
          thread-id:           ${{ vars.DISCORD_THREAD_ID }}
          artifact-dir:        ./artifacts
          attach-size-threshold-mb: '8'
          actor:               ${{ github.actor }}
          event:               ${{ github.event_name }}
          run-number:          ${{ github.run_number }}
          repository:          ${{ github.repository }}
          commit-message:      ${{ steps.ctx.outputs.commit-message }}
          commit-author:       ${{ steps.ctx.outputs.commit-author }}
          build-duration:      ${{ steps.ctx.outputs.build-duration }}
          platform-diagnostics: ${{ steps.diag.outputs.platform-diagnostics }}
          total-errors:        ${{ steps.diag.outputs.total-errors }}
          total-warnings:      ${{ steps.diag.outputs.total-warnings }}
          product-name:        ${{ needs.resolve-config.outputs.product-name }}
          app-version:         ${{ needs.resolve-config.outputs.app-version }}
          bundle-id:           ${{ needs.resolve-config.outputs.bundle-id }}
          scripting-backend:   ${{ needs.resolve-config.outputs.scripting-backend }}
          android-arch:        ${{ needs.resolve-config.outputs.android-arch }}
          orientation:         ${{ needs.resolve-config.outputs.orientation }}
          store-link:          ${{ needs.resolve-config.outputs.store-link }}
          android-export-type: ${{ needs.resolve-config.outputs.android-export-type }}
          define-symbols-count: ${{ needs.resolve-config.outputs.define-symbols-count }}
          define-symbols:      ${{ needs.resolve-config.outputs.define-symbols }}
