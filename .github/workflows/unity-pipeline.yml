name: Unity Pipeline (Reusable)

# Drop-in reusable: ports ALL orchestration jobs from the consumer workflow.
# Callers get the full resolve-config → validate → tests → builds → report
# → discord flow by referencing this file with workflow_call.
#
# Nesting depth: caller → unity-pipeline → reusable-build-platform = 3 (max 4 ✓)
#
# Architecture: see docs/EXPLICIT_PLATFORM_FLOW_SPEC.md
# Branch flow:  see docs/BRANCH_FLOW_CONTRACT.md
# Activation:   see docs/UNITY_PERSONAL_DOCKER_LICENSE.md

on:
  workflow_call:
    inputs:
      # ── Toolkit location ──────────────────────────────────────────────────
      project-path:
        description: "Path to the Unity project root relative to the workspace root."
        required: false
        default: '.'
        type: string

      toolkit-repo:
        description: "Toolkit repository (owner/repo) for resolve_build_flow.sh."
        required: false
        default: 'dyCuong03/unity-build-workflows'
        type: string

      toolkit-ref:
        description: "Git ref of the toolkit repo (branch, tag, SHA)."
        required: false
        default: 'main'
        type: string

      # ── Pass-through: mirror of workflow_dispatch inputs ─────────────────
      platform:
        description: "Target platform(s): All | Android | WebGL | Linux64 | LinuxServer | iOS"
        required: false
        default: 'All'
        type: string

      environment:
        description: "Build environment: production | staging | development"
        required: false
        default: 'production'
        type: string

      run-tests:
        description: "Run EditMode/PlayMode tests before building."
        required: false
        default: false
        type: boolean

      test-mode:
        description: "Test suite: EditMode | PlayMode | All"
        required: false
        default: 'All'
        type: string

      build-addressables:
        description: "Run Addressable build pipeline before platform builds."
        required: false
        default: false
        type: boolean

      activation-strategy:
        description: "Unity license activation strategy (docker lane only): auto | manual-license | account | serial | preactivated | none"
        required: false
        default: 'auto'
        type: string

      runner-mode:
        description: "Execution lane: docker | self-hosted-windows | auto"
        required: false
        default: 'docker'
        type: string

      runner-type:
        description: "WHERE the job runs: github-hosted | self-hosted (blank = resolver default/legacy mapping)."
        required: false
        default: ''
        type: string

      build-engine:
        description: "HOW Unity builds: docker | local (blank = resolver default/legacy mapping)."
        required: false
        default: ''
        type: string

      runner-labels:
        description: "Comma-separated runs-on labels (blank = resolver-derived from runner-type)."
        required: false
        default: ''
        type: string

      unity-version:
        description: "Override Unity version (blank = use ProjectSettings/ProjectVersion.txt)."
        required: false
        default: ''
        type: string

      clean-build:
        description: "auto|true|false — Force clean Library cache before building (auto = use BUILD_CLEAN variable)."
        required: false
        default: 'auto'
        type: string

      android-export:
        description: "Android output format: apk (installable) or aab (Play Store bundle)."
        required: false
        default: 'apk'
        type: string

      define-symbols:
        description: |
          Manual-dispatch extra Scripting Define Symbols (';' or ',' separated),
          applied additively at build time. For automatic push/PR builds the
          symbols come from the per-branch *_DEFINE_SYMBOLS repository variables
          instead; this input only applies to workflow_dispatch (e.g. iOS builds,
          which are manual-only).
        required: false
        default: ''
        type: string

    secrets:
      UNITY_LICENSE:
        description: "Raw .ulf file contents. Optional — docker lane personal activation."
        required: false
      UNITY_EMAIL:
        description: "Unity account email. Optional — docker lane activation."
        required: false
      UNITY_PASSWORD:
        description: "Unity account password. Optional — docker lane activation."
        required: false
      DISCORD_WEBHOOK_URL:
        description: "Discord webhook URL for build notifications. Optional — no-op when absent."
        required: false

jobs:

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1: resolve-config
  # ════════════════════════════════════════════════════════════════════════════
  resolve-config:
    name: Resolve Config
    runs-on: ubuntu-latest
    outputs:
      # ── Unity / project ────────────────────────────────────────────────────
      unity-version:      ${{ steps.version.outputs.version }}
      project-path:       ${{ steps.version.outputs.project-path }}
      toolkit-ref:        ${{ steps.version.outputs.toolkit-ref }}
      # ── Flow resolver outputs ───────────────────────────────────────────────
      flow-type:          ${{ steps.flow.outputs.flow-type }}
      environment:        ${{ steps.flow.outputs.environment }}
      gh-environment:     ${{ steps.flow.outputs.gh-environment }}
      run-tests:          ${{ steps.flow.outputs.run-tests }}
      test-mode:          ${{ steps.flow.outputs.test-mode }}
      build-addressables: ${{ steps.flow.outputs.build-addressables }}
      build-android:      ${{ steps.flow.outputs.build-android }}
      build-webgl:        ${{ steps.flow.outputs.build-webgl }}
      build-linux64:      ${{ steps.flow.outputs.build-linux64 }}
      build-linuxserver:  ${{ steps.flow.outputs.build-linuxserver }}
      build-windows64:    ${{ steps.flow.outputs.build-windows64 }}
      build-ios:          ${{ steps.flow.outputs.build-ios }}
      signing:            ${{ steps.flow.outputs.signing }}
      platform-source:    ${{ steps.flow.outputs.platform-source }}
      define-symbols:     ${{ steps.flow.outputs.define-symbols }}
      # ── New grouped config resolver outputs ─────────────────────────────────
      build-method:            ${{ steps.flow.outputs.build-method }}
      build-timeout-minutes:   ${{ steps.flow.outputs.build-timeout-minutes }}
      clean-build:             ${{ steps.flow.outputs.clean-build }}
      clean-build-source:      ${{ steps.flow.outputs.clean-build-source }}
      test-editmode:           ${{ steps.flow.outputs.test-editmode }}
      test-playmode:           ${{ steps.flow.outputs.test-playmode }}
      test-fail-fast:          ${{ steps.flow.outputs.test-fail-fast }}
      runner-mode:             ${{ steps.flow.outputs.runner-mode }}
      runner-windows-label:    ${{ steps.flow.outputs.runner-windows-label }}
      runner-macos-label:      ${{ steps.flow.outputs.runner-macos-label }}
      runner-linux-label:      ${{ steps.flow.outputs.runner-linux-label }}
      # ── Runner / Build-Engine separation (V2) ───────────────────────────────
      runner-type:             ${{ steps.flow.outputs.runner-type }}
      build-engine:            ${{ steps.flow.outputs.build-engine }}
      execution-strategy:      ${{ steps.flow.outputs.execution-strategy }}
      runner-labels:           ${{ steps.flow.outputs.runner-labels }}
      runner-labels-csv:       ${{ steps.flow.outputs.runner-labels-csv }}
      activation-strategy:     ${{ steps.flow.outputs.activation-strategy }}
      cache-library:           ${{ steps.flow.outputs.cache-library }}
      cache-gradle:            ${{ steps.flow.outputs.cache-gradle }}
      cache-addressables:      ${{ steps.flow.outputs.cache-addressables }}
      cache-nuget:             ${{ steps.flow.outputs.cache-nuget }}
      artifact-retention-days: ${{ steps.flow.outputs.artifact-retention-days }}
      artifact-compression:    ${{ steps.flow.outputs.artifact-compression }}
      # ── Project metadata (extract_project_metadata.sh) ─────────────────────
      product-name:       ${{ steps.meta.outputs.product-name }}
      app-version:        ${{ steps.meta.outputs.app-version }}
      bundle-id:          ${{ steps.meta.outputs.bundle-id-android }}
      scripting-backend:  ${{ steps.meta.outputs.scripting-backend }}
      android-arch:       ${{ steps.meta.outputs.android-arch }}
      orientation:        ${{ steps.meta.outputs.orientation }}
      store-link:         ${{ steps.meta.outputs.store-link-android }}
      android-export-type: ${{ steps.flow.outputs.android-export-type }}
      define-symbols-count: ${{ steps.meta.outputs.define-symbols-count }}
    steps:
      - name: Checkout (shallow — only needs ProjectVersion.txt)
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            ProjectSettings/ProjectVersion.txt
          sparse-checkout-cone-mode: false

      - name: Resolve Unity version
        id: version
        shell: bash
        env:
          # Explicit pin: dispatch input > UNITY_VERSION repo variable. Either is
          # OPTIONAL and is validated against ProjectVersion.txt (the SSOT) below —
          # a mismatch fails the build, so the pin can only confirm, never override.
          OVERRIDE:     ${{ inputs.unity-version || vars.UNITY_VERSION }}
          PROJECT_PATH: ${{ inputs.project-path }}
          TOOLKIT_REF:  ${{ inputs.toolkit-ref }}
        run: |
          set -euo pipefail
          PV="${PROJECT_PATH%/}/ProjectSettings/ProjectVersion.txt"
          if [ ! -f "$PV" ]; then
            echo "::error::ProjectVersion.txt not found at ${PV}"
            exit 1
          fi
          PROJECT_VERSION=$(grep '^m_EditorVersion:' "$PV" | awk '{print $2}')
          echo "Project Unity version (SSOT): ${PROJECT_VERSION}"
          if [ -n "${OVERRIDE}" ] && [ "${OVERRIDE}" != "${PROJECT_VERSION}" ]; then
            echo "::error::Unity version mismatch:"
            echo "::error::  ProjectVersion.txt: ${PROJECT_VERSION}"
            echo "::error::  Pin (input/UNITY_VERSION var): ${OVERRIDE}"
            echo "::error::ProjectVersion.txt is the source of truth. Either update it to change the Unity version, or fix the UNITY_VERSION repository variable / unity-version input to match."
            exit 1
          fi
          RESOLVED="${OVERRIDE:-${PROJECT_VERSION}}"
          echo "version=${RESOLVED}"          >> "$GITHUB_OUTPUT"
          echo "project-path=${PROJECT_PATH}" >> "$GITHUB_OUTPUT"
          echo "toolkit-ref=${TOOLKIT_REF}"   >> "$GITHUB_OUTPUT"
          echo "Resolved: version=${RESOLVED} project-path=${PROJECT_PATH} toolkit-ref=${TOOLKIT_REF}"

      - name: Checkout toolkit (for resolve_build_flow.sh)
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.toolkit-repo }}
          ref:        ${{ inputs.toolkit-ref }}
          path:       .toolkit

      - name: Extract project metadata
        id: meta
        continue-on-error: true
        shell: bash
        env:
          PROJECT_PATH: ${{ inputs.project-path }}
        run: |
          set +e
          bash .toolkit/scripts/common/extract_project_metadata.sh || true

      - name: Resolve build flow
        id: flow
        shell: bash
        env:
          EVENT_NAME:            ${{ github.event_name }}
          REF_NAME:              ${{ github.ref_name }}
          BASE_REF:              ${{ github.base_ref }}
          IN_PLATFORM:           ${{ inputs.platform || '' }}
          IN_ENVIRONMENT:        ${{ inputs.environment || '' }}
          IN_RUN_TESTS:          ${{ inputs.run-tests || '' }}
          IN_TEST_MODE:          ${{ inputs.test-mode || '' }}
          IN_BUILD_ADDRESSABLES: ${{ inputs.build-addressables || '' }}
          IN_ANDROID_EXPORT:     ${{ inputs.android-export || '' }}
          IN_DEFINE_SYMBOLS:     ${{ inputs.define-symbols || '' }}
          # ── Repository Variables (optional platform/config overrides) ──────
          VAR_DEVELOP_BUILD_PLATFORMS:     ${{ vars.DEVELOP_BUILD_PLATFORMS || '' }}
          VAR_STAGING_BUILD_PLATFORMS:     ${{ vars.STAGING_BUILD_PLATFORMS || '' }}
          VAR_RELEASE_BUILD_PLATFORMS:     ${{ vars.RELEASE_BUILD_PLATFORMS || '' }}
          VAR_DEVELOP_RUN_TESTS:          ${{ vars.DEVELOP_RUN_TESTS || '' }}
          VAR_STAGING_RUN_TESTS:          ${{ vars.STAGING_RUN_TESTS || '' }}
          VAR_RELEASE_RUN_TESTS:          ${{ vars.RELEASE_RUN_TESTS || '' }}
          VAR_DEVELOP_BUILD_ADDRESSABLES: ${{ vars.DEVELOP_BUILD_ADDRESSABLES || '' }}
          VAR_STAGING_BUILD_ADDRESSABLES: ${{ vars.STAGING_BUILD_ADDRESSABLES || '' }}
          VAR_RELEASE_BUILD_ADDRESSABLES: ${{ vars.RELEASE_BUILD_ADDRESSABLES || '' }}
          VAR_DEFAULT_RUNNER_MODE:        ${{ vars.DEFAULT_RUNNER_MODE || '' }}
          VAR_DEVELOP_DEFINE_SYMBOLS:     ${{ vars.DEVELOP_DEFINE_SYMBOLS || '' }}
          VAR_STAGING_DEFINE_SYMBOLS:     ${{ vars.STAGING_DEFINE_SYMBOLS || '' }}
          VAR_RELEASE_DEFINE_SYMBOLS:     ${{ vars.RELEASE_DEFINE_SYMBOLS || '' }}
          # ── New grouped Repository Variables (New > Legacy > Default) ──────
          NEW_BUILD_DEVELOP_PLATFORMS:  ${{ vars.BUILD_DEVELOP_PLATFORMS }}
          NEW_BUILD_STAGING_PLATFORMS:  ${{ vars.BUILD_STAGING_PLATFORMS }}
          NEW_BUILD_RELEASE_PLATFORMS:  ${{ vars.BUILD_RELEASE_PLATFORMS }}
          NEW_TEST_DEVELOP_ENABLED:     ${{ vars.TEST_DEVELOP_ENABLED }}
          NEW_TEST_STAGING_ENABLED:     ${{ vars.TEST_STAGING_ENABLED }}
          NEW_TEST_RELEASE_ENABLED:     ${{ vars.TEST_RELEASE_ENABLED }}
          NEW_ADDRESSABLES_DEVELOP_ENABLED: ${{ vars.ADDRESSABLES_DEVELOP_ENABLED }}
          NEW_ADDRESSABLES_STAGING_ENABLED: ${{ vars.ADDRESSABLES_STAGING_ENABLED }}
          NEW_ADDRESSABLES_RELEASE_ENABLED: ${{ vars.ADDRESSABLES_RELEASE_ENABLED }}
          NEW_DEVELOP_DEFINE_SYMBOLS:   ${{ vars.UNITY_DEVELOP_DEFINE_SYMBOLS }}
          NEW_STAGING_DEFINE_SYMBOLS:   ${{ vars.UNITY_STAGING_DEFINE_SYMBOLS }}
          NEW_RELEASE_DEFINE_SYMBOLS:   ${{ vars.UNITY_RELEASE_DEFINE_SYMBOLS }}
          # UNITY_VERSION / UNITY_PROJECT_PATH are NOT wired as repo variables:
          # Unity version SSOT is ProjectSettings/ProjectVersion.txt; project path
          # is set by the caller (unity-build.yml). Both would be redundant.
          NEW_UNITY_BUILD_METHOD:       ${{ vars.UNITY_BUILD_METHOD }}
          NEW_BUILD_TIMEOUT_MINUTES:    ${{ vars.BUILD_TIMEOUT_MINUTES }}
          NEW_BUILD_CLEAN:              ${{ vars.BUILD_CLEAN }}
          NEW_TEST_EDITMODE_ENABLED:    ${{ vars.TEST_EDITMODE_ENABLED }}
          NEW_TEST_PLAYMODE_ENABLED:    ${{ vars.TEST_PLAYMODE_ENABLED }}
          NEW_TEST_FAIL_FAST:           ${{ vars.TEST_FAIL_FAST }}
          NEW_RUNNER_DEFAULT_MODE:      ${{ vars.RUNNER_DEFAULT_MODE }}
          NEW_RUNNER_WINDOWS_LABEL:     ${{ vars.RUNNER_WINDOWS_LABEL }}
          NEW_RUNNER_MACOS_LABEL:       ${{ vars.RUNNER_MACOS_LABEL }}
          NEW_RUNNER_LINUX_LABEL:       ${{ vars.RUNNER_LINUX_LABEL }}
          # ── Runner / Build-Engine separation (V2) ───────────────────────────
          NEW_RUNNER_TYPE:              ${{ vars.RUNNER_TYPE }}
          NEW_BUILD_ENGINE:             ${{ vars.BUILD_ENGINE }}
          NEW_RUNNER_LABELS:            ${{ vars.RUNNER_LABELS }}
          IN_RUNNER_TYPE:               ${{ inputs.runner-type }}
          IN_BUILD_ENGINE:              ${{ inputs.build-engine }}
          IN_RUNNER_LABELS:             ${{ inputs.runner-labels }}
          IN_ACTIVATION_STRATEGY:       ${{ inputs.activation-strategy }}
          NEW_CACHE_LIBRARY_ENABLED:    ${{ vars.CACHE_LIBRARY_ENABLED }}
          NEW_CACHE_GRADLE_ENABLED:     ${{ vars.CACHE_GRADLE_ENABLED }}
          NEW_CACHE_ADDRESSABLES_ENABLED: ${{ vars.CACHE_ADDRESSABLES_ENABLED }}
          NEW_CACHE_NUGET_ENABLED:      ${{ vars.CACHE_NUGET_ENABLED }}
          NEW_ARTIFACT_RETENTION_DAYS:  ${{ vars.ARTIFACT_RETENTION_DAYS }}
          NEW_ARTIFACT_COMPRESSION:     ${{ vars.ARTIFACT_COMPRESSION }}
          IN_CLEAN_BUILD:               ${{ inputs.clean-build || '' }}
        run: |
          set -euo pipefail
          echo "Flow resolver: event=${EVENT_NAME} ref=${REF_NAME} base=${BASE_REF:-<none>}"
          bash .toolkit/scripts/common/resolve_build_flow.sh

      - name: Write config summary
        if: always()
        continue-on-error: true
        shell: bash
        env:
          FLOW_TYPE:      ${{ steps.flow.outputs.flow-type }}
          ENVIRONMENT:    ${{ steps.flow.outputs.environment }}
          UNITY_VERSION:  ${{ steps.version.outputs.version }}
          RUNNER_MODE:    ${{ steps.flow.outputs.runner-mode }}
          RUNNER_TYPE:        ${{ steps.flow.outputs.runner-type }}
          RUNNER_LABELS_CSV:  ${{ steps.flow.outputs.runner-labels-csv }}
          BUILD_ENGINE:       ${{ steps.flow.outputs.build-engine }}
          EXECUTION_STRATEGY: ${{ steps.flow.outputs.execution-strategy }}
          ACTIVATION_STRATEGY: ${{ steps.flow.outputs.activation-strategy }}
          SEL_ANDROID:     ${{ steps.flow.outputs.build-android }}
          SEL_WEBGL:       ${{ steps.flow.outputs.build-webgl }}
          SEL_LINUX64:     ${{ steps.flow.outputs.build-linux64 }}
          SEL_LINUXSERVER: ${{ steps.flow.outputs.build-linuxserver }}
          SEL_WINDOWS64:   ${{ steps.flow.outputs.build-windows64 }}
          SEL_IOS:         ${{ steps.flow.outputs.build-ios }}
          RUN_TESTS:       ${{ steps.flow.outputs.run-tests }}
          TEST_MODE:       ${{ steps.flow.outputs.test-mode }}
          BUILD_ADDR:      ${{ steps.flow.outputs.build-addressables }}
          DEFINE_SYMBOLS:  ${{ steps.flow.outputs.define-symbols }}
          BUILD_TIMEOUT:   ${{ steps.flow.outputs.build-timeout-minutes }}
          CACHE_LIBRARY:      ${{ steps.flow.outputs.cache-library }}
          CACHE_GRADLE:       ${{ steps.flow.outputs.cache-gradle }}
          CACHE_ADDRESSABLES: ${{ steps.flow.outputs.cache-addressables }}
          CACHE_NUGET:        ${{ steps.flow.outputs.cache-nuget }}
          ARTIFACT_RETENTION: ${{ steps.flow.outputs.artifact-retention-days }}
          ARTIFACT_COMPRESSION: ${{ steps.flow.outputs.artifact-compression }}
          CLEAN_BUILD:        ${{ steps.flow.outputs.clean-build }}
          CLEAN_BUILD_SOURCE: ${{ steps.flow.outputs.clean-build-source }}
        run: |
          set +e
          PLATFORMS=""
          [ "${SEL_ANDROID}" = "true" ]     && PLATFORMS="${PLATFORMS:+$PLATFORMS, }Android"
          [ "${SEL_WEBGL}" = "true" ]       && PLATFORMS="${PLATFORMS:+$PLATFORMS, }WebGL"
          [ "${SEL_LINUX64}" = "true" ]     && PLATFORMS="${PLATFORMS:+$PLATFORMS, }Linux64"
          [ "${SEL_LINUXSERVER}" = "true" ] && PLATFORMS="${PLATFORMS:+$PLATFORMS, }LinuxServer"
          [ "${SEL_WINDOWS64}" = "true" ]   && PLATFORMS="${PLATFORMS:+$PLATFORMS, }Windows64"
          [ "${SEL_IOS}" = "true" ]         && PLATFORMS="${PLATFORMS:+$PLATFORMS, }iOS"
          [ -z "${PLATFORMS}" ] && PLATFORMS="(none)"

          TESTS="disabled"
          [ "${RUN_TESTS}" = "true" ] && TESTS="${TEST_MODE:-All}"

          CACHE="library=${CACHE_LIBRARY:-?} gradle=${CACHE_GRADLE:-?} addressables=${CACHE_ADDRESSABLES:-?} nuget=${CACHE_NUGET:-?}"
          ARTIFACT="retention=${ARTIFACT_RETENTION:-?}d compression=${ARTIFACT_COMPRESSION:-?}"

          {
            echo "## Resolve Config Summary"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Flow | \`${FLOW_TYPE:-unknown}\` |"
            echo "| Environment | \`${ENVIRONMENT:-unknown}\` |"
            echo "| Unity Version | \`${UNITY_VERSION:-unknown}\` |"
            echo "| Runner | \`${RUNNER_MODE:-unknown}\` |"
            echo "| Runner Type | \`${RUNNER_TYPE:-unknown}\` |"
            echo "| Runner Labels | \`${RUNNER_LABELS_CSV:-unknown}\` |"
            echo "| Build Engine | \`${BUILD_ENGINE:-unknown}\` |"
            echo "| Execution Strategy | \`${EXECUTION_STRATEGY:-unknown}\` |"
            echo "| Activation Strategy | \`${ACTIVATION_STRATEGY:-unknown}\` |"
            echo "| Platforms | ${PLATFORMS} |"
            echo "| Tests | \`${TESTS}\` |"
            echo "| Addressables | \`${BUILD_ADDR:-false}\` |"
            echo "| Define Symbols | \`${DEFINE_SYMBOLS:-(none)}\` |"
            echo "| Timeout | \`${BUILD_TIMEOUT:-?} min\` |"
            echo "| Cache | \`${CACHE}\` |"
            echo "| Artifact | \`${ARTIFACT}\` |"
            echo "| Clean Build | \`${CLEAN_BUILD:-false}\` (source: \`${CLEAN_BUILD_SOURCE:-default}\`) |"
          } >> "$GITHUB_STEP_SUMMARY" || true

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2: validate-project
  # ════════════════════════════════════════════════════════════════════════════
  validate-project:
    name: Validate Project
    needs: [resolve-config]
    if: needs.resolve-config.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate project structure
        shell: bash
        env:
          PROJECT_PATH:  ${{ needs.resolve-config.outputs.project-path }}
          UNITY_VERSION: ${{ needs.resolve-config.outputs.unity-version }}
        run: |
          set -euo pipefail
          ERRORS=0

          check() {
            local path="$1" label="$2"
            if [ ! -e "${PROJECT_PATH%/}/${path}" ]; then
              echo "::error::Missing ${label}: ${PROJECT_PATH%/}/${path}"
              ERRORS=$((ERRORS + 1))
            else
              echo "  ✓ ${label}"
            fi
          }

          echo "Validating Unity project at '${PROJECT_PATH}' (Unity ${UNITY_VERSION})"
          check "ProjectSettings/ProjectVersion.txt" "ProjectVersion.txt"
          check "Packages/manifest.json"             "Packages/manifest.json"
          check "Assets"                             "Assets directory"

          if [ "${ERRORS}" -gt 0 ]; then
            echo "::error::Project validation failed (${ERRORS} error(s))"
            exit 1
          fi
          echo "Project validation passed."

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 3: unity-tests
  # ════════════════════════════════════════════════════════════════════════════
  unity-tests:
    name: Unity Tests (${{ needs.resolve-config.outputs.test-mode }})
    needs: [resolve-config, validate-project]
    if: >-
      !cancelled() &&
      needs.validate-project.result == 'success' &&
      needs.resolve-config.outputs.run-tests == 'true'
    uses: ./.github/workflows/reusable-unity-tests.yml
    with:
      unity-version:       ${{ needs.resolve-config.outputs.unity-version }}
      test-mode:           ${{ needs.resolve-config.outputs.test-mode }}
      project-path:        ${{ needs.resolve-config.outputs.project-path }}
      runner-mode:         ${{ inputs.runner-mode || needs.resolve-config.outputs.runner-mode }}
      runner-labels:       ${{ needs.resolve-config.outputs.runner-labels }}
      build-engine:        ${{ needs.resolve-config.outputs.build-engine }}
      activation-strategy: ${{ needs.resolve-config.outputs.activation-strategy }}
      toolkit-ref:         ${{ needs.resolve-config.outputs.toolkit-ref }}
      build-timeout-minutes:   ${{ fromJSON(needs.resolve-config.outputs.build-timeout-minutes) }}
      cache-library:           ${{ fromJSON(needs.resolve-config.outputs.cache-library) }}
      artifact-retention-days: ${{ fromJSON(needs.resolve-config.outputs.artifact-retention-days) }}
      runner-windows-label:    ${{ needs.resolve-config.outputs.runner-windows-label }}
      runner-macos-label:      ${{ needs.resolve-config.outputs.runner-macos-label }}
      runner-linux-label:      ${{ needs.resolve-config.outputs.runner-linux-label }}
      test-fail-fast:          ${{ fromJSON(needs.resolve-config.outputs.test-fail-fast) }}
    secrets:
      UNITY_LICENSE:  ${{ secrets.UNITY_LICENSE }}
      UNITY_EMAIL:    ${{ secrets.UNITY_EMAIL }}
      UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 4: build-addressables
  # ════════════════════════════════════════════════════════════════════════════
  build-addressables:
    name: Build Addressables
    needs: [resolve-config, validate-project]
    if: >-
      !cancelled() &&
      needs.validate-project.result == 'success' &&
      needs.resolve-config.outputs.build-addressables == 'true'
    uses: ./.github/workflows/reusable-build-platform.yml
    with:
      platform:            Addressables
      unity-version:       ${{ needs.resolve-config.outputs.unity-version }}
      project-path:        ${{ needs.resolve-config.outputs.project-path }}
      environment:         ${{ needs.resolve-config.outputs.environment }}
      runner-mode:         ${{ inputs.runner-mode || needs.resolve-config.outputs.runner-mode }}
      runner-labels:       ${{ needs.resolve-config.outputs.runner-labels }}
      build-engine:        ${{ needs.resolve-config.outputs.build-engine }}
      activation-strategy: ${{ needs.resolve-config.outputs.activation-strategy }}
      clean-build:         ${{ fromJSON(needs.resolve-config.outputs.clean-build) }}
      build-addressables:  false
      toolkit-ref:         ${{ needs.resolve-config.outputs.toolkit-ref }}
      define-symbols:      ${{ needs.resolve-config.outputs.define-symbols }}
      build-timeout-minutes:   ${{ fromJSON(needs.resolve-config.outputs.build-timeout-minutes) }}
      cache-library:           ${{ fromJSON(needs.resolve-config.outputs.cache-library) }}
      cache-gradle:            ${{ fromJSON(needs.resolve-config.outputs.cache-gradle) }}
      cache-addressables:      ${{ fromJSON(needs.resolve-config.outputs.cache-addressables) }}
      cache-nuget:             ${{ fromJSON(needs.resolve-config.outputs.cache-nuget) }}
