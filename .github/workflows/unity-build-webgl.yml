name: Unity Build WebGL

on:
  workflow_call:
    inputs:
      project-path:
        description: Path to the Unity project root relative to the consumer repo root
        type: string
        required: false
        default: '.'
      unity-version:
        type: string
        required: true
      environment:
        type: string
        required: false
        default: development
      build-config-path:
        type: string
        required: false
        default: BuildConfig
      cache-mode:
        type: string
        required: false
        default: safe
      build-addressables:
        type: boolean
        required: false
        default: false
      upload-artifact:
        type: boolean
        required: false
        default: true
      deploy-target:
        description: Deployment target (none, cloudflare)
        type: string
        required: false
        default: none
      clean-build:
        type: boolean
        required: false
        default: false
      artifact-retention-days:
        type: number
        required: false
        default: 14
      release-mode:
        type: boolean
        required: false
        default: false
      build-version:
        type: string
        required: true
      image-registry:
        description: Docker image registry (e.g. ghcr.io)
        type: string
        required: false
        default: ghcr.io
      image-namespace:
        description: Image repository namespace override (e.g. myorg/unity-images)
        type: string
        required: false
        default: ''
      image-name:
        description: Image name override (e.g. unity-editor)
        type: string
        required: false
        default: ''
      image-digest:
        description: Pinned image digest (required when release-mode=true)
        type: string
        required: false
        default: ''
      workflow-repository:
        description: >
          Repository that owns this workflow (owner/repo). Must be the
          owner/repo of the unity-build-workflows toolkit. REQUIRED — the
          reusable workflow cannot auto-detect its own source repo cross-repo.
        type: string
        required: false
        default: ''
      workflow-ref:
        description: >
          Git ref or SHA of the workflow repository to checkout as the toolkit.
          Required. Must match the @<ref> used in the caller's `uses:` reference.
        type: string
        required: false
        default: ''

    secrets:
      UNITY_LICENSE:
        required: false
      UNITY_EMAIL:
        required: false
      UNITY_PASSWORD:
        required: false
      CLOUDFLARE_API_TOKEN:
        required: false
      CLOUDFLARE_ACCOUNT_ID:
        required: false

    outputs:
      artifact-name:
        description: Name of the uploaded WebGL build artifact
        value: ${{ jobs.build.outputs.artifact-name }}
      deploy-url:
        description: Deployed URL (if deploy-target=cloudflare)
        value: ${{ jobs.build.outputs.deploy-url }}

jobs:
  build:
    name: Build WebGL (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      artifact-name: ${{ steps.upload.outputs.artifact-name }}
      deploy-url: ${{ steps.deploy.outputs.deploy-url }}

    steps:
      # ── 1. Consumer repo checkout ─────────────────────────────────────────────
      - name: Checkout consumer repo
        uses: actions/checkout@v4
        with:
          path: project
          lfs: true

      # ── 2. Toolkit checkout ───────────────────────────────────────────────────
      - name: Resolve toolkit ref
        id: toolkit
        shell: bash
        run: |
          REPO="${{ inputs.workflow-repository }}"
          REF="${{ inputs.workflow-ref }}"
          # github.workflow_ref/_sha resolve to the TOP-LEVEL caller workflow (the
          # consumer), NOT this reusable workflow's repo — they cannot self-identify
          # the toolkit in cross-repo use. Auto-derive only when the caller IS this
          # repo (same-repo CI); otherwise require explicit inputs and fail fast.
          if [ -z "$REPO" ]; then
            echo "::error::workflow-repository input is required."
            echo "::error::In your caller workflow 'with:' block add:"
            echo "::error::  workflow-repository: <OWNER>/unity-build-workflows"
            echo "::error::Must match the repo in 'uses: <OWNER>/unity-build-workflows/...@<REF>'."
            exit 1
          fi
          if [ -z "$REF" ]; then
            echo "::error::workflow-ref input is required."
            echo "::error::In your caller workflow 'with:' block add:"
            echo "::error::  workflow-ref: <REF>"
            echo "::error::Must match @<REF> in 'uses: .../unity-build-workflows/...@<REF>'."
            exit 1
          fi
          echo "repo=${REPO}" >> "$GITHUB_OUTPUT"
          echo "ref=${REF}"   >> "$GITHUB_OUTPUT"
      - name: Checkout toolkit (unity-build-workflows)
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.toolkit.outputs.repo }}
          ref: ${{ steps.toolkit.outputs.ref }}
          path: .ci/unity-build-workflows
          persist-credentials: false

      # ── 3. Compute effective project path ─────────────────────────────────────
      - name: Compute effective project path
        id: paths
        shell: bash
        run: |
          PP="${{ inputs.project-path }}"
          if [ "$PP" = "." ] || [ -z "$PP" ]; then
            echo "project-root=project" >> "$GITHUB_OUTPUT"
          else
            echo "project-root=project/${PP}" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore Docker cache
        uses: ./.ci/unity-build-workflows/.github/actions/restore-docker-cache
        with:
          project-path: ${{ steps.paths.outputs.project-root }}
          unity-version: ${{ inputs.unity-version }}
          target-platform: WebGL
          cache-mode: ${{ inputs.cache-mode }}

      - name: Resolve Unity image
        id: resolve-image
        uses: ./.ci/unity-build-workflows/.github/actions/resolve-unity-image
        with:
          unity-version: ${{ inputs.unity-version }}
          target-platform: WebGL
          image-registry: ${{ inputs.image-registry }}
          image-namespace: ${{ inputs.image-namespace }}
          image-name: ${{ inputs.image-name }}
          image-variant: webgl
          image-digest: ${{ inputs.image-digest }}
          release-mode: ${{ inputs.release-mode }}

      - name: Generate build metadata
        shell: bash
        env:
          PROJECT_ROOT: ${{ steps.paths.outputs.project-root }}
          BUILD_VERSION: ${{ inputs.build-version }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          python3 .ci/unity-build-workflows/scripts/common/generate_build_metadata.py \
            --project-path "$PROJECT_ROOT" \
            --platform     WebGL \
            --version      "$BUILD_VERSION" \
            --environment  "$ENVIRONMENT" \
            --build-number "${{ github.run_number }}" \
            --commit       "${{ github.sha }}"

      - name: Build Addressables
        id: build-addressables
        if: inputs.build-addressables == true
        uses: ./.ci/unity-build-workflows/.github/actions/run-unity-container
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          project-path: ${{ steps.paths.outputs.project-root }}
          unity-version: ${{ inputs.unity-version }}
          target-platform: WebGL
          environment: ${{ inputs.environment }}
          build-config-path: ${{ inputs.build-config-path }}
          image-reference: ${{ steps.resolve-image.outputs.image-reference }}
          image-digest: ${{ steps.resolve-image.outputs.image-digest }}
          command: build-addressables
          cache-mode: ${{ inputs.cache-mode }}

      - name: Build Unity WebGL
        id: build
        uses: ./.ci/unity-build-workflows/.github/actions/run-unity-container
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          project-path: ${{ steps.paths.outputs.project-root }}
          unity-version: ${{ inputs.unity-version }}
          target-platform: WebGL
          environment: ${{ inputs.environment }}
          build-config-path: ${{ inputs.build-config-path }}
          image-reference: ${{ steps.resolve-image.outputs.image-reference }}
          image-digest: ${{ steps.resolve-image.outputs.image-digest }}
          command: build
          cache-mode: ${{ inputs.cache-mode }}
          clean-build: ${{ inputs.clean-build }}
          output-path: Builds/WebGL
          release-mode: ${{ inputs.release-mode }}

      - name: Compress WebGL output (post-container)
        shell: bash
        env:
          BUILD_PATH: Builds/WebGL
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          bash .ci/unity-build-workflows/scripts/webgl/compress_webgl.sh "$BUILD_PATH" "$ENVIRONMENT"

      - name: Compare build size
        if: always()
        shell: bash
        run: |
          python3 .ci/unity-build-workflows/scripts/common/compare_build_size.py \
            --build-path Builds/WebGL \
            --platform   WebGL \
            --version    "${{ inputs.build-version }}" || true

      - name: Upload build artifact
        id: upload
        if: always() && inputs.upload-artifact == true
        uses: actions/upload-artifact@v4
        with:
          name: webgl-build-${{ inputs.environment }}-${{ inputs.build-version }}-${{ github.run_number }}
          path: Builds/WebGL/
          retention-days: ${{ inputs.artifact-retention-days }}
          if-no-files-found: error

      - name: Deploy to Cloudflare Pages
        id: deploy
        if: inputs.deploy-target == 'cloudflare'
        shell: bash
        env:
          BUILD_PATH: Builds/WebGL
          ENVIRONMENT: ${{ inputs.environment }}
          BUILD_VERSION: ${{ inputs.build-version }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          DEPLOY_URL=$(bash .ci/unity-build-workflows/scripts/webgl/deploy_cloudflare_pages.sh \
            "$BUILD_PATH" "$ENVIRONMENT" "$BUILD_VERSION")
          echo "deploy-url=${DEPLOY_URL}" >> "$GITHUB_OUTPUT"

      - name: Collect container output
        if: always()
        uses: ./.ci/unity-build-workflows/.github/actions/collect-container-output
        with:
          target-platform: WebGL
          build-version: ${{ inputs.build-version }}
          environment: ${{ inputs.environment }}
          command: build
          container-exit-code: ${{ steps.build.outputs.exit-code }}
          log-path: ${{ steps.build.outputs.log-path }}
          report-path: ${{ steps.build.outputs.report-path }}
