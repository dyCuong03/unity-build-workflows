name: Unity Release

# Docker-mandatory release pipeline.
# All Unity builds run in containers. digest-pinned images required.
# Supported platforms: Android, WebGL, Linux64

on:
  workflow_dispatch:
    inputs:
      target-platform:
        description: Target platform to release
        required: true
        type: choice
        options: [Android, WebGL, Linux64]
      deploy-target:
        description: Deploy target after build
        required: false
        type: choice
        default: none
        options: [none, google-play, cloudflare]
      image-digest:
        description: >
          Digest-pinned image reference (sha256:...) for the production release.
          Required for workflow_dispatch. On tag-push it is resolved automatically
          from the registry, so it is only needed to override that.
        required: true
        type: string
      dry-run:
        description: Build without deploying
        required: false
        type: boolean
        default: false
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  # ─── PRE-RELEASE GATES ─────────────────────────────────────────────────────────
  pre-release-checks:
    name: Pre-release Gates
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: read   # inspect ghcr to auto-resolve the image digest on tag-push
    outputs:
      build-version: ${{ steps.version.outputs.version }}
      target-platform: ${{ steps.resolve-platform.outputs.platform }}
      deploy-target: ${{ steps.resolve-deploy.outputs.deploy-target }}
      unity-version: ${{ steps.resolve-unity.outputs.unity-version }}
      image-digest: ${{ steps.validate-digest.outputs.image-digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve target platform
        id: resolve-platform
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "platform=${{ inputs.target-platform }}" >> "$GITHUB_OUTPUT"
          else
            PLATFORM=$(python3 scripts/common/resolve_project_version.py \
              --config-path "BuildConfig" \
              --ref "${{ github.ref }}" \
              --output-field platform 2>/dev/null || echo "Android")
            echo "platform=${PLATFORM}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve deploy target
        id: resolve-deploy
        shell: bash
        run: |
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            echo "deploy-target=none" >> "$GITHUB_OUTPUT"
          else
            echo "deploy-target=${{ inputs.deploy-target || 'none' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve build version
        id: version
        shell: bash
        run: |
          VERSION=$(python3 scripts/common/resolve_project_version.py \
            --project-path "." \
            --config-path  "BuildConfig" \
            --environment  "production" \
            --ref          "${{ github.ref }}")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved build version: ${VERSION}"

      - name: Resolve Unity version
        id: resolve-unity
        shell: bash
        run: |
          UNITY_VERSION=$(python3 scripts/common/resolve_project_version.py \
            --config-path "BuildConfig" \
            --output-field unity-version 2>/dev/null || \
            grep -r "m_EditorVersion:" ProjectSettings/ProjectVersion.txt | awk '{print $2}')
          echo "unity-version=${UNITY_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Unity version: ${UNITY_VERSION}"

      - name: Validate version matches tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION="${{ steps.version.outputs.version }}"
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Git tag 'v${TAG}' does not match BuildConfig version '${VERSION}'"
            exit 1
          fi
          echo "Version matches tag: ${VERSION}"

      # On tag-push there is no image-digest input, so resolve it from the
      # registry: the pinned digest of the canonical Unity image published by
      # build-unity-image.yml (ghcr.io/<owner>/unity-editor:<version>-<variant>).
      # workflow_dispatch callers pass image-digest explicitly and skip this.
      - name: Resolve image digest from registry
        id: resolve-digest
        if: inputs.image-digest == ''
        shell: bash
        env:
          REGISTRY: ghcr.io
          OWNER: ${{ github.repository_owner }}
          ACTOR: ${{ github.actor }}
          GH_TOKEN_PKG: ${{ secrets.GITHUB_TOKEN }}
          UNITY_VERSION: ${{ steps.resolve-unity.outputs.unity-version }}
          PLATFORM: ${{ steps.resolve-platform.outputs.platform }}
        run: |
          case "$PLATFORM" in
            Android)             VARIANT=android ;;
            WebGL)               VARIANT=webgl ;;
            Linux64|LinuxServer) VARIANT=linux ;;
            *) echo "::error::Cannot resolve image digest — unsupported platform '${PLATFORM}'."; exit 1 ;;
          esac
          # Registry references must be lowercase — matches build-unity-image.yml naming.
          REPO=$(echo "${REGISTRY}/${OWNER}/unity-editor" | tr '[:upper:]' '[:lower:]')
          REF="${REPO}:${UNITY_VERSION}-${VARIANT}"
          echo "Resolving digest for mutable reference: ${REF}"
          echo "$GH_TOKEN_PKG" | docker login "$REGISTRY" -u "$ACTOR" --password-stdin
          DIGEST=$(docker buildx imagetools inspect "$REF" --format '{{.Manifest.Digest}}' 2>/dev/null || true)
          if [ -z "$DIGEST" ]; then
            echo "::error::Could not resolve a digest for '${REF}'."
            echo "::error::Ensure the image was built and pushed by the build-unity-image workflow before releasing."
            exit 1
          fi
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Resolved image digest: ${DIGEST}"

      - name: Validate image digest is pinned
        id: validate-digest
        shell: bash
        env:
          IMAGE_DIGEST: ${{ inputs.image-digest || steps.resolve-digest.outputs.digest }}
        run: |
          if [ -z "$IMAGE_DIGEST" ]; then
            echo "::error::image-digest is required for production releases."
            echo "::error::For workflow_dispatch, pass the image-digest input. For tag-push,"
            echo "::error::ensure the image was built and pushed (build-unity-image workflow)."
            exit 1
          fi
          if [[ "$IMAGE_DIGEST" != sha256:* ]]; then
            echo "::error::image-digest must be a sha256 digest (got: ${IMAGE_DIGEST})"
            exit 1
          fi
          echo "image-digest=${IMAGE_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Image digest validated: ${IMAGE_DIGEST}"

      - name: Check for dev flags in BuildConfig
        shell: bash
        env:
          PLATFORM: ${{ steps.resolve-platform.outputs.platform }}
        run: |
          python3 scripts/common/validate_build_config.py \
            --config-path "BuildConfig" \
            --platform    "$PLATFORM" \
            --check-release-flags \
            --strict

      - name: Verify signing secrets present
        shell: bash
        env:
          PLATFORM: ${{ steps.resolve-platform.outputs.platform }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASS: ${{ secrets.ANDROID_KEY_PASS }}
        run: |
          MISSING=""
          if [ "$PLATFORM" = "Android" ]; then
            [ -z "$ANDROID_KEYSTORE_BASE64" ] && MISSING="$MISSING ANDROID_KEYSTORE_BASE64"
            [ -z "$ANDROID_KEYSTORE_PASS"   ] && MISSING="$MISSING ANDROID_KEYSTORE_PASS"
            [ -z "$ANDROID_KEY_ALIAS"       ] && MISSING="$MISSING ANDROID_KEY_ALIAS"
            [ -z "$ANDROID_KEY_PASS"        ] && MISSING="$MISSING ANDROID_KEY_PASS"
          fi
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required signing secrets:${MISSING}"
            exit 1
          fi
          echo "All required secrets present."

  # ─── RELEASE TESTS ─────────────────────────────────────────────────────────────
  release-test:
    name: Release Tests (full suite)
    needs: pre-release-checks
    uses: ./.github/workflows/unity-test.yml
    with:
      unity-version: ${{ needs.pre-release-checks.outputs.unity-version }}
      target-platform: ${{ needs.pre-release-checks.outputs.target-platform }}
      test-level: full
      cache-mode: safe
      image-digest: ${{ needs.pre-release-checks.outputs.image-digest }}
    secrets:
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
      UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
      UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

  # ─── RELEASE BUILD ─────────────────────────────────────────────────────────────
  release-build:
    name: Release Build (clean, digest-pinned)
    needs: [pre-release-checks, release-test]
    if: needs.release-test.outputs.tests-passed == 'true'
    uses: ./.github/workflows/unity-build.yml
    with:
      project-path: '.'
      unity-version: ${{ needs.pre-release-checks.outputs.unity-version }}
      target-platform: ${{ needs.pre-release-checks.outputs.target-platform }}
      environment: production
      build-config-path: BuildConfig
      test-level: none
      cache-mode: safe
      build-addressables: true
      upload-artifact: true
      deploy-target: ${{ needs.pre-release-checks.outputs.deploy-target }}
      clean-build: true
      artifact-retention-days: 90
      release-mode: true
      image-digest: ${{ needs.pre-release-checks.outputs.image-digest }}
      workflow-repository: ${{ github.repository }}
      workflow-ref: ${{ github.sha }}
    secrets: inherit

  # ─── GITHUB RELEASE ────────────────────────────────────────────────────────────
  create-github-release:
    name: Create GitHub Release
    needs: [pre-release-checks, release-build]
    if: always() && needs.release-build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-build-production-*'
          path: release-artifacts/
          merge-multiple: true

      - name: Download build reports
        uses: actions/download-artifact@v4
        with:
          pattern: 'build-report-*-production-*'
          path: release-reports/
          merge-multiple: true

      - name: Generate release notes
        id: release-notes
        shell: bash
        env:
          VERSION: ${{ needs.pre-release-checks.outputs.build-version }}
          PLATFORM: ${{ needs.pre-release-checks.outputs.target-platform }}
          IMAGE_DIGEST: ${{ needs.pre-release-checks.outputs.image-digest }}
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log --oneline "${PREV_TAG}..HEAD" 2>/dev/null || echo "See commit history")
          else
            CHANGES=$(git log --oneline -20 2>/dev/null || echo "See commit history")
          fi

          cat > release-notes.md << EOF
          ## Unity Release v${VERSION}

          **Platform:** ${PLATFORM}
          **Build Number:** ${{ github.run_number }}
          **Commit:** \`${{ github.sha }}\`
          **Image Digest:** \`${IMAGE_DIGEST}\`

          ### Changes
          ${CHANGES}

          ### Build Info
          - Environment: production
          - Release mode: enabled (digest-pinned Docker image)
          - Clean build: yes
          - Tests: full suite passed
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || format('v{0}', needs.pre-release-checks.outputs.build-version) }}
          name: Release v${{ needs.pre-release-checks.outputs.build-version }}
          body_path: release-notes.md
          files: |
            release-artifacts/**/*
            release-reports/**/*
          draft: false
          prerelease: ${{ contains(needs.pre-release-checks.outputs.build-version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── DISCORD NOTIFICATION ──────────────────────────────────────────────────────
  notify:
    name: Discord Notification
    needs: [pre-release-checks, release-test, release-build, create-github-release]
    if: always()
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discord notification
        uses: ./.github/actions/discord-notify
        with:
          status: ${{ needs.release-build.result }}
          platform: ${{ needs.pre-release-checks.outputs.target-platform }}
          environment: production
          build-version: ${{ needs.pre-release-checks.outputs.build-version }}
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
