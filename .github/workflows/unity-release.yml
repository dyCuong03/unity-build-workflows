name: Unity Release

on:
  workflow_dispatch:
    inputs:
      target-platform:
        description: "Target platform"
        required: true
        type: choice
        options:
          - Android
          - iOS
          - Windows64
          - WebGL
      deploy-target:
        description: "Deploy target after build"
        required: false
        type: choice
        default: "none"
        options:
          - none
          - google-play
          - testflight
          - cloudflare
      dry-run:
        description: "Dry run (skip deployment)"
        required: false
        type: boolean
        default: false
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

jobs:
  # ─── PRE-RELEASE GATES ───────────────────────────────────────────────────────
  pre-release-checks:
    name: Pre-release Gates
    runs-on: ubuntu-latest
    environment: production
    outputs:
      build-version: ${{ steps.version.outputs.version }}
      target-platform: ${{ steps.resolve-platform.outputs.platform }}
      deploy-target: ${{ steps.resolve-deploy.outputs.deploy-target }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve target platform
        id: resolve-platform
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "platform=${{ inputs.target-platform }}" >> "$GITHUB_OUTPUT"
          else
            # From tag — read from BuildConfig or default
            PLATFORM=$(python3 scripts/common/resolve_project_version.py \
              --config-path "BuildConfig" \
              --ref "${{ github.ref }}" \
              --output-field platform 2>/dev/null || echo "Android")
            echo "platform=$PLATFORM" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve deploy target
        id: resolve-deploy
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            DRY="${{ inputs.dry-run }}"
            TARGET="${{ inputs.deploy-target }}"
            if [[ "$DRY" == "true" ]]; then
              echo "deploy-target=none" >> "$GITHUB_OUTPUT"
            else
              echo "deploy-target=$TARGET" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "deploy-target=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve build version
        id: version
        run: |
          VERSION=$(python3 scripts/common/resolve_project_version.py \
            --project-path "." \
            --config-path "BuildConfig" \
            --environment "production" \
            --ref "${{ github.ref }}")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Validate version matches tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION="${{ steps.version.outputs.version }}"
          if [[ "$TAG" != "$VERSION" ]]; then
            echo "::error::Tag $TAG does not match BuildConfig version $VERSION"
            exit 1
          fi
          echo "Version matches tag: $VERSION"

      - name: Check for dev flags
        run: |
          python3 scripts/common/validate_build_config.py \
            --config-path "BuildConfig" \
            --platform "${{ steps.resolve-platform.outputs.platform }}" \
            --check-release-flags \
            --strict

      - name: Verify signing secrets present
        run: |
          PLATFORM="${{ steps.resolve-platform.outputs.platform }}"
          MISSING=""

          if [[ "$PLATFORM" == "Android" ]]; then
            [[ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]] && MISSING="$MISSING ANDROID_KEYSTORE_BASE64"
            [[ -z "${{ secrets.ANDROID_KEYSTORE_PASS }}" ]] && MISSING="$MISSING ANDROID_KEYSTORE_PASS"
            [[ -z "${{ secrets.ANDROID_KEY_ALIAS }}" ]] && MISSING="$MISSING ANDROID_KEY_ALIAS"
            [[ -z "${{ secrets.ANDROID_KEY_PASS }}" ]] && MISSING="$MISSING ANDROID_KEY_PASS"
          elif [[ "$PLATFORM" == "iOS" ]]; then
            [[ -z "${{ secrets.APPLE_CERT_BASE64 }}" ]] && MISSING="$MISSING APPLE_CERT_BASE64"
            [[ -z "${{ secrets.APPLE_CERT_PASSWORD }}" ]] && MISSING="$MISSING APPLE_CERT_PASSWORD"
            [[ -z "${{ secrets.APPLE_PROV_PROFILE_BASE64 }}" ]] && MISSING="$MISSING APPLE_PROV_PROFILE_BASE64"
            [[ -z "${{ secrets.APPLE_TEAM_ID }}" ]] && MISSING="$MISSING APPLE_TEAM_ID"
          fi

          if [[ -n "$MISSING" ]]; then
            echo "::error::Missing required signing secrets:$MISSING"
            exit 1
          fi
          echo "All signing secrets present"
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASS: ${{ secrets.ANDROID_KEY_PASS }}
          APPLE_CERT_BASE64: ${{ secrets.APPLE_CERT_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_PROV_PROFILE_BASE64: ${{ secrets.APPLE_PROV_PROFILE_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

  # ─── RUN TESTS BEFORE RELEASE ─────────────────────────────────────────────────
  release-test:
    name: Release Tests
    needs: pre-release-checks
    uses: ./.github/workflows/unity-test.yml
    with:
      unity-version: "2022.3.0f1"  # resolved at runtime from project
      test-level: "full"
      cache-mode: "safe"
    secrets:
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
      UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
      UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

  # ─── RELEASE BUILD ───────────────────────────────────────────────────────────
  release-build:
    name: Release Build
    needs: [pre-release-checks, release-test]
    if: needs.release-test.outputs.tests-passed == 'true'
    uses: ./.github/workflows/unity-build.yml
    with:
      project-path: "."
      unity-version: "2022.3.0f1"
      target-platform: ${{ needs.pre-release-checks.outputs.target-platform }}
      environment: "production"
      build-config-path: "BuildConfig"
      test-level: "none"
      cache-mode: "safe"
      build-addressables: true
      upload-artifact: true
      deploy-target: ${{ needs.pre-release-checks.outputs.deploy-target }}
      clean-build: true
      artifact-retention-days: 30
      fail-on-warnings: true
      release-mode: true
    secrets: inherit

  # ─── GITHUB RELEASE ──────────────────────────────────────────────────────────
  create-github-release:
    name: Create GitHub Release
    needs: [pre-release-checks, release-build]
    if: always() && needs.release-build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-build-production-*"
          path: release-artifacts/
          merge-multiple: true

      - name: Generate release notes
        id: release-notes
        run: |
          VERSION="${{ needs.pre-release-checks.outputs.build-version }}"
          PLATFORM="${{ needs.pre-release-checks.outputs.target-platform }}"
          cat > release-notes.md << EOF
          ## Unity Build Release v${VERSION}

          **Platform:** ${PLATFORM}
          **Build Number:** ${{ github.run_number }}
          **Commit:** ${{ github.sha }}

          ### Changes
          $(git log --oneline $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "HEAD~10")..HEAD 2>/dev/null || echo "See commit history")

          ### Build Info
          - Environment: production
          - Release mode: enabled
          - Tests: passed (full suite)
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || format('v{0}', needs.pre-release-checks.outputs.build-version) }}
          name: Release v${{ needs.pre-release-checks.outputs.build-version }}
          body_path: release-notes.md
          files: release-artifacts/**/*
          draft: false
          prerelease: ${{ contains(needs.pre-release-checks.outputs.build-version, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
