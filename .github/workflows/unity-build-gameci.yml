name: Unity Build (GameCI)

# Reusable multi-platform Unity build that delegates the Unity invocation to
# game-ci/unity-builder. This is the supported production path for Unity
# Personal/free in Docker: unity-builder performs the online ULF activation
# (UNITY_LICENSE + UNITY_EMAIL + UNITY_PASSWORD together) that Unity 6 accepts.
#
# The toolkit still owns: platform selection, Unity-version single-source-of-
# truth + mismatch validation, artifact handling, and the final report.
#
# Platforms (Docker, ubuntu-latest):
#   Android, WebGL, Linux64, LinuxServer
# iOS is intentionally NOT handled here — it requires a self-hosted macOS
# runner and is deferred (see docs/GITHUB_ACTIONS_BUILD_RUNBOOK.md).

on:
  workflow_call:
    inputs:
      platforms:
        description: Comma-separated platforms (Android,WebGL,Linux64,LinuxServer or All)
        required: false
        default: All
        type: string
      unity-version:
        description: Override Unity version (default = consumer ProjectSettings/ProjectVersion.txt)
        required: false
        default: ''
        type: string
      project-path:
        description: Path to the Unity project root
        required: false
        default: '.'
        type: string
      allow-version-mismatch:
        description: Do not fail when ProjectVersion.txt differs from the requested version
        required: false
        default: false
        type: boolean
    secrets:
      UNITY_LICENSE:  { required: true }
      UNITY_EMAIL:    { required: true }
      UNITY_PASSWORD: { required: true }

jobs:
  # ── Resolve platform matrix + Unity version (single source of truth) ───────
  setup:
    name: Resolve platforms & Unity version
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.platforms.outputs.matrix }}
      unity-version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout (no submodules — only need ProjectVersion.txt)
        uses: actions/checkout@v4

      - name: Build platform matrix
        id: platforms
        shell: bash
        env:
          PLATFORMS: ${{ inputs.platforms }}
        run: |
          set -euo pipefail
          if [ "${PLATFORMS}" = "All" ] || [ -z "${PLATFORMS}" ]; then
            PLATFORMS="Android,WebGL,Linux64,LinuxServer"
          fi
          # Comma-separated -> JSON array, trimming spaces
          json=$(printf '%s' "${PLATFORMS}" | tr ',' '\n' | sed 's/^ *//;s/ *$//' | grep -v '^$' \
                 | python3 -c "import sys,json; print(json.dumps([l.strip() for l in sys.stdin if l.strip()]))")
          echo "matrix=${json}" >> "$GITHUB_OUTPUT"
          echo "Platform matrix: ${json}"

      - name: Resolve Unity version (ProjectVersion.txt is the source of truth)
        id: version
        shell: bash
        env:
          OVERRIDE: ${{ inputs.unity-version }}
          PROJECT_PATH: ${{ inputs.project-path }}
        run: |
          set -euo pipefail
          PV="${PROJECT_PATH%/}/ProjectSettings/ProjectVersion.txt"
          if [ ! -f "$PV" ]; then
            echo "::error::ProjectVersion.txt not found at ${PV}"
            exit 1
          fi
          PROJECT_VERSION=$(grep '^m_EditorVersion:' "$PV" | awk '{print $2}')
          echo "Project Unity version: ${PROJECT_VERSION}"
          if [ -n "${OVERRIDE}" ] && [ "${OVERRIDE}" != "${PROJECT_VERSION}" ]; then
            if [ "${{ inputs.allow-version-mismatch }}" = "true" ]; then
              echo "::warning::Requested ${OVERRIDE} != project ${PROJECT_VERSION} (override allowed)"
              echo "version=${OVERRIDE}" >> "$GITHUB_OUTPUT"
            else
              echo "::error::Unity version mismatch:"
              echo "::error::  Project version (ProjectVersion.txt): ${PROJECT_VERSION}"
              echo "::error::  Requested version (input):            ${OVERRIDE}"
              echo "::error::Fix: update ProjectVersion.txt or pass allow-version-mismatch=true."
              exit 1
            fi
          else
            echo "version=${PROJECT_VERSION}" >> "$GITHUB_OUTPUT"
          fi

  # ── Build each platform via GameCI unity-builder ───────────────────────────
  build:
    name: Build ${{ matrix.platform }}
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - name: Free disk space
        run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk/ndk /opt/ghc || true

      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive

      - name: Map platform -> GameCI targetPlatform
        id: map
        shell: bash
        env:
          P: ${{ matrix.platform }}
        run: |
          set -euo pipefail
          case "$P" in
            Android)     echo "target=Android" >> "$GITHUB_OUTPUT"; echo "params=" >> "$GITHUB_OUTPUT" ;;
            WebGL)       echo "target=WebGL" >> "$GITHUB_OUTPUT"; echo "params=" >> "$GITHUB_OUTPUT" ;;
            Linux64)     echo "target=StandaloneLinux64" >> "$GITHUB_OUTPUT"; echo "params=" >> "$GITHUB_OUTPUT" ;;
            LinuxServer) echo "target=StandaloneLinux64" >> "$GITHUB_OUTPUT"; echo "params=-standaloneBuildSubtarget Server" >> "$GITHUB_OUTPUT" ;;
            *) echo "::error::Unsupported platform: $P"; exit 1 ;;
          esac

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: ${{ inputs.project-path }}/Library
          key: Library-${{ matrix.platform }}-${{ hashFiles(format('{0}/ProjectSettings/ProjectVersion.txt', inputs.project-path), format('{0}/Packages/manifest.json', inputs.project-path)) }}
          restore-keys: Library-${{ matrix.platform }}-

      - name: Build with GameCI
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE:  ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL:    ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: ${{ inputs.project-path }}
          unityVersion: ${{ needs.setup.outputs.unity-version }}
          targetPlatform: ${{ steps.map.outputs.target }}
          customParameters: ${{ steps.map.outputs.params }}
          allowDirtyBuild: true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unity-build-${{ matrix.platform }}
          path: build
          if-no-files-found: warn
          retention-days: 14

  # ── Final report ───────────────────────────────────────────────────────────
  report:
    name: Final Report
    needs: [setup, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summarize
        shell: bash
        run: |
          {
            echo "## Unity Build (GameCI) report"
            echo ""
            echo "- Unity version: \`${{ needs.setup.outputs.unity-version }}\`"
            echo "- Platforms: \`${{ needs.setup.outputs.matrix }}\`"
            echo "- Build result: \`${{ needs.build.result }}\`"
            echo ""
            echo "Artifacts are named \`unity-build-<platform>\`."
          } >> "$GITHUB_STEP_SUMMARY"
          [ "${{ needs.build.result }}" = "success" ]
