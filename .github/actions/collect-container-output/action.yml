name: Collect Container Output
description: >
  Collects logs, reports, and metadata from Unity container output directories.
  Generates a GitHub Step Summary. Always runs (use if: always() at call site).

inputs:
  target-platform:
    description: Build target platform for labelling artifacts
    required: true
  build-version:
    description: Build version string for artifact naming
    required: false
    default: unknown
  environment:
    description: Build environment (development, staging, production)
    required: false
    default: development
  command:
    description: Unity command that was run (build, test-editmode, test-playmode, validate, build-addressables)
    required: false
    default: build
  container-exit-code:
    description: Exit code from the run-unity-container action
    required: false
    default: '0'
  log-path:
    description: Directory containing Unity Editor log(s)
    required: false
    default: Logs
  report-path:
    description: Directory containing build/test reports
    required: false
    default: BuildReports
  artifact-path:
    description: Directory containing build artifacts
    required: false
    default: Builds
  retention-days:
    description: How many days to retain uploaded log artifacts
    required: false
    default: '7'

outputs:
  has-errors:
    description: "Whether errors were detected in the Unity Editor log"
    value: ${{ steps.analyze-logs.outputs.has-errors }}
  error-count:
    description: Number of errors found in Editor log
    value: ${{ steps.analyze-logs.outputs.error-count }}
  artifact-name:
    description: Name of the uploaded log artifact
    value: ${{ steps.set-artifact-name.outputs.artifact-name }}

runs:
  using: composite
  steps:
    - name: Set artifact name
      id: set-artifact-name
      shell: bash
      env:
        TARGET_PLATFORM: ${{ inputs.target-platform }}
        ENVIRONMENT: ${{ inputs.environment }}
        BUILD_VERSION: ${{ inputs.build-version }}
        COMMAND: ${{ inputs.command }}
      run: |
        ARTIFACT_NAME="container-output-${TARGET_PLATFORM}-${ENVIRONMENT}-${COMMAND}-${BUILD_VERSION}-${{ github.run_number }}"
        echo "artifact-name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"

    - name: Gather output files
      id: gather
      shell: bash
      env:
        LOG_PATH: ${{ inputs.log-path }}
        REPORT_PATH: ${{ inputs.report-path }}
        ARTIFACT_PATH: ${{ inputs.artifact-path }}
      run: |
        COLLECT_DIR="${RUNNER_TEMP}/collected-output"
        mkdir -p "$COLLECT_DIR/logs" "$COLLECT_DIR/reports"

        # Collect Editor logs
        if [ -d "$LOG_PATH" ]; then
          find "$LOG_PATH" -name "*.log" -exec cp {} "$COLLECT_DIR/logs/" \; 2>/dev/null || true
        fi
        # Direct Editor.log fallback locations
        for f in "${ARTIFACT_PATH}/Editor.log" "./Editor.log" "/tmp/Editor.log"; do
          [ -f "$f" ] && cp "$f" "$COLLECT_DIR/logs/" 2>/dev/null || true
        done

        # Collect structured reports
        if [ -d "$REPORT_PATH" ]; then
          for pattern in "build-report.json" "build-metadata.json" "validation-report.json" "test-results.xml" "*.xml" "*.json"; do
            find "$REPORT_PATH" -name "$pattern" -exec cp {} "$COLLECT_DIR/reports/" \; 2>/dev/null || true
          done
        fi

        echo "Collected files:"
        find "$COLLECT_DIR" -type f | sort

        echo "collect-dir=${COLLECT_DIR}" >> "$GITHUB_OUTPUT"

    - name: Analyze logs for errors
      id: analyze-logs
      shell: bash
      env:
        COLLECT_DIR: ${{ steps.gather.outputs.collect-dir }}
        CONTAINER_EXIT_CODE: ${{ inputs.container-exit-code }}
      run: |
        ERROR_COUNT=0
        HAS_ERRORS="false"

        # Count Unity error lines in collected logs
        for log_file in "${COLLECT_DIR}/logs/"*.log; do
          [ -f "$log_file" ] || continue
          COUNT=$(grep -c "^[[:space:]]*\[Error\]\|^ERROR\|UnityException\|NullReferenceException" "$log_file" 2>/dev/null || true)
          ERROR_COUNT=$((ERROR_COUNT + COUNT))
        done

        # Non-zero container exit always means errors
        if [ "$CONTAINER_EXIT_CODE" != "0" ] && [ "$CONTAINER_EXIT_CODE" != "" ]; then
          HAS_ERRORS="true"
          if [ "$ERROR_COUNT" -eq 0 ]; then
            ERROR_COUNT=1  # At minimum 1 if the container itself failed
          fi
        fi

        [ "$ERROR_COUNT" -gt 0 ] && HAS_ERRORS="true"

        echo "has-errors=${HAS_ERRORS}" >> "$GITHUB_OUTPUT"
        echo "error-count=${ERROR_COUNT}" >> "$GITHUB_OUTPUT"
        echo "Log analysis — errors found: ${ERROR_COUNT}"

    - name: Generate GitHub Step Summary
      shell: bash
      env:
        TARGET_PLATFORM: ${{ inputs.target-platform }}
        BUILD_VERSION: ${{ inputs.build-version }}
        ENVIRONMENT: ${{ inputs.environment }}
        COMMAND: ${{ inputs.command }}
        CONTAINER_EXIT_CODE: ${{ inputs.container-exit-code }}
        HAS_ERRORS: ${{ steps.analyze-logs.outputs.has-errors }}
        ERROR_COUNT: ${{ steps.analyze-logs.outputs.error-count }}
        COLLECT_DIR: ${{ steps.gather.outputs.collect-dir }}
      run: |
        STATUS_ICON="✅"
        STATUS_TEXT="Success"
        if [ "$CONTAINER_EXIT_CODE" != "0" ]; then
          STATUS_ICON="❌"
          STATUS_TEXT="Failed (exit ${CONTAINER_EXIT_CODE})"
        fi

        cat >> "$GITHUB_STEP_SUMMARY" << EOF
        ## Container Output — ${TARGET_PLATFORM} / ${COMMAND}

        | Field        | Value |
        |---|---|
        | Status       | ${STATUS_ICON} ${STATUS_TEXT} |
        | Platform     | ${TARGET_PLATFORM} |
        | Version      | ${BUILD_VERSION} |
        | Environment  | ${ENVIRONMENT} |
        | Command      | \`${COMMAND}\` |
        | Exit Code    | \`${CONTAINER_EXIT_CODE}\` |
        | Log Errors   | ${ERROR_COUNT} |

        EOF

        # Append report summaries if they exist
        REPORT_DIR="${COLLECT_DIR}/reports"
        if [ -f "${REPORT_DIR}/build-report.json" ]; then
          echo "### Build Report" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat "${REPORT_DIR}/build-report.json" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
        fi

        if [ -f "${REPORT_DIR}/validation-report.json" ]; then
          echo "### Validation Report" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat "${REPORT_DIR}/validation-report.json" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Upload collected output
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.set-artifact-name.outputs.artifact-name }}
        path: ${{ steps.gather.outputs.collect-dir }}
        retention-days: ${{ inputs.retention-days }}
        if-no-files-found: warn
