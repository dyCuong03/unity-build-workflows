name: Build Unity (Docker)
description: >
  Builds a Unity project in a Docker container for Android, WebGL, Linux64, or LinuxServer.
  Requires the toolkit to be checked out at .ci/unity-build-workflows (done automatically
  by the reusable workflow setup step, or manually via actions/checkout before calling this action).

inputs:
  project-path:
    description: Path to the Unity project root (relative to workspace)
    required: false
    default: 'project'
  unity-version:
    description: Unity editor version (e.g., 6000.0.23f1)
    required: true
  target-platform:
    description: Build target (Android, WebGL, Linux64, LinuxServer)
    required: true
  environment:
    description: Build environment (development, staging, production)
    required: false
    default: development
  build-config-path:
    description: Path to BuildConfig directory (relative to project-path)
    required: false
    default: BuildConfig
  image-registry:
    description: Docker image registry hostname
    required: false
    default: ghcr.io
  image-namespace:
    description: >
      Image repository namespace hosting your Unity images (e.g. myorg/unity-images).
      Required — the action cannot derive a valid image path without it.
    required: true
  image-name:
    description: Image name override (e.g. unity-editor). Auto-derived if empty.
    required: false
    default: ''
  image-digest:
    description: Pinned image digest (sha256:...). Required when release-mode=true.
    required: false
    default: ''
  release-mode:
    description: Enable release gates (digest-pinned image, fail-on-warnings)
    required: false
    default: 'false'
  cache-mode:
    description: Library cache strategy (off, safe, aggressive)
    required: false
    default: safe
  clean-build:
    description: Delete Library/ before building to force full reimport
    required: false
    default: 'false'
  command:
    description: >
      Unity operation to run (build, build-addressables, test-editmode, test-playmode, validate)
    required: false
    default: build
  output-path:
    description: Host path where build artifacts will be written
    required: false
    default: Builds

outputs:
  exit-code:
    description: Container process exit code (0 = success)
    value: ${{ steps.run-build.outputs.exit-code }}
  artifact-path:
    description: Host path containing build output artifacts
    value: ${{ steps.run-build.outputs.artifact-path }}
  log-path:
    description: Host path containing Unity Editor log(s)
    value: ${{ steps.run-build.outputs.log-path }}
  report-path:
    description: Host path containing build/test reports
    value: ${{ steps.run-build.outputs.report-path }}
  image-reference:
    description: Fully-qualified Docker image reference used for the build
    value: ${{ steps.resolve-image.outputs.image-reference }}
  image-digest:
    description: Resolved image digest (sha256:...)
    value: ${{ steps.resolve-image.outputs.image-digest }}

runs:
  using: composite
  steps:
    - name: Restore Docker cache
      uses: ./.ci/unity-build-workflows/.github/actions/restore-docker-cache
      with:
        project-path: ${{ inputs.project-path }}
        unity-version: ${{ inputs.unity-version }}
        target-platform: ${{ inputs.target-platform }}
        cache-mode: ${{ inputs.cache-mode }}

    - name: Resolve Unity image
      id: resolve-image
      uses: ./.ci/unity-build-workflows/.github/actions/resolve-unity-image
      with:
        unity-version: ${{ inputs.unity-version }}
        target-platform: ${{ inputs.target-platform }}
        image-registry: ${{ inputs.image-registry }}
        image-namespace: ${{ inputs.image-namespace }}
        image-name: ${{ inputs.image-name }}
        image-digest: ${{ inputs.image-digest }}
        release-mode: ${{ inputs.release-mode }}

    - name: Run Unity build
      id: run-build
      uses: ./.ci/unity-build-workflows/.github/actions/run-unity-container
      with:
        project-path: ${{ inputs.project-path }}
        unity-version: ${{ inputs.unity-version }}
        target-platform: ${{ inputs.target-platform }}
        environment: ${{ inputs.environment }}
        build-config-path: ${{ inputs.build-config-path }}
        image-reference: ${{ steps.resolve-image.outputs.image-reference }}
        image-digest: ${{ steps.resolve-image.outputs.image-digest }}
        command: ${{ inputs.command }}
        cache-mode: ${{ inputs.cache-mode }}
        clean-build: ${{ inputs.clean-build }}
        output-path: ${{ inputs.output-path }}
        release-mode: ${{ inputs.release-mode }}

    - name: Collect container output
      if: always()
      uses: ./.ci/unity-build-workflows/.github/actions/collect-container-output
      with:
        target-platform: ${{ inputs.target-platform }}
        command: ${{ inputs.command }}
        container-exit-code: ${{ steps.run-build.outputs.exit-code }}
        log-path: ${{ steps.run-build.outputs.log-path }}
        report-path: ${{ steps.run-build.outputs.report-path }}
