name: Build iOS (macOS native)
description: >
  Builds a Unity iOS Xcode project on a macOS runner with Unity and Xcode installed.
  Does NOT use Docker. Requires the toolkit to be checked out at .ci/unity-build-workflows.
  Must run on a macOS runner with Unity iOS Build Support installed.

inputs:
  project-path:
    description: Path to the Unity project root (relative to workspace)
    required: false
    default: 'project'
  unity-version:
    description: Unity editor version (e.g., 6000.0.23f1)
    required: true
  environment:
    description: Build environment (development, staging, production)
    required: false
    default: development
  build-config-path:
    description: Path to BuildConfig directory (relative to project-path)
    required: false
    default: BuildConfig
  build-version:
    description: Build version string (e.g. 1.2.3)
    required: true
  cache-mode:
    description: Library cache strategy (off, safe, aggressive)
    required: false
    default: safe
  clean-build:
    description: Delete Library/ before building to force full reimport
    required: false
    default: 'false'
  build-addressables:
    description: Build Addressables content before the player build
    required: false
    default: 'false'
  output-path:
    description: Host path where the Xcode project will be written
    required: false
    default: Builds/iOS/Xcode
  log-path:
    description: Host path for Unity Editor logs
    required: false
    default: Logs/iOS

outputs:
  xcode-project-path:
    description: Path to the generated Xcode project
    value: ${{ steps.run-build.outputs.xcode-project-path }}

runs:
  using: composite
  steps:
    # ── Guard: must run on macOS ────────────────────────────────────────────────
    - name: Verify macOS runner
      shell: bash
      run: |
        if [[ "${{ runner.os }}" != "macOS" ]]; then
          echo "::error::build-ios action requires a macOS runner with Unity iOS Build Support."
          echo "::error::This action cannot run on Linux or Windows runners."
          echo "::error::Runner OS: ${{ runner.os }}"
          exit 1
        fi
        echo "[build-ios] Runner OS: ${{ runner.os }} — OK"

    # ── Verify Unity + iOS Support installation ─────────────────────────────────
    - name: Resolve Unity installation
      id: unity-install
      shell: bash
      env:
        UNITY_VERSION: ${{ inputs.unity-version }}
      run: |
        UNITY_EDITOR="/Applications/Unity/Hub/Editor/${UNITY_VERSION}/Unity.app/Contents/MacOS/Unity"
        IOS_SUPPORT="/Applications/Unity/Hub/Editor/${UNITY_VERSION}/PlaybackEngines/iOSSupport"

        if [[ ! -f "${UNITY_EDITOR}" ]]; then
          echo "::error::Unity editor not found at: ${UNITY_EDITOR}"
          echo "::error::Install Unity ${UNITY_VERSION} with iOS Build Support on this runner."
          exit 1
        fi
        if [[ ! -d "${IOS_SUPPORT}" ]]; then
          echo "::error::Unity iOS Build Support not found at: ${IOS_SUPPORT}"
          echo "::error::Install the iOS Build Support module for Unity ${UNITY_VERSION}."
          exit 1
        fi
        echo "unity-editor=${UNITY_EDITOR}" >> "$GITHUB_OUTPUT"
        echo "[build-ios] Unity: ${UNITY_EDITOR} — OK"
        echo "[build-ios] iOS Support: ${IOS_SUPPORT} — OK"

    # ── Validate BuildConfig ────────────────────────────────────────────────────
    - name: Validate BuildConfig
      shell: bash
      env:
        PROJECT_PATH: ${{ inputs.project-path }}
        BUILD_CONFIG_PATH: ${{ inputs.build-config-path }}
        ENVIRONMENT: ${{ inputs.environment }}
        TOOLKIT_PATH: ${{ github.action_path }}/../../..
      run: |
        python3 "${TOOLKIT_PATH}/scripts/common/validate_build_config.py" \
          --config-path "${PROJECT_PATH}/${BUILD_CONFIG_PATH}" \
          --platform    iOS \
          --environment "${ENVIRONMENT}"

    # ── Library cache ───────────────────────────────────────────────────────────
    - name: Restore Library cache
      if: inputs.cache-mode != 'off'
      uses: actions/cache@v4
      with:
        path: ${{ inputs.project-path }}/Library
        key: macOS-unity-${{ inputs.unity-version }}-iOS-${{ hashFiles(format('{0}/Packages/manifest.json', inputs.project-path), format('{0}/Packages/packages-lock.json', inputs.project-path)) }}-cache-schema-v2
        restore-keys: |
          macOS-unity-${{ inputs.unity-version }}-iOS-

    - name: Clean Library cache
      if: inputs.clean-build == 'true'
      shell: bash
      env:
        PROJECT_PATH: ${{ inputs.project-path }}
      run: |
        rm -rf "${PROJECT_PATH}/Library"
        echo "[build-ios] Library/ removed (clean-build)"

    # ── Generate build metadata ─────────────────────────────────────────────────
    - name: Generate build metadata
      shell: bash
      env:
        PROJECT_PATH: ${{ inputs.project-path }}
        BUILD_VERSION: ${{ inputs.build-version }}
        ENVIRONMENT: ${{ inputs.environment }}
        TOOLKIT_PATH: ${{ github.action_path }}/../../..
      run: |
        python3 "${TOOLKIT_PATH}/scripts/common/generate_build_metadata.py" \
          --project-path "${PROJECT_PATH}" \
          --platform     iOS \
          --version      "${BUILD_VERSION}" \
          --environment  "${ENVIRONMENT}" \
          --build-number "${{ github.run_number }}" \
          --commit       "${{ github.sha }}"

    # ── Activate Unity license ──────────────────────────────────────────────────
    - name: Activate Unity license
      shell: bash
      env:
        UNITY_EDITOR: ${{ steps.unity-install.outputs.unity-editor }}
        LOG_PATH: ${{ inputs.log-path }}
        TOOLKIT_PATH: ${{ github.action_path }}/../../..
      run: bash "${TOOLKIT_PATH}/scripts/ios/run_unity_ios.sh" activate

    # ── Build Addressables (optional) ───────────────────────────────────────────
    - name: Build Addressables
      if: inputs.build-addressables == 'true'
      shell: bash
      env:
        UNITY_EDITOR: ${{ steps.unity-install.outputs.unity-editor }}
        PROJECT_PATH: ${{ inputs.project-path }}
        ENVIRONMENT: ${{ inputs.environment }}
        BUILD_CONFIG_PATH: ${{ inputs.build-config-path }}
        LOG_PATH: ${{ inputs.log-path }}
        TOOLKIT_PATH: ${{ github.action_path }}/../../..
      run: bash "${TOOLKIT_PATH}/scripts/ios/run_unity_ios.sh" build-addressables

    # ── Unity iOS build (Xcode project generation) ─────────────────────────────
    - name: Build Unity iOS (generate Xcode project)
      id: run-build
      shell: bash
      env:
        UNITY_EDITOR: ${{ steps.unity-install.outputs.unity-editor }}
        PROJECT_PATH: ${{ inputs.project-path }}
        ENVIRONMENT: ${{ inputs.environment }}
        BUILD_CONFIG_PATH: ${{ inputs.build-config-path }}
        OUTPUT_PATH: ${{ inputs.output-path }}
        LOG_PATH: ${{ inputs.log-path }}
        TOOLKIT_PATH: ${{ github.action_path }}/../../..
      run: |
        bash "${TOOLKIT_PATH}/scripts/ios/run_unity_ios.sh" build
        echo "xcode-project-path=${{ inputs.output-path }}" >> "$GITHUB_OUTPUT"

    # ── Return Unity license (always — even on failure) ─────────────────────────
    - name: Return Unity license
      if: always()
      shell: bash
      env:
        UNITY_EDITOR: ${{ steps.unity-install.outputs.unity-editor }}
        LOG_PATH: ${{ inputs.log-path }}
        TOOLKIT_PATH: ${{ github.action_path }}/../../..
      run: bash "${TOOLKIT_PATH}/scripts/ios/run_unity_ios.sh" return-license
