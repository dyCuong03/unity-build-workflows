name: Validate Unity Project
description: >
  Validates a Unity project's BuildConfig and workflow contract inside a Docker container.
  Requires the toolkit to be checked out at .ci/unity-build-workflows.

inputs:
  project-path:
    description: Path to the Unity project root (relative to workspace)
    required: false
    default: 'project'
  unity-version:
    description: Unity editor version (e.g., 6000.0.23f1)
    required: true
  target-platform:
    description: Build target platform (Android, WebGL, Linux64, LinuxServer)
    required: true
  environment:
    description: Build environment (development, staging, production)
    required: false
    default: development
  build-config-path:
    description: Path to BuildConfig directory (relative to project-path)
    required: false
    default: BuildConfig
  image-registry:
    description: Docker image registry hostname
    required: false
    default: ghcr.io
  image-namespace:
    description: >
      Image repository namespace hosting your Unity images (e.g. myorg/unity-images).
      Required — cannot derive a valid image path without it.
    required: true
  image-name:
    description: Image name override. Auto-derived if empty.
    required: false
    default: ''
  image-digest:
    description: Pinned image digest (sha256:...). Required when release-mode=true.
    required: false
    default: ''
  release-mode:
    description: Enable strict validation gates (fail-on-warnings, digest enforcement)
    required: false
    default: 'false'

outputs:
  exit-code:
    description: Container process exit code (0 = validation passed)
    value: ${{ steps.run-validate.outputs.exit-code }}
  log-path:
    description: Host path containing Unity validation logs
    value: ${{ steps.run-validate.outputs.log-path }}
  report-path:
    description: Host path containing validation reports
    value: ${{ steps.run-validate.outputs.report-path }}
  image-reference:
    description: Docker image reference used for validation
    value: ${{ steps.resolve-image.outputs.image-reference }}

runs:
  using: composite
  steps:
    - name: Resolve Unity image
      id: resolve-image
      uses: ./.ci/unity-build-workflows/.github/actions/resolve-unity-image
      with:
        unity-version: ${{ inputs.unity-version }}
        target-platform: ${{ inputs.target-platform }}
        image-registry: ${{ inputs.image-registry }}
        image-namespace: ${{ inputs.image-namespace }}
        image-name: ${{ inputs.image-name }}
        image-digest: ${{ inputs.image-digest }}
        release-mode: ${{ inputs.release-mode }}

    - name: Run BuildConfig validation in container
      id: run-validate
      uses: ./.ci/unity-build-workflows/.github/actions/run-unity-container
      with:
        project-path: ${{ inputs.project-path }}
        unity-version: ${{ inputs.unity-version }}
        target-platform: ${{ inputs.target-platform }}
        environment: ${{ inputs.environment }}
        build-config-path: ${{ inputs.build-config-path }}
        image-reference: ${{ steps.resolve-image.outputs.image-reference }}
        image-digest: ${{ steps.resolve-image.outputs.image-digest }}
        command: validate
        release-mode: ${{ inputs.release-mode }}

    - name: Run workflow contract checks (host)
      shell: bash
      env:
        PROJECT_PATH: ${{ inputs.project-path }}
        BUILD_CONFIG_PATH: ${{ inputs.build-config-path }}
        TARGET_PLATFORM: ${{ inputs.target-platform }}
        ENVIRONMENT: ${{ inputs.environment }}
        TOOLKIT_PATH: ${{ github.action_path }}/../../..
      run: |
        python3 "${TOOLKIT_PATH}/scripts/common/validate_workflow_contract.py" \
          --project-path    "$PROJECT_PATH" \
          --build-config-path "$BUILD_CONFIG_PATH" \
          --target-platform "$TARGET_PLATFORM" \
          --environment     "$ENVIRONMENT"

    - name: Collect container output
      if: always()
      uses: ./.ci/unity-build-workflows/.github/actions/collect-container-output
      with:
        target-platform: ${{ inputs.target-platform }}
        command: validate
        container-exit-code: ${{ steps.run-validate.outputs.exit-code }}
        log-path: ${{ steps.run-validate.outputs.log-path }}
        report-path: ${{ steps.run-validate.outputs.report-path }}

    - name: Fail on validation errors
      if: steps.run-validate.outputs.exit-code != '0'
      shell: bash
      run: |
        echo "::error::Unity project validation failed (exit code: ${{ steps.run-validate.outputs.exit-code }})."
        echo "::error::Check container output and workflow contract logs above."
        exit 1
