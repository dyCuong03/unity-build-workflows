name: Run Unity Container
description: >
  Runs a Unity operation inside a Docker container via scripts/docker/run_unity_container.py.
  Handles directory setup, secret injection, and exit code preservation.

inputs:
  project-path:
    description: Path to the Unity project root (relative to workspace)
    required: false
    default: '.'
  unity-version:
    description: Unity editor version (e.g., 6000.0.23f1)
    required: true
  target-platform:
    description: Build target platform (Android, WebGL, Linux64, LinuxServer)
    required: true
  environment:
    description: Build environment (development, staging, production)
    required: false
    default: development
  build-config-path:
    description: Path to BuildConfig directory (relative to project-path)
    required: false
    default: BuildConfig
  image-reference:
    description: Fully-qualified Docker image reference to run
    required: true
  image-digest:
    description: Expected image digest for verification (optional)
    required: false
    default: ''
  command:
    description: Unity operation to run (build, test-editmode, test-playmode, validate, build-addressables)
    required: false
    default: build
  cache-mode:
    description: Library cache strategy (off, safe, aggressive)
    required: false
    default: safe
  clean-build:
    description: Delete Library/ before building to force full reimport
    required: false
    default: 'false'
  output-path:
    description: Host path where build artifacts will be written
    required: false
    default: Builds
  release-mode:
    description: Enable strict release gates (fail-on-warnings, no dev flags)
    required: false
    default: 'false'
  container-timeout:
    description: Maximum seconds to allow the container to run before killing it
    required: false
    default: '3600'

outputs:
  exit-code:
    description: Container process exit code (0 = success)
    value: ${{ steps.run-container.outputs.exit-code }}
  artifact-path:
    description: Host path containing build output artifacts
    value: ${{ steps.setup-dirs.outputs.artifact-path }}
  log-path:
    description: Host path containing Unity Editor log(s)
    value: ${{ steps.setup-dirs.outputs.log-path }}
  report-path:
    description: Host path containing build/test reports
    value: ${{ steps.setup-dirs.outputs.report-path }}

runs:
  using: composite
  steps:
    - name: Set up required host directories
      id: setup-dirs
      shell: bash
      env:
        PROJECT_PATH: ${{ inputs.project-path }}
        OUTPUT_PATH: ${{ inputs.output-path }}
        COMMAND: ${{ inputs.command }}
      run: |
        WORKSPACE="${GITHUB_WORKSPACE}"
        PROJ_ABS="${WORKSPACE}/${PROJECT_PATH}"

        ARTIFACT_PATH="${WORKSPACE}/${OUTPUT_PATH}"
        LOG_PATH="${WORKSPACE}/Logs"
        REPORT_PATH="${WORKSPACE}/BuildReports"
        TEST_RESULT_PATH="${WORKSPACE}/TestResults"

        mkdir -p "$ARTIFACT_PATH" "$LOG_PATH" "$REPORT_PATH" "$TEST_RESULT_PATH"

        echo "artifact-path=${ARTIFACT_PATH}" >> "$GITHUB_OUTPUT"
        echo "log-path=${LOG_PATH}"           >> "$GITHUB_OUTPUT"
        echo "report-path=${REPORT_PATH}"     >> "$GITHUB_OUTPUT"

        echo "Host directories created:"
        echo "  Artifacts : $ARTIFACT_PATH"
        echo "  Logs      : $LOG_PATH"
        echo "  Reports   : $REPORT_PATH"
        echo "  Tests     : $TEST_RESULT_PATH"

    - name: Run Unity container
      id: run-container
      shell: bash
      env:
        # Unity licensing — injected into container environment
        UNITY_LICENSE: ${{ env.UNITY_LICENSE }}
        UNITY_EMAIL: ${{ env.UNITY_EMAIL }}
        UNITY_PASSWORD: ${{ env.UNITY_PASSWORD }}
        # Container parameters
        PROJECT_PATH: ${{ inputs.project-path }}
        UNITY_VERSION: ${{ inputs.unity-version }}
        TARGET_PLATFORM: ${{ inputs.target-platform }}
        ENVIRONMENT: ${{ inputs.environment }}
        BUILD_CONFIG_PATH: ${{ inputs.build-config-path }}
        IMAGE_REFERENCE: ${{ inputs.image-reference }}
        IMAGE_DIGEST: ${{ inputs.image-digest }}
        COMMAND: ${{ inputs.command }}
        CACHE_MODE: ${{ inputs.cache-mode }}
        CLEAN_BUILD: ${{ inputs.clean-build }}
        OUTPUT_PATH: ${{ inputs.output-path }}
        RELEASE_MODE: ${{ inputs.release-mode }}
        CONTAINER_TIMEOUT: ${{ inputs.container-timeout }}
        LOG_PATH: ${{ steps.setup-dirs.outputs.log-path }}
        REPORT_PATH: ${{ steps.setup-dirs.outputs.report-path }}
      run: |
        set +e  # Don't exit immediately — capture the exit code

        python3 scripts/docker/run_unity_container.py \
          --project-path        "$PROJECT_PATH" \
          --unity-version       "$UNITY_VERSION" \
          --target-platform     "$TARGET_PLATFORM" \
          --environment         "$ENVIRONMENT" \
          --build-config-path   "$BUILD_CONFIG_PATH" \
          --image               "$IMAGE_REFERENCE" \
          --image-digest        "$IMAGE_DIGEST" \
          --command             "$COMMAND" \
          --cache-mode          "$CACHE_MODE" \
          --clean-build         "$CLEAN_BUILD" \
          --output-path         "$OUTPUT_PATH" \
          --release-mode        "$RELEASE_MODE" \
          --timeout             "$CONTAINER_TIMEOUT" \
          --log-path            "$LOG_PATH" \
          --report-path         "$REPORT_PATH"

        CONTAINER_EXIT=$?
        echo "exit-code=${CONTAINER_EXIT}" >> "$GITHUB_OUTPUT"

        if [ $CONTAINER_EXIT -ne 0 ]; then
          echo "::error::Unity container exited with code ${CONTAINER_EXIT} (command: ${COMMAND})"
        fi

        exit $CONTAINER_EXIT
