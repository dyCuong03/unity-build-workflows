name: Discord Build Notification
description: >
  Posts a Discord embed for build completion via curl (no third-party action).
  The webhook URL is consumed from the DISCORD_WEBHOOK_URL environment variable —
  it must NOT be passed as a plain input. No-ops gracefully when the variable is
  unset or empty; a missing webhook never fails the pipeline.

inputs:
  status:
    description: Build result (success | failure | cancelled)
    required: true
  platform:
    description: Target platform (Android, iOS, WebGL, Linux64, LinuxServer, ...)
    required: true
  environment:
    description: Build environment (development, staging, production)
    required: false
    default: development
  build-version:
    description: Build version string (e.g. 1.2.3)
    required: false
    default: unknown
  run-url:
    description: Full URL to the GitHub Actions run
    required: false
    default: ''
  artifact-name:
    description: Name of the produced build artifact (optional)
    required: false
    default: ''
  extra-text:
    description: Additional message to include in the embed description (optional)
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Post Discord embed
      shell: bash
      env:
        NOTIFY_STATUS:      ${{ inputs.status }}
        NOTIFY_PLATFORM:    ${{ inputs.platform }}
        NOTIFY_ENVIRONMENT: ${{ inputs.environment }}
        NOTIFY_VERSION:     ${{ inputs.build-version }}
        NOTIFY_RUN_URL:     ${{ inputs.run-url }}
        NOTIFY_ARTIFACT:    ${{ inputs.artifact-name }}
        NOTIFY_EXTRA:       ${{ inputs.extra-text }}
        GH_REPOSITORY:      ${{ github.repository }}
        GH_ACTOR:           ${{ github.actor }}
        GH_SHA:             ${{ github.sha }}
        GH_RUN_NUMBER:      ${{ github.run_number }}
      run: |
        # ── Secret protection ────────────────────────────────────────────────────
        # Disable shell xtrace so the webhook URL is never echoed by the shell.
        set +x

        # No-op when the webhook is not configured — never fail the build.
        if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
          echo "::notice::DISCORD_WEBHOOK_URL is not set — Discord notification skipped."
          exit 0
        fi

        # Belt-and-suspenders: mask the URL value in all subsequent log output.
        # (GitHub auto-masks values from secrets.*, but the env-var path adds
        # defence in case the value was set from a non-secret source in testing.)
        echo "::add-mask::${DISCORD_WEBHOOK_URL}"

        # ── Build JSON payload via python3 -c (no heredoc; safe quoting) ─────────
        # All Python string literals use single-quotes so the outer bash
        # double-quoted string requires no escaping.  Context values come from
        # environment variables only — no shell interpolation inside the Python.
        PAYLOAD=$(python3 -c "
        import json, os, sys
        status    = os.environ.get('NOTIFY_STATUS',      'unknown')
        platform  = os.environ.get('NOTIFY_PLATFORM',    'unknown')
        env_name  = os.environ.get('NOTIFY_ENVIRONMENT', 'development')
        version   = os.environ.get('NOTIFY_VERSION',     'unknown')
        run_url   = os.environ.get('NOTIFY_RUN_URL',     '')
        artifact  = os.environ.get('NOTIFY_ARTIFACT',    '')
        extra     = os.environ.get('NOTIFY_EXTRA',       '')
        repo      = os.environ.get('GH_REPOSITORY',      '')
        actor     = os.environ.get('GH_ACTOR',           '')
        sha       = os.environ.get('GH_SHA',             '')
        short_sha = sha[:7] if sha else 'unknown'
        color_map = {'success': 3066993, 'failure': 15158332, 'cancelled': 9807270}
        emoji_map = {'success': '✅', 'failure': '❌', 'cancelled': '⚠️'}
        color = color_map.get(status, 9807270)
        emoji = emoji_map.get(status, '⚠️')
        title = emoji + ' Build ' + status.capitalize() + ' — ' + platform + ' / ' + env_name
        fields = [
            {'name': 'Repository',   'value': repo or 'unknown', 'inline': True},
            {'name': 'Platform',     'value': platform,          'inline': True},
            {'name': 'Environment',  'value': env_name,          'inline': True},
            {'name': 'Version',      'value': version,           'inline': True},
            {'name': 'Commit',       'value': short_sha,         'inline': True},
            {'name': 'Triggered by', 'value': actor or 'unknown','inline': True},
        ]
        if artifact:
            fields.append({'name': 'Artifact', 'value': artifact, 'inline': False})
        embed = {'title': title, 'color': color, 'fields': fields}
        if run_url:
            embed['url'] = run_url
        if extra:
            embed['description'] = extra
        print(json.dumps({'embeds': [embed]}))
        ")

        # ── Validate JSON before sending ─────────────────────────────────────────
        if ! echo "${PAYLOAD}" | python3 -c "import json,sys; json.load(sys.stdin)" 2>/dev/null; then
          echo "::warning::Discord notify: payload JSON validation failed — notification skipped, pipeline unaffected."
          exit 0
        fi

        # ── Send notification — curl failure is NEVER fatal ───────────────────────
        _RESP_FILE=$(mktemp)
        _CODE_FILE=$(mktemp)
        _ERR_FILE=$(mktemp)

        # Capture HTTP status code separately to avoid doubling when curl errors.
        # --write-out writes to stdout (redirected to _CODE_FILE); || true absorbs
        # curl's non-zero exit so the outer script does not fail.
        echo "${PAYLOAD}" | \
          curl \
            --silent \
            --show-error \
            --output "${_RESP_FILE}" \
            --write-out "%{http_code}" \
            --max-time 15 \
            --retry 2 \
            --retry-delay 3 \
            -H "Content-Type: application/json" \
            --data-binary @- \
            "${DISCORD_WEBHOOK_URL}" > "${_CODE_FILE}" 2>"${_ERR_FILE}" || true

        HTTP_CODE=$(cat "${_CODE_FILE}" 2>/dev/null || echo "000")

        if [ "${HTTP_CODE}" = "000" ]; then
          _ERR_MSG=$(head -1 "${_ERR_FILE}" 2>/dev/null || echo "unknown error")
          echo "::warning::Discord notify: curl failed (${_ERR_MSG}) — pipeline unaffected."
        elif [ "${HTTP_CODE}" -ge 200 ] && [ "${HTTP_CODE}" -lt 300 ]; then
          echo "Discord notification sent (HTTP ${HTTP_CODE})."
        else
          echo "::warning::Discord notify: unexpected HTTP ${HTTP_CODE} — pipeline unaffected."
        fi

        rm -f "${_RESP_FILE}" "${_CODE_FILE}" "${_ERR_FILE}"
