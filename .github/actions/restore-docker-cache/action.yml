name: Restore Docker Cache
description: >
  Manages Unity Library/ cache using GitHub Actions cache backed by Docker volumes.
  Replaces the native restore-library-cache action for Docker-based workflows.

inputs:
  project-path:
    description: Path to the Unity project root (relative to workspace)
    required: false
    default: '.'
  unity-version:
    description: Unity editor version (e.g., 6000.0.23f1)
    required: true
  target-platform:
    description: Build target platform (Android, WebGL, Linux64, LinuxServer)
    required: true
  cache-mode:
    description: |
      Cache strategy:
        off        — no caching, always fresh import
        safe       — exact key match only; no cross-platform or cross-version reuse
        aggressive — exact match first, falls back to platform-version, then version-only
    required: false
    default: safe

outputs:
  cache-hit:
    description: "Whether an exact cache key match was restored"
    value: ${{ steps.restore-cache.outputs.cache-hit }}
  cache-key:
    description: The primary cache key used for this run
    value: ${{ steps.compute-key.outputs.cache-key }}
  volume-name:
    description: Docker volume name holding the cached Library data
    value: ${{ steps.compute-key.outputs.volume-name }}

runs:
  using: composite
  steps:
    - name: Compute cache key
      id: compute-key
      shell: bash
      env:
        PROJECT_PATH: ${{ inputs.project-path }}
        UNITY_VERSION: ${{ inputs.unity-version }}
        TARGET_PLATFORM: ${{ inputs.target-platform }}
        CACHE_MODE: ${{ inputs.cache-mode }}
      run: |
        if [ "$CACHE_MODE" = "off" ]; then
          echo "Cache mode is 'off' — skipping key computation."
          echo "cache-key=disabled"  >> "$GITHUB_OUTPUT"
          echo "volume-name=disabled" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        MANIFEST="${GITHUB_WORKSPACE}/${PROJECT_PATH}/Packages/manifest.json"
        LOCK="${GITHUB_WORKSPACE}/${PROJECT_PATH}/Packages/packages-lock.json"

        # Hash manifest + lock file together for a stable, content-addressed key
        if [ -f "$MANIFEST" ] && [ -f "$LOCK" ]; then
          MANIFEST_HASH=$(cat "$MANIFEST" "$LOCK" | sha256sum | cut -d' ' -f1 | head -c 16)
        elif [ -f "$MANIFEST" ]; then
          MANIFEST_HASH=$(sha256sum "$MANIFEST" | cut -d' ' -f1 | head -c 16)
        else
          MANIFEST_HASH="no-manifest"
        fi

        OS_TAG="${{ runner.os }}"
        PRIMARY_KEY="${OS_TAG}-unity-${UNITY_VERSION}-${TARGET_PLATFORM}-${MANIFEST_HASH}-cache-schema-v2"
        VOLUME_NAME="unity-library-${UNITY_VERSION}-${TARGET_PLATFORM}-${MANIFEST_HASH}"
        # Docker volume names: lowercase, alphanumeric + hyphens
        VOLUME_NAME=$(echo "$VOLUME_NAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g')

        echo "cache-key=${PRIMARY_KEY}"     >> "$GITHUB_OUTPUT"
        echo "volume-name=${VOLUME_NAME}"   >> "$GITHUB_OUTPUT"
        echo "manifest-hash=${MANIFEST_HASH}" >> "$GITHUB_OUTPUT"

        echo "Primary cache key : $PRIMARY_KEY"
        echo "Docker volume name: $VOLUME_NAME"

    - name: Restore Library cache (safe mode)
      id: restore-cache
      if: inputs.cache-mode == 'safe'
      uses: actions/cache@v4
      with:
        path: ${{ inputs.project-path }}/Library
        key: ${{ steps.compute-key.outputs.cache-key }}
        restore-keys: |
          ${{ runner.os }}-unity-${{ inputs.unity-version }}-${{ inputs.target-platform }}-

    - name: Restore Library cache (aggressive mode)
      id: restore-cache-aggressive
      if: inputs.cache-mode == 'aggressive'
      uses: actions/cache@v4
      with:
        path: ${{ inputs.project-path }}/Library
        key: ${{ steps.compute-key.outputs.cache-key }}
        restore-keys: |
          ${{ runner.os }}-unity-${{ inputs.unity-version }}-${{ inputs.target-platform }}-
          ${{ runner.os }}-unity-${{ inputs.unity-version }}-
          ${{ runner.os }}-unity-

    - name: Report cache status
      shell: bash
      env:
        CACHE_MODE: ${{ inputs.cache-mode }}
        CACHE_HIT: ${{ steps.restore-cache.outputs.cache-hit || steps.restore-cache-aggressive.outputs.cache-hit || 'false' }}
        CACHE_KEY: ${{ steps.compute-key.outputs.cache-key }}
        VOLUME_NAME: ${{ steps.compute-key.outputs.volume-name }}
      run: |
        if [ "$CACHE_MODE" = "off" ]; then
          echo "Cache disabled (cache-mode=off)."
          exit 0
        fi

        if [ "$CACHE_HIT" = "true" ]; then
          echo "Cache HIT  — restored Library from key: $CACHE_KEY"
        else
          echo "Cache MISS — fresh import will run (key: $CACHE_KEY)"
        fi
        echo "Docker volume: $VOLUME_NAME"
