name: Validate Unity Project
description: Run BuildConfig validation and workflow contract checks

inputs:
  project-path:
    description: "Path to Unity project root"
    required: false
    default: "."
  build-config-path:
    description: "Path to BuildConfig folder (relative to project-path)"
    required: false
    default: "BuildConfig"
  target-platform:
    description: "Target build platform"
    required: true
  fail-on-warnings:
    description: "Fail if validation warnings are found"
    required: false
    default: "false"

outputs:
  valid:
    description: "Whether validation passed"
    value: ${{ steps.validate.outputs.valid }}
  warning-count:
    description: "Number of validation warnings"
    value: ${{ steps.validate.outputs.warning-count }}
  error-count:
    description: "Number of validation errors"
    value: ${{ steps.validate.outputs.error-count }}

runs:
  using: composite
  steps:
    - name: Validate BuildConfig JSON
      id: validate
      shell: bash
      run: |
        CONFIG_PATH="${{ inputs.project-path }}/${{ inputs.build-config-path }}"
        PLATFORM="${{ inputs.target-platform }}"
        FAIL_WARNINGS="${{ inputs.fail-on-warnings }}"

        echo "Validating BuildConfig at: $CONFIG_PATH"
        echo "Target platform: $PLATFORM"

        # Run validation script
        RESULT=$(python3 scripts/common/validate_build_config.py \
          --config-path "$CONFIG_PATH" \
          --platform "$PLATFORM" \
          --output-json \
          2>&1) || true

        echo "$RESULT"

        # Parse result counts
        ERRORS=$(echo "$RESULT" | python3 -c "
        import sys, json
        try:
            data = json.loads(sys.stdin.read())
            print(data.get('error_count', 0))
        except:
            print(0)
        " 2>/dev/null || echo "0")

        WARNINGS=$(echo "$RESULT" | python3 -c "
        import sys, json
        try:
            data = json.loads(sys.stdin.read())
            print(data.get('warning_count', 0))
        except:
            print(0)
        " 2>/dev/null || echo "0")

        echo "error-count=$ERRORS" >> "$GITHUB_OUTPUT"
        echo "warning-count=$WARNINGS" >> "$GITHUB_OUTPUT"

        # Determine validity
        VALID="true"
        if [[ "$ERRORS" -gt "0" ]]; then
          echo "::error::BuildConfig validation failed with $ERRORS error(s)"
          VALID="false"
        fi

        if [[ "$WARNINGS" -gt "0" && "$FAIL_WARNINGS" == "true" ]]; then
          echo "::error::BuildConfig validation has $WARNINGS warning(s) and fail-on-warnings is enabled"
          VALID="false"
        fi

        echo "valid=$VALID" >> "$GITHUB_OUTPUT"

        # Write summary report
        cat > validation-report.json << EOF
        {
          "platform": "$PLATFORM",
          "config_path": "$CONFIG_PATH",
          "valid": $VALID,
          "error_count": $ERRORS,
          "warning_count": $WARNINGS,
          "fail_on_warnings": $FAIL_WARNINGS
        }
        EOF

    - name: Validate workflow contract
      shell: bash
      run: |
        python3 scripts/common/validate_workflow_contract.py \
          --config-path "${{ inputs.project-path }}/${{ inputs.build-config-path }}" \
          --platform "${{ inputs.target-platform }}" \
          --output validation-warnings.txt || true

        if [[ -f "validation-warnings.txt" ]]; then
          echo "=== Workflow Contract Warnings ==="
          cat validation-warnings.txt
        fi

    - name: Fail on validation errors
      if: steps.validate.outputs.valid == 'false'
      shell: bash
      run: |
        echo "::error::Project validation failed. See validation-report.json for details."
        exit 1
