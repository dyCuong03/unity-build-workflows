name: Activate Unity License
description: >
  Activate Unity license on the runner host before Docker container steps.
  Uses buildalon/activate-unity-license for Unity 6+ Personal/Pro support.
  The activated license directory can be mounted into Docker containers.

inputs:
  unity-version:
    description: Unity editor version (e.g., 6000.3.9f1)
    required: true
  license-type:
    description: 'License type: Personal, Professional, or Floating'
    required: false
    default: Personal

outputs:
  license-dir:
    description: Host path to Unity license directory (mount into container)
    value: ${{ steps.activate.outputs.license-dir }}
  activated:
    description: Whether activation succeeded
    value: ${{ steps.activate.outputs.activated }}

runs:
  using: composite
  steps:
    - name: Activate Unity license on host
      id: activate
      shell: bash
      env:
        UNITY_EMAIL: ${{ env.UNITY_EMAIL }}
        UNITY_PASSWORD: ${{ env.UNITY_PASSWORD }}
        UNITY_SERIAL: ${{ env.UNITY_SERIAL }}
        UNITY_LICENSE: ${{ env.UNITY_LICENSE }}
        LICENSE_TYPE: ${{ inputs.license-type }}
      run: |
        LICENSE_DIR="${HOME}/.local/share/unity3d"
        echo "license-dir=${LICENSE_DIR}" >> "$GITHUB_OUTPUT"

        # If UNITY_LICENSE (.ulf) is set, write it directly and skip buildalon
        if [ -n "${UNITY_LICENSE}" ]; then
          echo "Writing UNITY_LICENSE to host license directory..."
          mkdir -p "${LICENSE_DIR}/Unity"

          # Decode base64 if needed
          TEMP_ULF="${LICENSE_DIR}/Unity/Unity_lic.ulf"
          if echo "${UNITY_LICENSE}" | base64 -d > /dev/null 2>&1; then
            echo "${UNITY_LICENSE}" | base64 -d > "${TEMP_ULF}"
          else
            printf '%s' "${UNITY_LICENSE}" > "${TEMP_ULF}"
          fi
          chmod 600 "${TEMP_ULF}"
          echo "activated=ulf" >> "$GITHUB_OUTPUT"
          echo "::notice::Unity license written from UNITY_LICENSE secret"
          exit 0
        fi

        # No UNITY_LICENSE — will use buildalon action in next step
        echo "activated=pending" >> "$GITHUB_OUTPUT"

    - name: Activate via buildalon (Personal/Pro)
      if: steps.activate.outputs.activated == 'pending'
      uses: buildalon/activate-unity-license@v2
      with:
        license: ${{ inputs.license-type }}
        username: ${{ env.UNITY_EMAIL }}
        password: ${{ env.UNITY_PASSWORD }}
        serial: ${{ env.UNITY_SERIAL }}

    - name: Confirm activation
      if: steps.activate.outputs.activated == 'pending'
      id: confirm
      shell: bash
      run: |
        LICENSE_DIR="${HOME}/.local/share/unity3d"
        if [ -d "${LICENSE_DIR}/Unity" ] && ls "${LICENSE_DIR}/Unity/"*.ulf 2>/dev/null | head -1 > /dev/null; then
          echo "activated=buildalon" >> "$GITHUB_OUTPUT"
          echo "::notice::Unity license activated via buildalon"
        else
          echo "activated=failed" >> "$GITHUB_OUTPUT"
          echo "::warning::Unity license activation may have failed — no .ulf found at ${LICENSE_DIR}/Unity/"
        fi
