name: Setup Unity
description: Install and activate Unity Editor for the target platform

inputs:
  unity-version:
    description: "Unity version to install (e.g. 2022.3.0f1)"
    required: true
  project-path:
    description: "Path to Unity project root"
    required: false
    default: "."
  target-platform:
    description: "Build target platform for module installation"
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Detect runner OS
      id: os
      shell: bash
      run: |
        case "${{ runner.os }}" in
          Linux)   echo "os=linux"   >> "$GITHUB_OUTPUT" ;;
          macOS)   echo "os=macos"   >> "$GITHUB_OUTPUT" ;;
          Windows) echo "os=windows" >> "$GITHUB_OUTPUT" ;;
        esac

    - name: Install Unity Hub (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        # Install Unity Hub via snap or apt
        if command -v snap &>/dev/null; then
          sudo snap install unity-hub --classic 2>/dev/null || true
        fi
        # Fallback: download Unity Hub AppImage
        if ! command -v unity-hub &>/dev/null; then
          curl -fsSL \
            "https://public-cdn.cloud.unity3d.com/hub/prod/UnityHub.AppImage" \
            -o /tmp/UnityHub.AppImage
          chmod +x /tmp/UnityHub.AppImage
          sudo mv /tmp/UnityHub.AppImage /usr/local/bin/unity-hub
        fi

    - name: Install Unity Editor (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        UNITY_VERSION="${{ inputs.unity-version }}"
        PLATFORM="${{ inputs.target-platform }}"
        MODULES="--module linux-mono"
        case "$PLATFORM" in
          Android) MODULES="$MODULES --module android --module android-open-jdk --module android-sdk-ndk-tools" ;;
          WebGL)   MODULES="$MODULES --module webgl" ;;
        esac
        unity-hub -- \
          --headless install \
          --version "$UNITY_VERSION" \
          $MODULES \
          --childModules || true
        # Create symlink for easy access
        UNITY_PATH="/home/runner/.local/share/unity-hub/editors/$UNITY_VERSION/Editor/Unity"
        if [[ -f "$UNITY_PATH" ]]; then
          sudo ln -sf "$UNITY_PATH" /usr/local/bin/unity-editor
        fi

    - name: Install Unity Editor (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        UNITY_VERSION="${{ inputs.unity-version }}"
        PLATFORM="${{ inputs.target-platform }}"
        MODULES=""
        case "$PLATFORM" in
          iOS) MODULES="--module ios" ;;
        esac
        # Install via Unity Hub CLI
        /Applications/Unity\ Hub.app/Contents/MacOS/Unity\ Hub -- \
          --headless install \
          --version "$UNITY_VERSION" \
          $MODULES \
          --childModules || true

    - name: Activate Unity license (file-based)
      if: env.UNITY_LICENSE != ''
      shell: bash
      run: |
        UNITY_VERSION="${{ inputs.unity-version }}"
        LICENSE_FILE="/tmp/unity-license.ulf"
        echo "$UNITY_LICENSE" > "$LICENSE_FILE"
        UNITY_BIN=""
        case "${{ runner.os }}" in
          Linux)
            UNITY_BIN="$(find /home/runner/.local/share/unity-hub/editors -name Unity -type f 2>/dev/null | head -1)"
            [[ -z "$UNITY_BIN" ]] && UNITY_BIN="/usr/local/bin/unity-editor"
            ;;
          macOS)
            UNITY_BIN="/Applications/Unity/Hub/Editor/${UNITY_VERSION}/Unity.app/Contents/MacOS/Unity"
            ;;
          Windows)
            UNITY_BIN="C:\\Program Files\\Unity\\Hub\\Editor\\${UNITY_VERSION}\\Editor\\Unity.exe"
            ;;
        esac
        "$UNITY_BIN" \
          -batchmode \
          -nographics \
          -logFile /tmp/unity-activate.log \
          -manualLicenseFile "$LICENSE_FILE" \
          -quit || true
        rm -f "$LICENSE_FILE"
      env:
        UNITY_LICENSE: ${{ env.UNITY_LICENSE }}

    - name: Activate Unity license (username/password)
      if: env.UNITY_EMAIL != '' && env.UNITY_PASSWORD != '' && env.UNITY_LICENSE == ''
      shell: bash
      run: |
        UNITY_VERSION="${{ inputs.unity-version }}"
        UNITY_BIN=""
        case "${{ runner.os }}" in
          Linux)
            UNITY_BIN="$(find /home/runner/.local/share/unity-hub/editors -name Unity -type f 2>/dev/null | head -1)"
            [[ -z "$UNITY_BIN" ]] && UNITY_BIN="/usr/local/bin/unity-editor"
            ;;
          macOS)
            UNITY_BIN="/Applications/Unity/Hub/Editor/${UNITY_VERSION}/Unity.app/Contents/MacOS/Unity"
            ;;
          Windows)
            UNITY_BIN="C:\\Program Files\\Unity\\Hub\\Editor\\${UNITY_VERSION}\\Editor\\Unity.exe"
            ;;
        esac
        "$UNITY_BIN" \
          -batchmode \
          -nographics \
          -logFile /tmp/unity-activate.log \
          -username "$UNITY_EMAIL" \
          -password "$UNITY_PASSWORD" \
          -serial "$UNITY_SERIAL" \
          -quit || true
      env:
        UNITY_EMAIL: ${{ env.UNITY_EMAIL }}
        UNITY_PASSWORD: ${{ env.UNITY_PASSWORD }}
        UNITY_SERIAL: ${{ env.UNITY_SERIAL }}

    - name: Verify Unity installation
      shell: bash
      run: |
        UNITY_VERSION="${{ inputs.unity-version }}"
        echo "Unity version requested: $UNITY_VERSION"
        case "${{ runner.os }}" in
          Linux)
            find /home/runner/.local/share/unity-hub/editors -maxdepth 2 -name Unity 2>/dev/null || \
              echo "Unity editors path not found — may be installed elsewhere"
            ;;
          macOS)
            ls "/Applications/Unity/Hub/Editor/$UNITY_VERSION/" 2>/dev/null || \
              echo "Unity not found at expected macOS path"
            ;;
          Windows)
            ls "C:\\Program Files\\Unity\\Hub\\Editor\\$UNITY_VERSION\\" 2>/dev/null || \
              echo "Unity not found at expected Windows path"
            ;;
        esac
        echo "Unity setup complete"
