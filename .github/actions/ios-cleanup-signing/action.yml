name: iOS Cleanup Signing
description: >
  Removes the isolated keychain, installed provisioning profile, ASC API key directory,
  and any stray temp signing files left by ios-setup-signing.
  MUST be called with `if: always()` to guarantee cleanup even when the build fails.
  Pair every ios-setup-signing call with one ios-cleanup-signing call.

inputs:
  keychain-path:
    description: Path to the isolated signing keychain (from ios-setup-signing outputs)
    required: false
    default: ''
  keychain-name:
    description: Keychain name fallback (from ios-setup-signing outputs)
    required: false
    default: ''
  profile-path:
    description: Path to the installed provisioning profile (from ios-setup-signing outputs)
    required: false
    default: ''
  asc-api-key-dir:
    description: Directory holding the App Store Connect API key .p8 file (if used)
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Remove signing artifacts
      if: always()
      shell: bash
      env:
        KEYCHAIN_PATH: ${{ inputs.keychain-path }}
        KEYCHAIN_NAME: ${{ inputs.keychain-name }}
        PROFILE_PATH: ${{ inputs.profile-path }}
        ASC_API_KEY_DIR: ${{ inputs.asc-api-key-dir }}
      run: bash "${{ github.action_path }}/../../../scripts/ios/cleanup_signing.sh"
