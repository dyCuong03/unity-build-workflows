name: Upload Build Report
description: >
  Uploads build-report.json, build-metadata.json, and validation reports from Docker
  container output paths. Generates a final GitHub Step Summary.

inputs:
  build-version:
    description: Build version string
    required: true
  target-platform:
    description: Build target platform
    required: true
  environment:
    description: Build environment (development, staging, production)
    required: false
    default: development
  validation-passed:
    description: Whether the validation step passed ('true'/'false')
    required: false
    default: 'true'
  tests-passed:
    description: Whether the test step passed ('true'/'false'/'skipped')
    required: false
    default: 'skipped'
  build-result:
    description: Build job result (success, failure, cancelled, skipped)
    required: false
    default: success
  report-path:
    description: Directory containing build-report.json, build-metadata.json, etc.
    required: false
    default: BuildReports
  retention-days:
    description: Artifact retention in days
    required: false
    default: '14'

runs:
  using: composite
  steps:
    - name: Generate build report JSON
      id: gen-report
      shell: bash
      env:
        BUILD_VERSION: ${{ inputs.build-version }}
        TARGET_PLATFORM: ${{ inputs.target-platform }}
        ENVIRONMENT: ${{ inputs.environment }}
        VALIDATION_PASSED: ${{ inputs.validation-passed }}
        TESTS_PASSED: ${{ inputs.tests-passed }}
        BUILD_RESULT: ${{ inputs.build-result }}
        REPORT_PATH: ${{ inputs.report-path }}
      run: |
        TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

        mkdir -p "$REPORT_PATH"
        REPORT_FILE="${REPORT_PATH}/build-report.json"

        # Only write if no container-generated report exists
        if [ ! -f "$REPORT_FILE" ]; then
          cat > "$REPORT_FILE" << EOF
        {
          "version": "${BUILD_VERSION}",
          "platform": "${TARGET_PLATFORM}",
          "environment": "${ENVIRONMENT}",
          "build_result": "${BUILD_RESULT}",
          "validation_passed": ${VALIDATION_PASSED},
          "tests_passed": "${TESTS_PASSED}",
          "timestamp": "${TIMESTAMP}",
          "repository": "${{ github.repository }}",
          "run_id": "${{ github.run_id }}",
          "run_number": ${{ github.run_number }},
          "commit": "${{ github.sha }}",
          "ref": "${{ github.ref }}",
          "actor": "${{ github.actor }}"
        }
        EOF
          echo "Generated build-report.json at ${REPORT_FILE}"
        else
          echo "Using container-generated build-report.json at ${REPORT_FILE}"
        fi

    - name: Write final GitHub Step Summary
      shell: bash
      env:
        BUILD_VERSION: ${{ inputs.build-version }}
        TARGET_PLATFORM: ${{ inputs.target-platform }}
        ENVIRONMENT: ${{ inputs.environment }}
        VALIDATION_PASSED: ${{ inputs.validation-passed }}
        TESTS_PASSED: ${{ inputs.tests-passed }}
        BUILD_RESULT: ${{ inputs.build-result }}
      run: |
        validate_icon() { [ "$1" = "true" ] && echo "✅" || echo "❌"; }
        tests_icon() {
          case "$1" in
            true)    echo "✅" ;;
            false)   echo "❌" ;;
            skipped) echo "⏭️" ;;
            *)       echo "❓" ;;
          esac
        }
        build_icon() {
          case "$1" in
            success)   echo "✅" ;;
            failure)   echo "❌" ;;
            cancelled) echo "🚫" ;;
            skipped)   echo "⏭️" ;;
            *)         echo "❓" ;;
          esac
        }

        VALIDATE_ICON=$(validate_icon "$VALIDATION_PASSED")
        TESTS_ICON=$(tests_icon "$TESTS_PASSED")
        BUILD_ICON=$(build_icon "$BUILD_RESULT")

        cat >> "$GITHUB_STEP_SUMMARY" << EOF
        ## Build Report — ${TARGET_PLATFORM} / ${ENVIRONMENT}

        | Stage       | Result |
        |---|---|
        | Validation  | ${VALIDATE_ICON} $([ "$VALIDATION_PASSED" = "true" ] && echo "Passed" || echo "Failed") |
        | Tests       | ${TESTS_ICON} ${TESTS_PASSED^} |
        | Build       | ${BUILD_ICON} ${BUILD_RESULT^} |

        **Version:** \`${BUILD_VERSION}\`
        **Platform:** ${TARGET_PLATFORM}
        **Environment:** ${ENVIRONMENT}
        **Repository:** [${{ github.repository }}](${{ github.server_url }}/${{ github.repository }})
        **Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
        **Commit:** \`${{ github.sha }}\`
        EOF

    - name: Collect report files
      id: collect
      shell: bash
      env:
        REPORT_PATH: ${{ inputs.report-path }}
        TARGET_PLATFORM: ${{ inputs.target-platform }}
        ENVIRONMENT: ${{ inputs.environment }}
        BUILD_VERSION: ${{ inputs.build-version }}
      run: |
        COLLECT_DIR="${RUNNER_TEMP}/build-report-upload"
        mkdir -p "$COLLECT_DIR"

        for f in build-report.json build-metadata.json validation-report.json validation-warnings.txt; do
          [ -f "${REPORT_PATH}/${f}" ] && cp "${REPORT_PATH}/${f}" "$COLLECT_DIR/" || true
        done

        # Include any collected log directory if present
        [ -d "${RUNNER_TEMP}/collected-output" ] && cp -r "${RUNNER_TEMP}/collected-output" "$COLLECT_DIR/" || true

        ARTIFACT_NAME="build-report-${TARGET_PLATFORM}-${ENVIRONMENT}-${BUILD_VERSION}-${{ github.run_number }}"
        echo "collect-dir=${COLLECT_DIR}" >> "$GITHUB_OUTPUT"
        echo "artifact-name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"

    - name: Upload build report artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.collect.outputs.artifact-name }}
        path: ${{ steps.collect.outputs.collect-dir }}
        retention-days: ${{ inputs.retention-days }}
        if-no-files-found: warn
