name: Unity Docker CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: false
        default: "development"
        type: choice
        options: [development, staging, production]
      platform:
        description: "Target platform"
        required: false
        default: "Android"
        type: choice
        options: [Android, WebGL, Linux64]

# All Unity operations run inside Docker containers.
# No native Unity installation required on the CI runner.
#
# Replace <WORKFLOW_OWNER> with the GitHub org/user hosting unity-build-workflows.
# @main is suitable for development. In PRODUCTION, pin to an exact released
# tag or commit SHA once a release exists. No v1/v2 tag currently exists.
#
# IMPORTANT: workflow-repository and workflow-ref MUST be set in 'with:' to match
# the <WORKFLOW_OWNER> and @<REF> used in the 'uses:' line. The reusable workflows
# cannot self-identify their source repo/SHA — no reliable GitHub context var exists
# for this in the workflow_call context.

jobs:
  build:
    name: Build ${{ inputs.platform || 'Android' }}
    uses: <WORKFLOW_OWNER>/unity-build-workflows/.github/workflows/unity-build.yml@main  # TODO(production): pin to an exact released tag/SHA once a release exists
    with:
      project-path: "."
      unity-version: "6000.0.26f1"
      target-platform: ${{ inputs.platform || 'Android' }}
      environment: ${{ inputs.environment || 'development' }}
      build-config-path: "BuildConfig"
      test-level: "editmode"
      cache-mode: "safe"
      upload-artifact: true
      # Required: must match the repo/ref in the 'uses:' line above.
      workflow-repository: <WORKFLOW_OWNER>/unity-build-workflows
      workflow-ref: main                 # ← pin to exact tag/SHA in production
    secrets: inherit
