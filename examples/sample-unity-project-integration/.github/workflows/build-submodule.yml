name: Unity CI (Submodule Mode)

# Example caller workflow for projects that consume unity-build-workflows
# as a git submodule at tools/unity-build-workflows/.
#
# Key differences from build-remote-reference mode:
#  - UPM package installed via file: path (no network required at Unity startup)
#  - submodules: true in checkout steps to initialise the submodule
#  - workflow-repository / workflow-ref still required — GitHub Actions `uses:`
#    cannot use a local submodule path for cross-repo reusable workflows
#
# Prerequisites:
#   git submodule add https://github.com/<WORKFLOW_OWNER>/unity-build-workflows.git \
#     tools/unity-build-workflows
#   # Then pin: git -C tools/unity-build-workflows checkout <TAG>
#
# Packages/manifest.json must contain:
#   "com.company.build-pipeline": "file:../tools/unity-build-workflows/unity-package/Packages/com.company.build-pipeline"
#
# See docs/SUBMODULE_INTEGRATION.md for the full setup guide.
#
# Replace <WORKFLOW_OWNER> with the GitHub org/user that hosts unity-build-workflows.
# Replace <SUBMODULE_REF> with the tag/SHA that matches your submodule pin (git -C tools/unity-build-workflows rev-parse HEAD).
# Replace the unity-version value with your project's Unity version.

on:
  push:
    branches: [main, develop, release/*]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: false
        default: development
        type: choice
        options: [development, staging, production]
      platform:
        description: Platform to build
        required: false
        default: Android
        type: choice
        options: [Android, WebGL, Linux64, LinuxServer]

jobs:

  # ── Android / WebGL / Linux (Docker lane) ────────────────────────────────────
  build-docker:
    name: ${{ inputs.platform || 'Android' }} (${{ inputs.environment || 'development' }})
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform != 'iOS' }}
    uses: <WORKFLOW_OWNER>/unity-build-workflows/.github/workflows/unity-build.yml@<SUBMODULE_REF>
    with:
      project-path: '.'
      unity-version: '6000.0.26f1'         # ← set your project's Unity version
      target-platform: ${{ inputs.platform || 'Android' }}
      environment: ${{ inputs.environment || 'development' }}
      build-config-path: BuildConfig
      test-level: editmode
      cache-mode: safe
      build-addressables: false
      upload-artifact: true
      deploy-target: none
      release-mode: false
      # Required: must match the repo/ref in the 'uses:' line above.
      # Pin workflow-ref to the same tag/SHA as your submodule.
      workflow-repository: <WORKFLOW_OWNER>/unity-build-workflows
      workflow-ref: <SUBMODULE_REF>        # ← match your submodule pin
    secrets:
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
      UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
      UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASS: ${{ secrets.ANDROID_KEY_PASS }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

  # ── iOS (macOS native lane) ────────────────────────────────────────────────
  build-ios:
    name: iOS (${{ inputs.environment || 'development' }})
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'iOS' }}
    uses: <WORKFLOW_OWNER>/unity-build-workflows/.github/workflows/unity-build-ios.yml@<SUBMODULE_REF>
    with:
      project-path: '.'
      unity-version: '6000.0.26f1'         # ← set your project's Unity version
      environment: ${{ inputs.environment || 'development' }}
      build-config-path: BuildConfig
      cache-mode: safe
      build-addressables: false
      upload-artifact: true
      build-version: '1.0.0'
      # ios-runner-label: macos-unity-xcode  # ← set to your self-hosted runner label
      # Required: must match the repo/ref in the 'uses:' line above.
      workflow-repository: <WORKFLOW_OWNER>/unity-build-workflows
      workflow-ref: <SUBMODULE_REF>        # ← match your submodule pin
    secrets:
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
      UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
      UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
