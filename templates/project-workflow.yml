# project-workflow.yml
# Docker-only caller workflow template.
# Copy this file to your project's .github/workflows/ directory and
# adjust the inputs to match your project's configuration.
#
# Supported platforms: Android, WebGL, Linux64, LinuxServer
# All Unity operations run inside Docker containers — no native Unity install required.
#
# Required secrets (set in your repository settings):
#   UNITY_LICENSE     — Unity license file content (base64)
#   UNITY_EMAIL       — Unity account email (alternative activation)
#   UNITY_PASSWORD    — Unity account password (alternative activation)
#
# Platform-specific secrets:
#   Android: ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASS, ANDROID_KEY_ALIAS, ANDROID_KEY_PASS
#   Android deploy: GOOGLE_PLAY_SERVICE_ACCOUNT_JSON
#   WebGL deploy: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
#
# Workflow reference (REQUIRED):
#   Replace <WORKFLOW_OWNER> with the GitHub org/user that hosts unity-build-workflows.
#   The @main ref is suitable for development. In PRODUCTION, pin to an exact released
#   tag or commit SHA once a release exists (e.g., @v1.0.0 or @abc1234).
#   No v1/v2 tag currently exists — do NOT invent tags.
#
#   IMPORTANT: workflow-repository and workflow-ref MUST be passed in every job's 'with:'
#   block, using the same <WORKFLOW_OWNER> and @<REF> you use in the 'uses:' directive.
#   The reusable workflows cannot self-identify their own source repo/SHA — GitHub provides
#   no reliable context variable for this in the workflow_call context.

name: Unity CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: false
        default: development
        type: choice
        options: [development, staging, production]
      target-platform:
        description: Platform to build
        required: false
        default: Android
        type: choice
        options: [Android, WebGL, Linux64, LinuxServer]

jobs:
  # ── Android (Docker, ubuntu-latest) ────────────────────────────────────────────
  build-android:
    name: Android
    if: ${{ inputs.target-platform == 'Android' || github.event_name != 'workflow_dispatch' }}
    uses: <WORKFLOW_OWNER>/unity-build-workflows/.github/workflows/unity-build.yml@main  # TODO(production): pin to an exact released tag/SHA once a release exists
    with:
      project-path: '.'
      unity-version: '6000.0.23f1'       # ← set your project's Unity version
      target-platform: Android
      environment: ${{ inputs.environment || 'development' }}
      build-config-path: BuildConfig
      test-level: editmode
      cache-mode: safe
      build-addressables: false
      upload-artifact: true
      deploy-target: none
      release-mode: false
      # Required: must match the repo/ref in the 'uses:' line above.
      workflow-repository: <WORKFLOW_OWNER>/unity-build-workflows
      workflow-ref: main                 # ← pin to exact tag/SHA in production
    secrets:
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
      UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
      UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASS: ${{ secrets.ANDROID_KEY_PASS }}

  # ── WebGL (Docker, ubuntu-latest) ──────────────────────────────────────────────
  build-webgl:
    name: WebGL
    if: ${{ inputs.target-platform == 'WebGL' }}
    uses: <WORKFLOW_OWNER>/unity-build-workflows/.github/workflows/unity-build.yml@main  # TODO(production): pin to an exact released tag/SHA once a release exists
    with:
      project-path: '.'
      unity-version: '6000.0.23f1'       # ← set your project's Unity version
      target-platform: WebGL
      environment: ${{ inputs.environment || 'development' }}
      build-config-path: BuildConfig
      test-level: editmode
      cache-mode: safe
      upload-artifact: true
      deploy-target: none
      release-mode: false
      # Required: must match the repo/ref in the 'uses:' line above.
      workflow-repository: <WORKFLOW_OWNER>/unity-build-workflows
      workflow-ref: main                 # ← pin to exact tag/SHA in production
    secrets:
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
      UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
      UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ── Linux64 (Docker, ubuntu-latest) ────────────────────────────────────────────
  build-linux:
    name: Linux64
    if: ${{ inputs.target-platform == 'Linux64' || inputs.target-platform == 'LinuxServer' }}
    uses: <WORKFLOW_OWNER>/unity-build-workflows/.github/workflows/unity-build.yml@main  # TODO(production): pin to an exact released tag/SHA once a release exists
    with:
      project-path: '.'
      unity-version: '6000.0.23f1'       # ← set your project's Unity version
      target-platform: ${{ inputs.target-platform || 'Linux64' }}
      environment: ${{ inputs.environment || 'development' }}
      build-config-path: BuildConfig
      test-level: editmode
      cache-mode: safe
      upload-artifact: true
      release-mode: false
      # Required: must match the repo/ref in the 'uses:' line above.
      workflow-repository: <WORKFLOW_OWNER>/unity-build-workflows
      workflow-ref: main                 # ← pin to exact tag/SHA in production
    secrets:
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
      UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
      UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
